<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#141b26;--bg4:#1a2235;
  --cyan:#00d4ff;--pink:#ff2d78;--violet:#a855f7;--gold:#f5c842;

html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px}
#nav{display:flex;gap:4px;padding:10px 12px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--bd);overflow-x:auto;align-items:center;position:sticky;top:0;z-index:99}
.nb{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit;letter-spacing:.4px}
.nb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
.xpb{margin-left:auto;flex-shrink:0;display:flex;gap:14px;font-size:11px;padding-left:10px;white-space:nowrap}
#main{padding:16px 14px;max-width:720px;margin:0 auto;padding-bottom:60px}
.sf{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.sf2{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:14px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border-radius:8px;padding:12px}
.ml{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.mv{font-size:24px;font-weight:700;line-height:1}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.pc{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)}
.pp{background:rgba(255,45,120,.1);color:var(--pink);border:1px solid rgba(255,45,120,.25)}
.pv{background:rgba(168,85,247,.1);color:var(--violet);border:1px solid rgba(168,85,247,.25)}

.pillar{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.pillar:last-child{border-bottom:none}
.tab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tb{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit}
.tb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
.hand-big{font-size:clamp(48px,14vw,72px);font-weight:700;text-align:center;letter-spacing:6px;line-height:1;padding:18px 0 8px}
.act-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.abtn{padding:14px 28px;font-size:14px;font-weight:700;font-family:inherit;border-radius:8px;cursor:pointer;letter-spacing:.5px;border:1px solid;min-width:130px}
.a-open{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.35)}
.a-fold{background:rgba(255,45,120,.1);color:var(--pink);border-color:rgba(255,45,120,.35)}
.a-shove{background:rgba(168,85,247,.1);color:var(--violet);border-color:rgba(168,85,247,.35)}
.res-ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);border-radius:8px;padding:12px}
.res-no{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.25);border-radius:8px;padding:12px}
.fcard{border:1px solid var(--bd2);border-radius:10px;min-height:200px;background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;user-select:none}
.fc-q{font-size:clamp(14px,4vw,16px);font-weight:700;line-height:1.6;margin-top:10px}
.fc-a{font-size:12px;line-height:1.9;color:var(--text2)}
.qbox{font-size:14px;line-height:1.8;padding:14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;margin-bottom:12px}
.qopt{display:block;text-align:left;padding:12px 14px;font-size:12px;cursor:pointer;border-radius:7px;border:1px solid var(--bd);background:var(--bg3);color:var(--text);font-family:inherit;width:100%;margin-bottom:6px;line-height:1.5}
.qopt.qok{background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.3)}
.qopt.qno{background:rgba(255,45,120,.08);color:var(--pink);border-color:rgba(255,45,120,.3)}
.qopt.qdim{opacity:.3}
.gbtn{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3);padding:12px 20px;font-size:12px;cursor:pointer;border-radius:7px;font-family:inherit;font-weight:600;letter-spacing:.4px;width:100%;margin-bottom:10px}
.grid-wrap{display:grid;grid-template-columns:18px repeat(13,minmax(0,1fr));gap:2px}
.gc{font-size:clamp(5.5px,1.5vw,7.5px);text-align:center;padding:3px 1px;border-radius:2px;border:1px solid transparent;line-height:1.3;font-family:'Courier New',monospace;font-weight:600}
.g-prem{background:rgba(240,185,0,.2);color:#f0c020;border-color:rgba(240,185,0,.55);font-weight:700}
.g-open{background:rgba(30,120,255,.16);color:#4499ff;border-color:rgba(30,120,255,.5)}
.g-blvb{background:rgba(0,200,160,.15);color:#00ddb0;border-color:rgba(0,200,160,.45)}
.g-dead{background:rgba(220,30,80,.14);color:#ff3366;border-color:rgba(220,30,80,.45)}
.g-shove{background:rgba(255,110,0,.15);color:#ff7a00;border-color:rgba(255,110,0,.45)}
.g-sh15{background:rgba(0,200,80,.13);color:#00cc55;border-color:rgba(0,200,80,.4)}
.g-fold{background:rgba(10,14,20,.97);color:#1a2840;border-color:rgba(255,255,255,.04)}
.g-3bv{background:rgba(255,50,180,.14);color:#ff40cc;border-color:rgba(255,50,180,.4)}
.g-3blf{background:rgba(255,160,0,.14);color:#ffaa00;border-color:rgba(255,160,0,.4)}
.g-call{background:rgba(0,160,255,.13);color:#44aaff;border-color:rgba(0,160,255,.35)}
.g-opn2{background:rgba(0,190,130,.14);color:#00cc88;border-color:rgba(0,190,130,.4)}

.nbtn{width:100%;padding:12px;font-size:12px;cursor:pointer;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--text2);font-family:inherit;font-weight:600;margin-top:8px}
.pb{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:12px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#00a8cc,#00d4ff)}
.qpb{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:14px;overflow:hidden}
.qpf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width .3s}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes gl{0%,100%{opacity:1}50%{opacity:.72}}
.anim{animation:fi .2s ease forwards}
.glow{animation:gl 2s ease-in-out infinite}
</style>

<script>
'use strict';
var RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
var RV={A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
var POSITIONS=['UTG','HJ','CO','BTN','SB'];
var PW={UTG:.15,HJ:.19,CO:.26,BTN:.48,SB:.42};
var STACKS=[15,18,20,22,25,30,35,40,50,75];
var SUITS=['\u2660','\u2665','\u2666','\u2663'];
var PILLARS=[
  {id:1,name:'Opening Ranges',sub:'Position + depth fundamentals',status:'done',theory:[
    'Open ranges tighten from left to right: UTG ~15%, HJ ~19%, CO ~26%, BTN ~45%, SB ~40%.',
    'The dead zone (23-40BB) kills speculative hands — suited connectors and small pairs lose EV here. Too shallow for implied odds, too deep to shove.',
    'Below 22BB: shove-or-fold. Stop open-raising and navigate postflop. Shove your strong hands, fold the rest.',
    'Above 40BB: suited connectors (67s+) and small pairs (22+) re-enter your range for set-mining and implied odds.',
    'Premium hands (AA, KK, QQ, JJ, TT, AKs, AKo, AQs) open from any position at any depth above 15BB.',
    'Position is the most valuable asset in poker — a hand playable from BTN may be a fold from UTG.',
    'Stack depth determines your strategy more than any other single factor. Know your BB count at all times.',
    'At 20-22BB use a 2x open, not 2.5x or 3x. Raising larger gets jammed on constantly — you lose an extra BB every time you fold. Three buckets: raise/call (QQ+, AK), open-shove directly (TT-JJ, AQs), raise/fold with blockers (A5s, KTs).',
    'At 20BB open 2x with QQ and call off a jam. Shoving 20BB folds out 77-JJ and AJ type hands that would call a raise — you leave value on the table.',
    'KJo is a standard CO/BTN open at any depth. From UTG it is borderline at 30BB+ and a fold short-stacked.',
  ]},
  {id:2,name:'Post-Flop Foundations',sub:'C-bet, board textures, check-raise',status:'done',theory:[
    'Board texture drives c-bet sizing: dry boards (A72r) = small size (25-33%) at high frequency. Wet boards (987tt) = large size (60-75%) or check.',
    'Range advantage means your range connects better with the board than your opponent\'s. High range advantage = bet frequently and small.',
    'Dry ace-high boards (A72r, A52r) heavily favor the preflop raiser — c-bet near 100% at small size.',
    'Low connected boards (432, 654) hit the BB calling range hard with suited connectors and small pairs. Check frequently as the raiser.',
    'Rule of 2 and 4: multiply your outs by 4 on the flop, by 2 on the turn for approximate equity percentage.',
    'Check-raise bluffs require combo draws or strong semi-bluffs — never check-raise pure air. You need equity when called.',
    'Multiway pots require much stronger hands to c-bet profitably. Check more, bet only with strong made hands or nut draws.',
    'SPR (stack-to-pot ratio) determines commitment: SPR 1-2 = committed with top pair. SPR 4-6 = need two pair+. SPR 8+ = need very strong hands to stack off.',
    'A blocker bet (20-25% OOP) controls pot size with medium-strength hands and prevents facing large bets.',
  ]},
  {id:3,name:'3-Bet & Squeeze',sub:'Resteal math, oversized opens',status:'active',gaps:['A7s multiway resteal math','3x-5x open response drill pending'],theory:[
    'A balanced 3-bet range is roughly 50% value hands and 50% bluffs. Pure value 3-bets are exploitable by folding.',
    'Best 3-bet bluffs have blocker value: A3s-A5s (block AA and AK), K9s-KTs (block KK). Avoid hands that block calling ranges.',
    'In-position 3-bet sizing: ~3x the open. Out-of-position: ~3.5-4x. Larger OOP to compensate for positional disadvantage.',
    'A resteal is shoving over a late-position open from the blinds at 15-25BB. Optimal when opener has a wide range and folds often.',
    'A7s multiway resteal loses value rapidly: calculate combined calling frequencies across all remaining players, then apply ICM multiplier.',
    'Vs oversized opens (4x-5x): scale your 3-bet proportionally (11-13BB vs typical 7-8BB). Or flat more with strong hands if deep enough.',
    'Squeeze play: 3-betting after an open plus one or more callers. Both callers have capped ranges — maximum fold equity.',
    '4-bet at 25BB or less is almost always a shove. Flat or 4-bet small only when deep enough to navigate postflop (50BB+).',
    'When you 3-bet light and get 4-bet, fold. A3s-A5s and K9s are 3-bet bluffs that give up to 4-bets from tight ranges.',
  ]},
  {id:4,name:'ICM & Tournament Play',sub:'Bubble, FT, payout ladders',status:'pending',theory:[
    'ICM (Independent Chip Model) converts chip stacks into real dollar equity. A chip near the bottom of your stack is worth MORE than a chip added to a big stack.',
    'Near the bubble: tighten early-position shoves, especially when covered by big stacks. A min-cash has real monetary value.',
    'Bubble factor: the ratio of ICM-adjusted EV to ChipEV. High bubble factor = you need much more equity to call profitably.',
    'As chip leader, exploit ICM by shoving wide against short-to-medium stacks who are heavily ICM-constrained.',
    'Being covered by another player is the worst ICM position. Any confrontation risks elimination vs a capped upside.',
    'PKO bounty formats shift strategy toward calling wider — you gain chips PLUS a bounty. ICM is still present but partially offset.',
    'Nash equilibrium is the unexploitable push/fold strategy. Use it as a baseline and adjust for actual opponent tendencies (most players call too tight).',
    'Short stack FT strategy: shove from late position when antes create value, do not wait for aces at 10BB — you lose fold equity.',
    'ICM deals: compare your ICM equity vs your skill edge vs remaining field. Against tough opponents, deals often make sense.',
  ]},
  {id:5,name:'Advanced Adjustments',sub:'Exploits, live reads, dynamics',status:'pending',theory:[
    'Against calling stations: remove bluffs, value-bet thinner, size up with strong hands, never slow-play.',
    'Against tight nits: increase steal frequency, 3-bet light in position, give them credit when they fight back.',
    'Against aggressive 3-bettors: widen your 4-bet range, flat with more sets and strong suited hands, reduce steal attempts.',
    'Live tells: bet timing, chip handling, posture changes, and bet sizing deviations are all exploitable patterns.',
    'Table image matters: if you have been caught bluffing, tighten your value-to-bluff ratio. If you have been playing tight, your bluffs have higher fold equity.',
    'In large-field WSOP events, recreational players are the primary profit source. Target them with value-heavy strategies.',
    'Note-taking is a massive edge in live poker. Record bet sizing patterns, showdown tendencies, and position-based frequencies.',
    'Multi-table awareness: know stack sizes, ICM implications, and player tendencies at adjacent tables if you may merge.',
  ]},
];
var FC={
  1:[
    {q:'UTG open range at 40BB+?',a:'~15%: All pairs 22+, broadways ATo+/KJo+/QJs+/JTs, suited aces A2s+, suited kings KTs+. Fold low SCs and speculative hands.'},
    {q:'What hands enter the dead zone at 30BB UTG?',a:'Suited connectors 67s-T9s, low pairs 22-66, speculative gappers. Too shallow for implied odds, too deep to shove. Fold.'},
    {q:'KJo from CO at 30BB?',a:'Open. Standard CO open at any depth. At 30BB open for value, fold to a 3-bet.'},
    {q:'Dead zone boundaries for speculative hands?',a:'23-40BB. Cannot realize implied odds (need 50BB+) and cannot shove profitably. Shove at 22BB or less, open at 40BB+.'},
    {q:'BTN open range at 30BB?',a:'About 45-50%. Near any two decent cards. Position is the asset.'},
    {q:'67s shove threshold from UTG?',a:'22BB or less. Dead zone 23-40BB. Open 40BB+. Exact shove line: 20-22BB.'},
    {q:'Open raise sizing at 20-22BB?',a:'2x (min-raise), not 2.5x or 3x. At 20BB a 3x open gets jammed on constantly and you lose an extra BB every fold. 2x risks the minimum to pick up blinds and antes, and when 3-bet jammed you know exactly what to do: call off strong hands, fold the blockers.'},
    {q:'What are the 3 opening buckets at 20-22BB?',a:'1. Raise/Call (open 2x, call a jam): QQ+, AK. 2. Open-Shove directly: TT-JJ, AQs, most strong hands — do not open and fold these. 3. Raise/Fold (open 2x, fold to a jam): blocker hands like A5s, A4s, KTs, KQs. These generate fold equity without risking your stack on a bad call.'},
    {q:'Why not just shove QQ at 20BB instead of open 2x?',a:'Open 2x builds more value. Shoving 20BB folds out hands like 77-99, AJo, KQo that would happily call a 2x raise. By opening small you can get calls from a wider range, and if jammed on you call off happily. Shoving QQ directly leaves too much value on the table.'},
    {q:'Why not just shove A5s at 20BB instead of raise/fold?',a:'A5s at 20BB is a raise/fold, not a direct shove. Shoving puts your full 20BB at risk with a weak hand. Opening 2x achieves the same fold equity (picking up blinds) at half the cost. If jammed on, fold — A5s is not strong enough to call off 20BB. The blocker value works fine even with just a 2x open.'},
    {q:'3-bet sizing when facing a 2x open at 20BB?',a:'About 5-6BB (not 3x the open = 6BB, but scaled slightly). GTO Wizard recommends roughly 5BB. This is small enough to leave fold equity when 4-bet jammed, but large enough to put pressure. The small size entices villain to jam marginal hands into your strong 3-bet/call range.'},
  ],
  2:[
    {q:'A72r (dry board) c-bet freq + sizing?',a:'High frequency (~75%), small size (25-33% pot). Dry board heavily favors raiser. Caller has few two-pairs, sets, or draws.'},
    {q:'987tt (wet board) c-bet adjustment?',a:'Check more often (~50%) or use large sizing (60-75%) when betting. Board hits caller with sets, two-pairs, and draws.'},
    {q:'Rule of 2 and 4?',a:'Multiply outs x4 on flop (two streets), x2 on turn (one street). 9-out flush draw is about 36% on flop.'},
    {q:'When is a flop check-raise bluff correct?',a:'With strong combo draws (flush+OESD, pair+flush) on boards where PFR c-bets wide. Need fold equity plus real equity when called.'},
    {q:'What is a blocker bet?',a:'Small OOP bet (20-25% pot) with marginal made hands to control pot size and reach showdown cheaply.'},
    {q:'SPR 1-2: what does it mean for commitment?',a:'SPR 1-2 means you are committed with any pair. The pot is so large relative to stacks that folding top pair or better is almost always a mistake. Plan to stack off.'},
    {q:'SPR 4-6: commitment threshold?',a:'Need two pair or better to comfortably stack off. Top pair is a strong hand but not necessarily a stack-off without reads. Play for value but be willing to fold to heavy resistance.'},
    {q:'SPR 8+: deep stack post-flop approach?',a:'Need sets, straights, flushes to play for stacks. Top pair is a bluff catcher, not a stack-off hand. Multi-street play matters. Position and reads are critical.'},
    {q:'What is equity denial and why does it matter?',a:'Betting forces opponent to fold hands with live equity. A bet of 50% pot removes roughly 25% equity from their decision. Denying equity is as valuable as extracting value — especially on draw-heavy boards.'},
    {q:'When to use a check-raise as the preflop raiser?',a:'On boards that connect with the calling range (low connected boards) where c-betting is weak. Check, let villain bet, then raise. Works with draws and sets on boards like 765 where you have equity but opponent has range advantage.'},
    {q:'Turn barrel frequency — what drives the decision?',a:'Continue barreling when: (1) you picked up equity (draw, pair), (2) the turn improves your range more than theirs (A on a low board), (3) opponent showed weakness. Slow down when you have no equity and the turn is neutral.'},
    {q:'What hands should you slow-play and when?',a:'Slow-play only when: (1) you are very deep (SPR 8+), (2) the board is dry (no draws), (3) villain is aggressive and will bet for you. Never slow-play on wet boards — you give away free equity and lose value.'},
    {q:'River bet sizing — value vs bluff?',a:'Value: size based on what worse hands call. If they call 50%, bet 50-75%. Bluff: use the same sizing as your value bets for balance. Large river bets (75-100%) polarize your range — only use when you either have the nuts or are bluffing with air.'},
  ],
  3:[
    {q:'A7s BTN vs UTG open at 40BB - 3-bet or call?',a:'Lean 3-bet. A7s blocks Ax combos, has good equity. Blocker value plus fold equity outweigh flatting.'},
    {q:'Optimal resteal spot?',a:'Shoving over late-pos open from blinds at 15-25BB. Best when opener folds often and you have decent equity when called.'},
    {q:'A7s multiway resteal - key math?',a:'Value drops with multiple potential callers. Combined calling frequencies multiply. ICM makes multiple callers catastrophic for payout equity.'},
    {q:'Villain opens 4x. What changes?',a:'Scale 3-bet up (11-13x vs typical 7-8x), or flat more if deep. Lean toward flatting strong hands rather than isolating marginals.'},
    {q:'Best 3-bet bluff candidates BTN vs CO?',a:'Suited aces A3s-A5s (block AK and AA). Suited K-x gappers. About 50% of 3-bet range should be bluffs for balance.'},
    {q:'4-bet shove vs flat a 3-bet at 25BB?',a:'4-bet shove when pot-committed (villain 3-bets to about 8-9BB leaving 16-17BB). At 25BB most re-raises are shove-or-fold decisions.'},
    {q:'Cold-call a 3-bet vs responding to a direct 3-bet — what is the difference?',a:'Critical distinction. Cold-calling = you have NOT opened yet; a player raised, another 3-bet, and you are calling both. Your range must be much stronger because you are OOP vs two ranges. Direct 3-bet response = you opened, someone 3-bet you; calling IP at 50BB+ with TT-QQ is standard. Cold-calling the same hands OOP into two strong ranges is a major leak.'},
    {q:'LJ opens, CO 3-bets, you are on BTN with TT at 50BB. What is the correct action?',a:'4-bet shove or fold. Do NOT cold-call. If you flat, LJ may call behind creating a multiway pot where TT loses most of its value. Blinds can also squeeze. 4-bet shoving isolates and generates fold equity vs CO 3-bet range. At 50BB a 4-bet shove is ~8x the 3-bet — within efficient shove range. TT has ~45-50% equity vs a CO 3-bet range, making the shove profitable.'},
    {q:'What is a squeeze play and when is it most powerful?',a:'3-betting after an open plus one or more callers. Most powerful when: opener has a wide BTN/CO range, caller has a capped range (no 3-bet preflop), and you are in position or the BB. Both players must fold or commit — combined fold frequency is high. Size bigger than a normal 3-bet: 11-14BB vs a 2.5x open with one caller.'},
    {q:'How do you construct a 3-bet range from the BB?',a:'More polarized than from BTN/CO. Value: QQ+, AK. Bluffs: A2s-A5s primarily. The BB already has money in the pot, so some hands should just call. Avoid light 3-bets OOP — the positional disadvantage is punishing.'},
    {q:'4-bet bluff hands — what makes a good one?',a:'A5s, A4s, A3s: block AA/AK (reduces villain calling combos), have nut-flush potential when called, and the wheel possibility adds hidden equity. Avoid 4-bet bluffing with blockers to your own fold equity (e.g. KK blocks the hands you want to fold out).'},
    {q:'Resteal from SB at 18BB with A7s — shove or fold?',a:'Shove. At 18BB from SB vs late position open, A7s is a clear resteal. Blocks AK/AA, has decent equity when called (~40% vs typical BTN open-call range), and fold equity is strong with just the BB remaining. The key: villain opened wide from LP.'},
    {q:'3-bet sizing: in position vs out of position?',a:'IP: 3x the open. OOP: 3.5-4x. The larger OOP size compensates for positional disadvantage — you want to build a bigger pot preflop when you have the range advantage. Against a 2x open: size up slightly (6.5-7BB IP, 8-9BB OOP) to maintain proper pressure.'},
  ],
  4:[
    {q:'SB vs BB - raise or complete?',a:'Raise about 40%, complete 15%, fold 45%. Completing gives BB perfect odds. Raise-or-fold is cleaner at normal depths.'},
    {q:'BB defense frequency vs BTN open?',a:'Defend about 50-55% (call plus 3-bet). Great pot odds, last to act preflop. At 30BB call T8s, 65s, K5o that you would fold from BTN.'},
    {q:'BB squeeze - when and with what?',a:'When BTN opens and SB cold-calls. Both have capped ranges. Use strong hands plus suited ace bluffs A3s-A5s.'},
    {q:'SB complete range at 30BB?',a:'Complete suited hands T8s-K6s range, small pairs 22-55. Raise strong hands and steals. Avoid weak offsuit hands.'},
    {q:'ICM - what is it and when does it matter?',a:'Converts chip stack into real dollar equity using payout structure. Matters near bubbles and final tables - a chip is worth LESS as you accumulate more.'},
    {q:'ICM pressure on the bubble?',a:'Tighten early-position shoves when covered by big stacks. A min-cash has real value. Widen late-position steals vs short stacks who fear busting.'},
    {q:'Push/fold threshold at 10BB UTG?',a:'About 30%+ of hands: all pairs 22+, Ax, Kxs, KTo+, broadways. Antes amplify the urgency to accumulate chips.'},
    {q:'ICM vs ChipEV near final table bubble?',a:'ChipEV says shove wider. ICM says tighten - especially medium stacks. Bigger payout jump means tighter ICM-adjusted range.'},
    {q:'SB complete range — what should you complete with?',a:'Suited hands with playability: small pairs (22-55) for set value, suited gappers (86s, 75s) for implied odds. Raise strong hands. Never complete with weak offsuit hands — you play OOP and give BB great odds. Complete is the minority action.'},
    {q:'BB facing a SB limp — what is your strategy?',a:'Raise wide for value and fold equity — SB limping is weak. Raise to 3BB with a wide range including marginal hands. Check only when SB is trapping-type or when you have a hand that plays well multiway. Never limp-in with a strong hand from BB.'},
    {q:'BvB: SB opens 2.5x, BB has 55 at 50BB. Call?',a:'Call. Small pairs in BB vs SB raise are set-mining opportunities. At 50BB the implied odds are good — if you hit your set vs an SPR of 8+ you can win a significant pot. BB has great pot odds (2:1) and closes the action.'},
    {q:'When is BvB 3-betting most dangerous for the SB?',a:'When SB opens weak hands into a competent BB. BB can 3-bet wide (exploiting SB weak range) and SB OOP in a 3-bet pot is a losing position. SB should tighten opens and widen 3-bet/folds vs an aggressive BB.'},
    {q:'ICM near the bubble: medium stack strategy?',a:'Medium stacks are most ICM-constrained. Cannot call shoves that short stacks must call (pot odds compelling but ICM cost high). Should still steal from late position vs short stacks — fold equity plus positive ICM impact if they fold.'},
    {q:'Chip leader strategy at the final table?',a:'Apply maximum ICM pressure. Shove wide vs medium stacks who are highly constrained. Be careful vs other big stacks — confrontations reduce your relative advantage. Let the medium stacks fight the short stacks; stay out of marginal spots with big stacks.'},
    {q:'PKO bounty adjustments vs regular MTT?',a:'Bounties shift strategy toward calling shoves wider — winning a bounty plus chips is strong EV. 3-bet shove more vs short stacks. Flat more hands when covering multiple players. ICM still exists from the prize pool but bounty value partially offsets it.'},
    {q:'Nash equilibrium push/fold — when to deviate?',a:'Deviate exploitatively when: (1) villain calls too tight — shove wider, (2) villain calls too loose — shove tighter with value, fold marginal blockers, (3) high ICM pressure — tighten beyond Nash near payout jumps.'},
    {q:'Monster Stack WSOP 2026 — early level chip strategy?',a:'With 300BB starting stacks play deep-stack cash game poker. Open wide, implied odds are enormous. Suited connectors and small pairs are extremely profitable. Position is paramount. Avoid marginal spots vs good players. Target recreational players.'},
    {q:'What is the 10BB rule at the final table?',a:'At 10BB you need to act within 1-2 orbits. Shoving from BTN/SB with a wide range (any Ax, pairs, broadways) is essential. Waiting for premiums at 10BB is a critical mistake — antes drain your stack and fold equity drops quickly. Shove now, not after one more orbit.'},
  ],
};

/* ── PREFLOP RANGES BY POSITION (35) ── */
{c:'Ranges',q:'UTG at 40BB with 66. Open or fold?',o:['A) Open — pair is always an open','B) Fold — 66 is in the dead zone below 40BB','C) Open — set-mining odds justify it','D) Shove — not deep enough to open'],a:'A',e:'At 40BB you cross the implied odds threshold. Set-mining needs roughly 15x: risk 1BB to potentially win 15BB+ when you hit. At 40BB effective stacks are large enough that a flopped set wins big pots. Below 40BB you cannot realize that value — 66 enters the dead zone.'},
{c:'Ranges',q:'HJ with KQo at 30BB. Action?',o:['A) Fold — KQo is too speculative','B) Open — strong broadway, standard HJ open','C) Limp — want to see a cheap flop','D) Shove — too short to play postflop'],a:'B',e:'KQo is a top-15% hand by equity and opens from HJ at any stack depth. It makes top pair top kicker on K and Q boards, has good blockers on KK/QQ, and benefits from the fold equity of a position open. Dead zone only applies to speculative hands — broadway is always playable.'},
{c:'Ranges',q:'CO with T9s at 50BB. Action?',o:['A) Fold — T9s is too speculative from CO','B) Open — suited connector in position at 50BB+','C) Limp behind if others have limped','D) Shove — maximize fold equity'],a:'B',e:'T9s at 50BB from CO has two profit paths: (1) implied odds — when you flop a straight or flush on a wet board you can win 50BB stacks, and (2) fold equity — you pick up the blinds and antes when they fold. At 50BB the implied odds math works. At 30BB it does not. That is why this hand is in CO range here but not at 30BB.'},
{c:'Ranges',q:'BTN with A2s at 25BB. Action?',o:['A) Fold — A2s is too weak at 25BB','B) Open — BTN range is wide, A2s always opens','C) Shove — 25BB is shove territory for A2s','D) Limp — A2s plays better in multiway pots'],a:'C',e:'At 25BB A2s is in the shove zone from BTN. Strong blockers on AA/AK, decent equity when called, and you generate fold equity.'},
{c:'Ranges',q:'UTG at 100BB with 87s. Open or fold?',o:['A) Fold — 87s is never an UTG open','B) Open — 100BB gives enough implied odds for suited connectors','C) Limp — reduce variance','D) It depends on table dynamics only'],a:'B',e:'At 100BB you have deep enough stacks to realize 87s equity through implied odds and position. UTG suited connectors become playable at 50BB+ deep.'},
{c:'Ranges',q:'SB with KJo at 30BB, folded to you. Action?',o:['A) Fold — KJo out of position is a trap','B) Complete — see a cheap flop','C) Raise — KJo is a standard SB open','D) Shove — 30BB is short stack territory'],a:'C',e:'KJo is strong enough to raise from SB at 30BB. Raise for value and fold equity. Completing puts you in a bad spot postflop.'},
{c:'Ranges',q:'BB with 44, BTN opens, SB folds. Call or 3-bet?',o:['A) Always 3-bet — pairs want to play heads-up','B) Fold — 44 is too weak to defend','C) Call — getting good odds with a set-mining hand','D) It depends entirely on BTN sizing'],a:'C',e:'44 is a standard BB call vs BTN open at most depths. You have the right price, position isnt needed for set-mining, and you close the action.'},
{c:'Ranges',q:'CO with ATo at 35BB. Action?',o:['A) Fold — ATo is in the dead zone','B) Open — ATo is strong enough for CO at 35BB','C) Shove — 35BB forces shove-or-fold','D) Limp — ATo plays poorly out of position'],a:'B',e:'ATo is a broadway hand with strong equity. It opens from CO at any depth including the dead zone. Only speculative hands enter the dead zone.'},
{c:'Ranges',q:'UTG at 30BB with AKo. Action?',o:['A) Open — AKo is premium regardless of depth','B) Shove — 30BB is too short to open AKo','C) Fold — wait for a better spot','D) Limp — AKo plays better in multi-way pots'],a:'A',e:'AKo is the 5th best starting hand by equity. At 30BB you open and call off any 3-bet — you have ~40% equity vs QQ (a flip), ~65% vs AQo, and crush all 3-bet bluffs. The mistake players make at 30BB is folding AK to aggression. You are never behind enough to fold getting 2:1 on a call.'},
{c:'Ranges',q:'BTN at 22BB with QJo. Action?',o:['A) Open — wide BTN range includes QJo','B) Fold — QJo is marginal at 22BB','C) Shove — 22BB puts us in shove territory','D) Limp — QJo flops well'],a:'C',e:'At 22BB QJo is a shove from BTN. Strong enough broadway hand, generates fold equity, and has decent equity when called by the blinds.'},
{c:'Ranges',q:'HJ at 40BB with J9s. Open or fold?',o:['A) Open — J9s has good implied odds at 40BB','B) Fold — J9s is marginal from HJ','C) Open only if no tight players behind','D) Shove — maximize fold equity'],a:'A',e:'At 40BB+ you cross the threshold for suited connectors. J9s from HJ is a standard open for implied odds and playability.'},
{c:'Ranges',q:'UTG at 60BB with 22. Open or fold?',o:['A) Fold — 22 is too speculative from UTG','B) Open — pairs always open at 60BB+','C) Open only from BTN or later','D) Limp — set-mining only'],a:'B',e:'At 60BB you have the implied odds to set-mine even from UTG. 22 is a standard open — if you flop a set you can win a big pot.'},
{c:'Ranges',q:'CO at 20BB with KTs. Action?',o:['A) Open — KTs is strong enough to open','B) Fold — too short to open KTs','C) Shove — 20BB is shove territory','D) Limp — KTs plays better in position'],a:'C',e:'At 20BB we use the 3-bucket system: KTs is a raise/fold hand (open 2x, fold to a jam). It has blocker value and is profitable to open, but at ~38% equity vs a calling range it is not strong enough to call a shove. Open 2x, pick up the blinds and antes when it works, fold cleanly when jammed on.'},
{c:'Ranges',q:'BTN at 50BB with 54s. Open or fold?',o:['A) Fold — 54s is too speculative','B) Open — BTN range is wide enough for 54s at 50BB','C) Open only if SB and BB are weak','D) Limp — 54s needs to see cheap flops'],a:'B',e:'At 50BB with BTN position, 54s is in range. Good implied odds, great playability in position, and you cover the gap with stack depth.'},
{c:'Ranges',q:'SB at 40BB with 98o, BB is a calling station. Raise or fold?',o:['A) Raise — 98o is in SB range at 40BB','B) Fold — 98o OOP vs calling station is -EV','C) Complete — see a cheap flop','D) Shove — remove postflop decisions'],a:'B',e:'Against a calling station who will call and play well postflop, 98o OOP loses its fold equity and plays poorly. Fold or complete only.'},
{c:'Ranges',q:'UTG+1 (HJ) at 100BB with AJo. Action?',o:['A) Fold — AJo is a trap hand from early position','B) Open — AJo is a standard HJ open at any depth','C) Limp — AJo is reverse implied odds OOP','D) 3-bet if there was a limp'],a:'B',e:'AJo is a clear open from HJ. Strong broadway, top pair top kicker on J-high boards, and you have fold equity against the remaining positions.'},
{c:'Ranges',q:'BTN at 30BB with 33. Action?',o:['A) Fold — too shallow to set-mine','B) Open — BTN range includes 33 even at 30BB','C) Shove — 30BB is shove territory for small pairs','D) Limp — small pairs need cheap flops'],a:'B',e:'From BTN you open 33 at any depth above 20BB. At 30BB you have fold equity when opened and can still set-mine if called.'},
{c:'Ranges',q:'CO at 45BB with Q9s. Open or fold?',o:['A) Fold — Q9s is too speculative from CO','B) Open — Q9s is a standard CO open at 45BB+','C) Open only if tight players behind','D) Limp — suited cards need cheap flops'],a:'B',e:'Q9s at 45BB from CO is just above the dead zone threshold (40BB). It can make strong hands (flushes, straights, two pair) that pay off vs the implied odds. In position postflop you can realize that equity. At 35BB you would fold Q9s from CO — the implied odds math breaks down.'},
{c:'Ranges',q:'UTG at 50BB with TT. Action?',o:['A) Open — TT is a strong pair, standard UTG open','B) Limp — TT flops poorly, keep pot small','C) Shove — TT is too vulnerable to flat at 50BB','D) Fold if there are aggressive players behind'],a:'A',e:'TT is a standard open from any position. At 50BB you can open and call off a 3-bet profitably, or fold to a 5-bet with short stacks.'},
{c:'Ranges',q:'HJ at 25BB with A5s. Action?',o:['A) Open — A5s is a standard open','B) Fold — A5s is in the dead zone','C) Shove — 25BB puts A5s in shove territory','D) Limp — suited aces like multiway pots'],a:'C',e:'At 25BB A5s is a shove from HJ. Strong blocker, nut flush draw equity, and fold equity combine to make this a clear shove.'},
{c:'Ranges',q:'CO at 30BB with KJo. Open or fold?',o:['A) Fold — KJo is dominated too often from CO','B) Open — KJo is a standard CO open at any depth','C) Open only if BTN is tight','D) Shove — avoid postflop decisions'],a:'B',e:'KJo is a broadway hand that opens from CO at any depth. Unlike suited connectors it does not need implied odds — it makes strong one-pair hands that win pots. 30BB is in the dead zone for speculative hands only. Broadway hands like KJo are immune to the dead zone because they do not rely on implied odds to be profitable.'},
{c:'Ranges',q:'BTN at 18BB with 77. Action?',o:['A) Open — 77 is strong enough to open','B) Shove — 18BB is shove territory for 77','C) Fold — 77 plays poorly short-stacked','D) Limp — small-medium pairs need to set-mine'],a:'B',e:'At 18BB 77 is a shove from BTN. Mid pair has good equity when called, strong fold equity, and you avoid difficult postflop spots.'},
{c:'Ranges',q:'SB at 50BB with Q8s, BB is unknown. Action?',o:['A) Fold — Q8s OOP is too speculative','B) Raise — Q8s is in SB opening range at 50BB','C) Complete — Q8s plays well multiway','D) Shove — maximize fold equity'],a:'B',e:'Q8s from SB at 50BB raises because: (1) you have fold equity against just the BB, (2) suited cards have nut-flush potential that adds 2-3% equity in any pot, (3) at 50BB you can navigate postflop in position vs the BB. The key: you only face one player. vs multiple players Q8s becomes a liability.'},
{c:'Ranges',q:'UTG at 75BB with AQo. Action?',o:['A) Open — AQo is a premium UTG open','B) Limp — AQo is dominated by AK too often','C) Open and fold to 3-bet always','D) Open and 4-bet shove vs any 3-bet'],a:'A',e:'AQo is a clear UTG open at any depth. Top 10% hand. Open and navigate based on action — call 3-bets from position, fold to 4-bets unless very deep.'},
{c:'Ranges',q:'Correct open sizing at 20BB in a tournament?',o:['A) 3x — standard sizing regardless of depth','B) Shove — 20BB is short enough to just jam everything','C) 2x (min-raise) — risk minimum, achieve same fold equity, lose less when 3-bet jammed','D) 2.5x — the universally correct tournament size'],a:'C',e:'At 20BB a 2x open is correct. Raising 3x means you fold to jams losing 3BB instead of 2BB — that extra BB is significant at this depth. The 2x open achieves the same steal objective at minimum cost, and when jammed on the decision is clear: call strong hands, fold blockers.'},
{c:'Ranges',q:'BTN opens 2x at 20BB, you are in BB with A5s. Should you 3-bet jam or call?',o:['A) 3-bet jam — A5s has great blockers and equity','B) Call — see a cheap flop with suited ace','C) Fold — A5s is too weak','D) Small 3-bet to 5BB, fold to a jam'],a:'D',e:'A5s is a 3-bet/fold at 20BB, not a shove. Open 5-6BB, then fold if 4-bet jammed. A5s has blocker value (reduces AA/AK combos) making the small 3-bet profitable via folds. Shoving 20BB with A5s puts your tournament life at risk for insufficient gain. GTO Wizard shows a 5BB 3-bet is the correct play at this depth.'},
{c:'Ranges',q:'You have QQ at 22BB, UTG. Open 2x or shove?',o:['A) Shove — get it all-in with the best hand preflop','B) Open 2x — want callers, shoving folds out too many hands you dominate','C) Open 3x to build a bigger pot','D) Limp — disguise your strength'],a:'B',e:'Open QQ to 2x at 22BB. Shoving 22BB with QQ folds out 77-JJ, AJo, KQo — all hands that would call a 2x raise and be dominated. Opening small and calling off a jam is more profitable. You want to be called by worse hands, and 2x gets more of those calls than a shove.'},
{c:'Ranges',q:'What is the raise/fold line at 20BB and why is it profitable?',o:['A) There is no raise/fold at 20BB — always shove or fold','B) Open 2x with blocker hands like A5s and K-high suited hands, fold to a jam — costs 2BB to steal, wins 2.5BB in blinds and antes when it works','C) Only raise/fold with premium hands to set a trap','D) Raise/fold is only correct above 30BB'],a:'B',e:'The raise/fold line at 20BB is opening 2x with hands that have good blocker value but cannot call a shove (A5s, A4s, KTs, KQs). You invest 2BB to pick up 2.5BB in blinds+antes when it folds through — immediately profitable. When 3-bet jammed, fold. The blocker value on your hand means villain jams slightly less often, making the steal more profitable than a direct shove.'},
{c:'Ranges',q:'HJ at 35BB with 76s. Open or fold?',o:['A) Open — 76s is a standard HJ open above 30BB','B) Fold — 76s is in the dead zone at 35BB','C) Open only if tight players in the blinds','D) Shove — 35BB makes this a shove'],a:'B',e:'76s from HJ at 35BB is squarely in the dead zone. Too shallow for implied odds (need 50BB+), too deep to shove profitably. Fold.'},
{c:'Ranges',q:'CO at 20BB with AJo. Action?',o:['A) Open — AJo is strong enough to open','B) Fold — too short to open AJo','C) Shove — 20BB puts AJo in shove territory','D) Limp — AJo plays better in multiway pots'],a:'C',e:'At 20BB AJo is a shove from CO. Strong hand that generates fold equity and has great equity when called by any reasonable range.'},
{c:'Ranges',q:'BTN at 100BB with K2s. Open or fold?',o:['A) Fold — K2s is too weak regardless of depth','B) Open — BTN range includes K2s at 100BB','C) Limp — K2s needs a cheap flop','D) Open only vs specific player types'],a:'B',e:'At 100BB with BTN position and fold equity against two players, K2s becomes a profitable open. Suited, has backdoor nut flush draws, blocker on KK.'},
{c:'Ranges',q:'UTG at 40BB with 99. Action?',o:['A) Open — 99 is a standard UTG open','B) Shove — 99 is too strong to just open','C) Limp — 99 is vulnerable to overcards','D) Fold — too many overcards will come'],a:'A',e:'99 is a standard UTG open at any depth above 15BB. It is in the top 10% of hands and benefits from opening for value and fold equity.'},
{c:'Ranges',q:'HJ with 65s at 60BB. Open or fold?',o:['A) Fold — 65s is marginal from HJ','B) Open — 60BB gives enough implied odds for 65s from HJ','C) Limp — suited connectors like multiway pots','D) Only open if CO and BTN are tight'],a:'B',e:'At 60BB from HJ you have the depth to justify 65s. Implied odds are strong, and you have reasonable position vs the blinds.'},
{c:'Ranges',q:'CO at 15BB with QQ. Action?',o:['A) Open — QQ is premium, open at any depth','B) Shove — 15BB puts QQ in shove territory','C) Limp — trap with a strong hand','D) Open and fold to a shove'],a:'B',e:'At 15BB QQ is a shove from any position. Too shallow to open and fold, and you want the fold equity plus protection against bad runouts.'},
{c:'Ranges',q:'BTN at 40BB with KTo. Action?',o:['A) Fold — KTo is too speculative from BTN','B) Open — BTN range is wide, KTo is standard','C) Limp — KTo plays better multiway','D) Open only vs tight blinds'],a:'B',e:'KTo is a standard BTN open at any depth. From BTN you open near 45-50% of hands and KTo is a solid broadway hand in that range.'},
{c:'Ranges',q:'UTG at 30BB with 55. Action?',o:['A) Open — 55 is a standard UTG open','B) Fold — small pairs enter the dead zone at 30BB','C) Shove — 30BB is short stack territory','D) Limp — small pairs need cheap flops'],a:'B',e:'55 from UTG at 30BB is in the dead zone. Too shallow for set-mining implied odds, too deep to shove profitably. Fold and wait.'},
{c:'Ranges',q:'SB at 30BB with AKs, BB is a nit. Action?',o:['A) Raise — AKs is premium, always raise','B) Complete — trap with a strong hand','C) Shove — 30BB is short enough for AKs shove','D) Raise small — keep pot manageable'],a:'A',e:'AKs is the 4th best starting hand and never completes. Completing gives BB perfect odds to see a flop with any hand. Raising builds the pot with your range advantage and folds hands that have live equity vs AKs (like 22-55 that would otherwise set-mine cheaply). Against a nit BB, AKs still raises — nits 3-bet only premiums, and vs premiums AKs has 35-45% equity.'},
{c:'Ranges',q:'CO at 75BB with J8s. Open or fold?',o:['A) Open — J8s is in CO range at 75BB','B) Fold — J8s is too speculative from CO','C) Limp — J8s needs a cheap flop','D) Open only if BTN is tight'],a:'A',e:'At 75BB from CO, J8s is a playable hand with good implied odds, suited connectivity, and enough stack to realize equity in position.'},
/* ── STACK DEPTH DECISIONS (20) ── */
{c:'Depth',q:'Dead zone definition?',o:['A) 10-20BB where you should shove everything','B) 23-40BB where speculative hands lose EV — too shallow for implied odds, too deep to shove','C) 40-60BB where you play cautiously','D) Any depth below 50BB'],a:'B',e:'The dead zone is 23-40BB. Speculative hands like suited connectors and small pairs cannot realize equity (too shallow) and cannot shove profitably (too deep).'},
{c:'Depth',q:'At 38BB with T9s from UTG. Action?',o:['A) Open — approaching the 40BB threshold','B) Fold — still in the dead zone','C) Shove — 38BB is close enough to shove territory','D) Open only if antes are large'],a:'B',e:'The 40BB threshold is not arbitrary — it is the point where set-mining and draw-equity implied odds become profitable. At 38BB you risk 2BB to potentially win a pot of maybe 20BB when you hit. That is ~10x implied odds. You need 15x for speculative hands to break even. Two more BBs in the pot (at 40BB) changes the math enough. Fold at 38BB, open at 40BB.'},
{c:'Depth',q:'At what stack depth does set-mining become profitable with small pairs?',o:['A) 25BB+ with any pair','B) 40BB+ in position','C) 50BB+ with deep implied odds stacks','D) Only profitable with antes'],a:'C',e:'You need roughly 15x implied odds to set-mine profitably. At 50BB+ you can win a large enough pot when you hit. Shallower stacks cannot justify the investment.'},
{c:'Depth',q:'At 22BB with 67s from CO. Action?',o:['A) Open — 67s is playable at 22BB','B) Fold — dead zone','C) Shove — 22BB is at the shove threshold for 67s','D) Limp — suited connectors like multiway pots'],a:'C',e:'22BB is exactly the shove threshold for 67s from CO. It generates fold equity and has decent equity when called. Shoving beats both opening and folding.'},
{c:'Depth',q:'Why are suited connectors worse at 30BB than 60BB?',o:['A) They are not, suited connectors play the same at any depth','B) At 30BB you cannot win a big enough pot to justify the preflop investment when you hit','C) Opponents play better at lower stakes','D) The blinds increase faster at 30BB'],a:'B',e:'Implied odds require deep stacks. At 30BB if you flop a flush draw and get it in, the pot is not big enough relative to your stack to justify speculative play preflop.'},
{c:'Depth',q:'At 50BB you open CO with 98s. BTN 3-bets. Action?',o:['A) Always fold — 98s cannot call a 3-bet','B) Call — deep enough for implied odds in position','C) 4-bet shove — maximize fold equity','D) 4-bet small and fold to a 5-bet'],a:'B',e:'At 50BB with 98s in position vs a 3-bet, you have the implied odds and position to call profitably. You can outplay opponents when you connect with the board.'},
{c:'Depth',q:'At 25BB with KK from UTG. Raise or shove?',o:['A) Open — KK should always open, never shove preflop','B) Shove — 25BB means KK should shove for maximum value','C) Open — you want action, shoving folds too many hands','D) Open to 2.5BB to build the pot slowly'],a:'A',e:'At 25BB you open KK. You want action and shoving often folds everyone. Open, and if someone 3-bets you call off your stack happily.'},
{c:'Depth',q:'At 40BB the effective stack is reached. What changes about speculative hands?',o:['A) Nothing changes — always fold speculative hands','B) Suited connectors and small pairs become profitable opens for the first time in the dead zone','C) You should only play premium hands at 40BB','D) Position matters less at 40BB'],a:'B',e:'At 40BB+ suited connectors and small pairs re-enter your opening range. You have enough depth for implied odds (set-mining, hitting straights/flushes) to justify the investment.'},
{c:'Depth',q:'You have 28BB at a WSOP tournament. Antes are running. What is your primary preflop strategy?',o:['A) Limp frequently to see cheap flops','B) Play tight and wait for premium hands','C) Open tight broadway range, shove strong hands and good blockers','D) Call off shoves widely to accumulate chips'],a:'C',e:'At 28BB with antes, you are in the dead zone for speculative hands but can still open broadway hands. Shove AJs+, 99+, strong aces. Fold marginal speculative hands.'},
{c:'Depth',q:'At 35BB with AJo from HJ. There has been one limp. Action?',o:['A) Raise — AJo is strong enough to isolate','B) Limp behind — AJo plays better multiway','C) Fold — AJo is dominated too often','D) Shove — 35BB + dead money makes this a shove'],a:'A',e:'AJo is a clear raise to isolate the limper from HJ at 35BB. You have a strong hand, fold equity, and position on the limper.'},
{c:'Depth',q:'At 15BB should you ever open-raise instead of shove?',o:['A) Yes — opening keeps pot smaller and gives options','B) No — at 15BB all opens are effective shoves, just shove directly','C) Only with AA and KK','D) Yes if there are aggressive players behind you'],a:'B',e:'At 15BB an open followed by a call commitment is essentially a shove anyway. Shoving directly is cleaner, maximizes fold equity, and avoids awkward spots.'},
{c:'Depth',q:'You have 45BB and face a 3-bet to 9BB. You have QQ. Action?',o:['A) Fold — QQ is too vulnerable against a 3-bet range','B) Call — keep pot manageable','C) 4-bet shove — at 45BB QQ is a clear 4-bet shove','D) 4-bet small to 18BB'],a:'C',e:'At 45BB with QQ the SPR after calling a 3-bet would be roughly 2-3 — you are committed on almost every flop. Instead of paying 9BB to call and then having no options, 4-bet shove to ~24-26BB. You are ahead of the 3-bettor range (which includes JJ, TT, AK, AQs) and get folds from the weakest parts. Flatting QQ here means playing OOP with an overpair in a bloated pot. 4-bet shove removes the guessing game.'},
{c:'Depth',q:'At 60BB with A5s from SB facing a BTN open. Action?',o:['A) Fold — A5s OOP is too speculative','B) Call — implied odds and blocker value justify calling','C) 3-bet — A5s is an excellent bluff 3-bet with blockers','D) Always fold suited aces from SB vs BTN'],a:'C',e:'A5s is a premium 3-bet bluff from SB vs BTN at 60BB. It blocks AK and AA combos, has nut flush potential, and generates fold equity.'},
{c:'Depth',q:'What is the minimum depth to open 22 from UTG?',o:['A) Any depth — pairs always open from UTG','B) 20BB — pairs shove below this','C) 40BB+ — need implied odds to set-mine','D) 30BB — small pairs are in range at this depth'],a:'C',e:'Small pairs from UTG need 40BB+ to open. Below that you cannot realize set-mining equity. Between 20-39BB small pairs are in the dead zone — shove at 20BB or less.'},
{c:'Depth',q:'At 30BB with 88 from CO. Open or shove?',o:['A) Open — 88 is strong enough to open at 30BB','B) Shove — 30BB puts 88 in shove territory','C) Fold — 88 is in the dead zone','D) Depends on the players in the blinds'],a:'A',e:'88 is above the dead zone threshold. Strong pairs (77+) open at 30BB. Only small pairs (22-66) and speculative hands fall into the dead zone.'},
{c:'Depth',q:'Tournament levels just increased. You went from 40BB to 32BB. How do your suited connectors change?',o:['A) No change — same strategy at 32BB as 40BB','B) Drop suited connectors from UTG/HJ — you have entered the dead zone','C) Shove all suited connectors now','D) Only play suited connectors from BTN now'],a:'B',e:'At 32BB you have crossed into the dead zone for suited connectors. Drop them from UTG and HJ. You can still open them from CO/BTN/SB where the range advantage is higher.'},
{c:'Depth',q:'At 55BB with TT in the BB, BTN opens, SB calls. Action?',o:['A) Fold — TT plays poorly multiway','B) 3-bet — TT is strong enough to squeeze here','C) Call — implied odds multiway with an overpair','D) It depends entirely on BTN sizing'],a:'B',e:'TT is a strong hand and squeezing here isolates the field or wins the pot. Against the BTN open range TT is often the best hand. Squeeze for value and fold equity.'},
{c:'Depth',q:'You have 70BB. The effective stack is 30BB because your opponent is short. How does this change your opening strategy?',o:['A) No change — your strategy is based on your stack','B) Play as if you have 30BB effective — shorter stack drives the action','C) Always fold — effective short stack creates too much risk','D) Shove immediately with any good hand'],a:'B',e:'Effective stack depth is what matters. When playing against a 30BB stack, your implied odds are based on their 30BB, not your 70BB. Adjust your strategy to the effective depth.'},
{c:'Depth',q:'At 42BB with 65s from BTN. Open or fold?',o:['A) Fold — 65s is marginal at 42BB','B) Open — just crossed 40BB threshold, 65s opens from BTN','C) Shove — maximize fold equity','D) Limp — suited connectors need multiway action'],a:'B',e:'At 42BB you have crossed the 40BB threshold where suited connectors become profitable. From BTN you can open 65s for implied odds and position.'},
{c:'Depth',q:'Monster Stack event starts with 60,000 chips and 100/200 blinds. That is 300BB. How does this affect early strategy?',o:['A) Play ultra-tight since you have so many chips to protect','B) Play very deep stack poker — open wider, implied odds are massive, speculative hands are very profitable','C) No change — strategy is the same at any depth','D) Shove more often to maximize fold equity'],a:'B',e:'300BB deep stacks fundamentally change poker. Implied odds are enormous, suited connectors and small pairs are extremely profitable, and position is worth even more than usual.'},
/* ── SHORT STACK PUSH/FOLD (25) ── */
{c:'Short Stack',q:'At 12BB UTG with A8o. Shove or fold?',o:['A) Fold — A8o from UTG is too risky','B) Shove — A8o is in the shove range at 12BB UTG','C) Open to 2.5BB','D) Limp and evaluate'],a:'B',e:'At 12BB the math: shoving 12BB into a pot of 2.5BB (blinds + antes) means you risk 12 to win 2.5 when everyone folds. You need that to work ~83% of the time to break even on fold equity alone. A8o has blocker value on AA/AK (reducing calling combos) and ~40-45% equity vs the ranges that do call. Combined, this is clearly profitable to shove.'},
{c:'Short Stack',q:'At 8BB in the BB with 73o, SB shoves. Call or fold?',o:['A) Fold — 73o is too weak to call a shove','B) Call — getting 2:1 odds, almost any two cards are a call','C) Call only if SB is aggressive','D) Always fold non-paired hands below T-high'],a:'B',e:'At 8BB you are getting 2:1 pot odds and need only about 33% equity. 73o has roughly 35-40% equity vs most shove ranges. Call.'},
{c:'Short Stack',q:'At 20BB with KQo from UTG. Shove or open?',o:['A) Open to 2.5BB — KQo plays better with room to navigate','B) Shove — 20BB puts KQo in shove territory from UTG','C) Fold — KQo is dominated too often from UTG','D) Limp — KQo flops well'],a:'B',e:'At 20BB KQo is a shove from UTG. Strong broadway hand with great equity, fold equity, and you avoid difficult postflop spots.'},
{c:'Short Stack',q:'15BB at the bubble. BTN shoves, you have JJ in the BB. Call or fold?',o:['A) Fold — ICM says protect your stack at the bubble','B) Call — JJ has more than enough equity vs BTN shove range','C) It depends on stack sizes of other players','D) Always fold anything below QQ at the bubble'],a:'C',e:'JJ is a call in most cases, but ICM matters here. If there are shorter stacks about to bust and a min-cash matters, you might fold JJ. Assess the ICM impact first.'},
{c:'Short Stack',q:'At 10BB with 55 from CO, two players behind. Shove or fold?',o:['A) Fold — 55 is vulnerable with players behind','B) Shove — 55 is a standard shove from CO at 10BB','C) Open to 2x — keep the pot smaller','D) Limp — set-mine cheaply'],a:'B',e:'55 is a shove from CO at 10BB. Good equity (~50%) vs overcards, fold equity against the players behind, and position on the blinds if called.'},
{c:'Short Stack',q:'At 18BB with A2s from HJ. Action?',o:['A) Fold — A2s is too weak from HJ','B) Open — A2s is playable at 18BB','C) Shove — 18BB puts A2s in shove territory','D) Limp — suited aces need cheap flops'],a:'C',e:'At 18BB A2s is a shove from HJ. Strong blocker on AA/AK, nut flush potential when called, and enough fold equity to make it profitable.'},
{c:'Short Stack',q:'At 22BB with KJo from BTN. Action?',o:['A) Open — KJo is too strong to just shove','B) Shove — 22BB is at the top of shove territory for KJo','C) Fold — KJo gets dominated by AK and AJ','D) Limp — KJo plays well multiway'],a:'B',e:'At 22BB KJo is a shove from BTN. Strong broadway hand, generates fold equity against the blinds, and has decent equity when called.'},
{c:'Short Stack',q:'At 15BB with Q8s from SB, BB is a calling station. Shove or fold?',o:['A) Shove — Q8s is in range regardless of opponent tendency','B) Fold — against a calling station Q8s loses its fold equity advantage','C) Shove — suited hands always shove at 15BB','D) Complete — see a cheap flop'],a:'B',e:'Against a calling station you lose fold equity. Q8s is borderline at 15BB and is much weaker when the fold equity component is gone. Fold or complete.'},
{c:'Short Stack',q:'At 12BB with TT from UTG. Shove or open to 2.5BB?',o:['A) Open to 2.5BB — TT is strong enough to build a pot','B) Shove — at 12BB open-shoving TT maximizes value','C) Limp — trap with a strong hand','D) Fold — too many overcards'],a:'B',e:'At 12BB you shove TT. An open-raise and then fold to a 3-bet wastes your hand. Shoving gets called by worse pairs and gets folds from overcards.'},
{c:'Short Stack',q:'At 20BB with AA from UTG. Shove or open?',o:['A) Open to 2.5BB — AA wants callers, not folds','B) Shove — 20BB means AA should shove for value','C) Limp — maximize action multiway','D) Open to 2x to encourage calls'],a:'A',e:'At 20BB you open AA. Shoving folds hands that would call a raise and continue. Open to 2.5BB and call any 3-bet. You want to be called.'},
{c:'Short Stack',q:'At 17BB from BTN with K9o. Action?',o:['A) Fold — K9o is too marginal','B) Open to 2BB','C) Shove — K9o is in BTN shove range at 17BB','D) Limp behind if there are limpers'],a:'C',e:'At 17BB K9o is a shove from BTN. Decent blocking cards, fold equity against two players, and acceptable equity when called.'},
{c:'Short Stack',q:'At 8BB in CO with 96s. Shove or fold?',o:['A) Fold — 96s is too speculative at any depth','B) Shove — at 8BB almost any two decent cards shove','C) Open to 2x','D) Limp — suited cards need cheap flops'],a:'B',e:'At 8BB you are desperately short and need to accumulate chips. 96s suited has decent equity when called and generates fold equity. Shove.'},
{c:'Short Stack',q:'WSOP Super Turbo Bounty at 15BB. Your neighbor has 10BB. You have A9o from HJ. Shove or open?',o:['A) Open to 2.5BB — A9o is strong enough to open','B) Shove — 15BB puts A9o in shove territory','C) Fold — wait for a better spot','D) Limp to see a cheap flop'],a:'B',e:'In a Super Turbo at 15BB you shove A9o from HJ. Strong ace, fold equity, and in turbo formats accumulating chips is more important than ICM caution.'},
{c:'Short Stack',q:'At 19BB with JTo from BTN. Shove or open?',o:['A) Open — JTo plays well postflop','B) Shove — 19BB puts JTo in shove territory from BTN','C) Fold — JTo gets dominated','D) Limp — JTo needs to see flops'],a:'B',e:'JTo at 19BB from BTN sits above the raise/fold threshold — it is strong enough to shove, not just open/fold. Its equity vs the BB and SB calling ranges is roughly 42-46% (connected cards with straight potential). The fold equity from BTN (vs 2 players) plus that equity makes this a profitable shove. Waiting is wrong — antes are eating your stack.'},
{c:'Short Stack',q:'At 22BB with 77 in the BB, CO shoves. Call or fold?',o:['A) Fold — 77 has too many overcards','B) Call — 77 has about 50% equity vs CO shove range and getting good odds','C) It depends entirely on player reads','D) Only call if CO is very aggressive'],a:'B',e:'At 22BB vs a CO shove, 77 has roughly 52-55% equity vs a reasonable shove range. With pot odds included this is a profitable call.'},
{c:'Short Stack',q:'At 15BB with A5o from UTG. Shove or fold?',o:['A) Shove — A5o is in UTG shove range at 15BB','B) Fold — A5o from UTG is dominated too often','C) Open to 2.5BB','D) Limp behind'],a:'A',e:'At 15BB A5o is a shove from UTG. Decent blocker, fold equity, and acceptable equity vs calling ranges. With antes, urgency increases.'},
{c:'Short Stack',q:'At 20BB with KK from BTN. Shove or open?',o:['A) Open to 2.5BB — KK wants callers','B) Shove — KK should shove at 20BB for maximum value','C) Limp to disguise hand strength','D) Open to 4x to get it in'],a:'A',e:'Open KK at 20BB. You want callers. Shoving KK often folds worse hands that would gladly call a raise. Open and go all-in vs any 3-bet.'},
{c:'Short Stack',q:'Colossus tournament, 18BB. ATo from HJ. Shove or open?',o:['A) Open — ATo is too strong to just shove','B) Shove — 18BB is shove territory for ATo from HJ','C) Fold — ATo gets dominated by AJ, AQ, AK','D) Limp and hope to see a cheap flop'],a:'B',e:'At 18BB ATo shoves from HJ. Strong ace, good fold equity, and great equity vs blind calling ranges. In the Colossus field many players call too loose, making this even better.'},
{c:'Short Stack',q:'At 10BB with 33 from SB, BB is a strong player. Shove or complete?',o:['A) Complete — set-mine cheaply','B) Shove — 33 generates fold equity and has decent equity','C) Fold — 33 is too weak','D) Depends on reads only'],a:'B',e:'At 10BB, completing 33 puts you in the worst possible spot: OOP, in a small pot, against a skilled opponent who acts last. They can check behind on the flop and realize equity cheaply, or bet you off your equity on bad boards. Shoving 33 has two outcomes: BB folds (you win 2.5BB) or BB calls (you have ~48-52% equity vs their calling range — a near-flip). Shoving is more profitable than completing because it denies BB the chance to outplay you postflop.'},
{c:'Short Stack',q:'At 25BB with QQ from UTG. Open or shove?',o:['A) Shove — QQ at 25BB should just get it in','B) Open to 2.5BB — QQ wants value, not folds','C) Open to 3BB — slightly larger to build pot','D) Limp to disguise strength'],a:'B',e:'Open QQ at 25BB. Shoving folds hands you dominate. Open and call off any 3-bet — at 25BB you are committed to QQ regardless.'},
{c:'Short Stack',q:'At 16BB UTG in the Freezeout event with J9s. Shove or fold?',o:['A) Shove — J9s has good equity and fold equity','B) Fold — J9s is too speculative from UTG','C) Open to 2x','D) Limp and see a flop'],a:'B',e:'J9s from UTG at 16BB is a fold. Too many callers can come in behind you, and UTG shove ranges are tighter. Wait for a better position or better hand.'},
{c:'Short Stack',q:'At 13BB from BTN with A3o. SB is a nit. Action?',o:['A) Fold — A3o is too weak','B) Shove — A3o from BTN vs likely tight blinds is a clear shove','C) Open to 2x','D) Limp — A3o plays poorly as a shove'],a:'B',e:'At 13BB from BTN vs a tight SB, A3o shoves for fold equity. Even when called you have blocker equity. A3o is clearly in the BTN shove range here.'},
{c:'Short Stack',q:'At 20BB with 99 in the BB, UTG shoves. Call or fold?',o:['A) Fold — 99 vs UTG shove range is a coinflip at best','B) Call — 99 is comfortably ahead of UTG 20BB shove range','C) It depends on tournament stage','D) Fold unless you cover the shoving player'],a:'B',e:'99 vs UTG 20BB shove range is actually a favourite. UTG shoves wide enough (pairs, Ax, broadways) that 99 has around 55-60% equity. Call.'},
{c:'Short Stack',q:'At 15BB, the antes make the effective pot larger. How does this affect your shove range?',o:['A) No effect — antes do not change push/fold ranges','B) Widen your shove range — antes increase the reward for winning blinds+antes uncontested','C) Tighten your range — more money in the pot means more risk','D) Only affects BB vs SB decisions'],a:'B',e:'Antes increase the prize for stealing and make shoves more profitable. Your shove range should widen by about 5-10% of hands when antes are running.'},
{c:'Short Stack',q:'Super Turbo Bounty at 12BB with KQs from CO. Action?',o:['A) Open to 2x — KQs is too strong to shove','B) Shove — 12BB is shove territory, KQs is an excellent shove hand','C) Fold — wait for a stronger hand','D) Limp — KQs plays well multiway'],a:'B',e:'KQs is a premium shove at 12BB from CO. Strong suited broadway, great equity when called, good fold equity vs the field. In a bounty format hitting a call is even better.'},
/* ── C-BET SIZING AND BOARD TEXTURE (25) ── */
{c:'C-Bet',q:'You open CO, BTN calls. Flop is K72 rainbow. Optimal c-bet strategy?',o:['A) Check — dry boards favor the caller','B) Bet large — 70% pot to protect your range','C) Bet small — 25-33% pot, board heavily favors your range','D) Check-raise if bet into'],a:'C',e:'K72r works with small bets because your range is far ahead. The caller folds most draws, pairs below K, and speculative hands to a small bet. Betting large would fold the same hands you could extract thin value from. Key principle: when you have range advantage (board hits your range much more than theirs), use small sizes at high frequency — not large sizes at low frequency.'},
{c:'C-Bet',q:'You open BTN, BB calls. Flop is 986 with two clubs. Optimal c-bet strategy?',o:['A) Bet large or check — wet board requires polarized betting','B) Bet small at high frequency','C) Always check — wet boards favor the defender','D) Bet pot — protect your equity'],a:'A',e:'On a wet connected board like 986cc, you should bet large when you bet (to charge draws) or check with your bluffs. Small bets do not charge draws and give away cheap equity.'},
{c:'C-Bet',q:'What is the primary factor determining c-bet sizing?',o:['A) Your hand strength','B) Stack depth','C) Board texture — how well it connects with each range','D) Position only'],a:'C',e:'Board texture drives sizing because it determines WHO has the range advantage. On A72r the raiser has AA, AK, AQ — caller rarely does. Raiser bets small, caller cannot profitably raise without a strong hand. On 987tt the caller has 87s, 76s, sets — raiser often has air. Now a small bet gets raised, so the raiser either bets large (to charge draws) or checks (to control pot). Range advantage = small bet. Range disadvantage = large bet or check.'},
{c:'C-Bet',q:'You open HJ, CO calls. Flop is QJT rainbow. C-bet or check?',o:['A) Always c-bet — you are the preflop aggressor','B) Check frequently — this board connects heavily with CO calling range','C) Bet large — protect your strong hands','D) Bet small — probe for weakness'],a:'B',e:'QJT rainbow connects extremely well with a CO calling range (two pairs, sets, straights). Your range advantage is minimal. Check frequently and respond to the CO.'},
{c:'C-Bet',q:'You 3-bet SB vs BTN open, BTN calls. Flop is A53 rainbow. C-bet or check?',o:['A) Check — aces are dangerous','B) Bet small — A-high boards heavily favor 3-bettor range','C) Bet large — protect your strong hands','D) It depends entirely on your specific hand'],a:'B',e:'On A53r as the 3-bettor, count your strong hands vs their strong hands. Your range: AA, AK, AQ, KK, QQ, JJ, TT — all crush this board. Their range: mostly pairs (TT-66) that missed, and some AXo that called. You have a massive range advantage. Small bet (25-33%) at ~90% frequency is correct — it charges the few draws that exist and extracts value from all their weaker pairs. Checking wastes equity and lets them realize hands for free.'},
{c:'C-Bet',q:'On a T65 two-tone flop, when should you check as the preflop raiser?',o:['A) Never — always c-bet as the aggressor','B) With your weakest hands only','C) With bluffs that have low equity — your range advantage is minimal on this board','D) Only when in position'],a:'C',e:'T65 two-tone connects with the caller\'s range well. Check your weakest bluffs (low equity hands without draws) and bet with draws and made hands.'},
{c:'C-Bet',q:'What sizing should you use on a paired board like KK7?',o:['A) Large — paired boards are dangerous','B) Small — paired boards heavily favor the preflop raiser','C) Check — paired boards are traps','D) The same sizing you use on every board'],a:'B',e:'Paired boards with a high card like KK7 heavily favor the preflop raiser who has AK, KQ, KJ, and all pairs in range. Use small sizing at high frequency.'},
{c:'C-Bet',q:'You are OOP after c-betting the flop. Turn is a blank. Should you barrel?',o:['A) Always barrel — maintain aggression','B) Barrel with hands that improved or have strong equity, check-fold bluffs','C) Never barrel OOP — too dangerous','D) Barrel sizing depends on exact card only'],a:'B',e:'OOP double-barreling should be done with equity (flush draws, straight draws, top pair) or strong made hands. Pure bluffs without equity get into trouble vs strong ranges.'},
{c:'C-Bet',q:'On a AKQ rainbow flop what is your c-bet frequency?',o:['A) Never — your range is capped and vulnerable','B) High frequency small bets — this board smashes your 3-bet range','C) Check — too dangerous, opponent could have the nuts','D) Polarized bets only — large or check'],a:'B',e:'AKQ rainbow: count the strong hands in each range. Raiser has AA, KK, QQ, AK, AQ, KQ — they all connect. Caller has almost nothing — they called preflop with hands like JJ, TT, 99, KJs, QJs. On AKQ most of those hands missed. The range advantage is near-total. Bet 100% of your range at small size (25-33%): small because BB cannot raise profitably (they rarely have anything strong), and 100% because every hand in your range benefits from protecting and extracting thin value.'},
{c:'C-Bet',q:'What is a probe bet?',o:['A) A small bet on the river to induce a bluff raise','B) An OOP bet on the turn after checking the flop to the preflop raiser who also checked','C) A large isolation bet preflop','D) A check-raise on a wet board'],a:'B',e:'A probe bet is made OOP on the turn when both players checked the flop. It represents a hand that improved on the turn and denies equity to the raiser who showed weakness.'},
{c:'C-Bet',q:'Flop is 882 rainbow. You opened BTN, BB called. C-bet or check?',o:['A) Check — paired boards are traps','B) Bet small at very high frequency — heavily favors your range','C) Bet large — force folds','D) Check and evaluate BB tendency'],a:'B',e:'882r is the extreme case of range advantage. As BTN, you have 88 (sets), all overpairs. BB rarely has 88 — they 3-bet it preflop most of the time. BB checking range is almost entirely behind your range here. You bet 100% (or very close) at a small size because: BB cannot raise profitably (nothing is ahead), and you extract value from all their underpairs. Key: the small size forces them to call with a wide losing range.'},
{c:'C-Bet',q:'You opened UTG, HJ called. Flop is 743 two-tone. C-bet strategy?',o:['A) Always bet — UTG range crushes this board','B) Check frequently — low boards connect well with HJ calling range which includes many suited connectors and small pairs','C) Bet large to price out draws','D) Check-call any bet'],a:'B',e:'Low connected boards hit the caller\'s range (small pairs, suited connectors) harder than the opener\'s. UTG rarely has 43s or 76s. Check your air frequently here.'},
{c:'C-Bet',q:'On a JJ4 board, the turn is another 4 (board: JJ44). Action?',o:['A) Always barrel — double paired boards are strong','B) Check frequently — this board heavily favors the BB calling range','C) Bet large to protect your Jx hands','D) The action should be the same as on the flop'],a:'B',e:'Double paired boards reduce your range advantage. BB calling range includes 44 and many Jx hands. Check more frequently on JJ44 and be cautious about barreling.'},
{c:'C-Bet',q:'You 3-bet KK, get called in position. Flop is A72 rainbow. What now?',o:['A) Give up — you missed the board','B) C-bet — you have the highest overpairs plus AK, so you still have range advantage even with an ace','C) Check-fold — your hand is probably beat','D) Shove — protect against draws'],a:'B',e:'Even when you miss with KK on an ace-high board, your 3-bet range includes AK, AQ, AJ so you still have range advantage. C-bet and continue balancing with KK as a bluff catcher.'},
{c:'C-Bet',q:'What is a delayed c-bet?',o:['A) A c-bet made on the turn after checking the flop','B) A slow-played strong hand','C) A bet made after a long tank','D) A second bullet on the river'],a:'A',e:'A delayed c-bet is when you check the flop as the preflop raiser and then bet the turn. Effective on boards where checking the flop is correct but turns improve your range.'},
{c:'C-Bet',q:'Flop is Q84 with two spades. You opened BTN, BB called. Sizing?',o:['A) Small — 25% pot','B) Medium — 50% pot','C) Large — 70-80% pot','D) Check — too many draws'],a:'C',e:'Q84 two-tone is a semi-wet board with flush draws. Use larger sizing (70%+) to charge draws and protect made hands. Small bets give draws cheap equity.'},
{c:'C-Bet',q:'On the river with a busted draw, you have zero equity. When should you bluff?',o:['A) Never — bluffing the river is too risky','B) When your bet will generate enough folds to show a profit given the pot odds you are laying','C) Only with the nut blocker','D) Always — make opponent uncomfortable'],a:'B',e:'River bluffing is about expected value. Bet when folds are frequent enough to profit. For example betting 67% pot requires >40% fold frequency. Having blockers to the nuts increases profitability.'},
{c:'C-Bet',q:'You have top pair good kicker (TPGK) on a wet board. Should you bet large or small?',o:['A) Small — protect your range and extract value','B) Large — you need to charge draws','C) Check — TPGK is a check-call hand','D) Depends entirely on opponent type'],a:'B',e:'TPGK on a wet board should bet large. You have a strong hand that wants to be called by worse, but you also need to charge flush draws and straight draws that have significant equity.'},
{c:'C-Bet',q:'What does it mean to have a "range advantage" on a board?',o:['A) Having more strong hands in your range than your opponent on that specific board texture','B) Having a higher overall hand frequency','C) Having more draws than your opponent','D) Always being in position'],a:'A',e:'Range advantage means your overall range connects better with the board texture than your opponent\'s range. Having range advantage justifies betting more frequently at smaller sizes.'},
{c:'C-Bet',q:'Board is T98 rainbow. You raised preflop, BB called. What percentage of your range should you c-bet?',o:['A) 80-100% — always c-bet as the aggressor','B) 30-40% — BB\'s range connects too well with this board','C) 0% — always check this board type','D) 50% — split your range evenly'],a:'B',e:'T98r is a range-disadvantage board for the preflop raiser. Think about who has 87s, 76s, JTs — the caller does, not you (especially if you opened from UTG/HJ). The caller also has T9, 98, 89 for two pair. Your c-betting frequency drops to 30-40%. When you do bet, you need a strong hand or a strong draw. Betting air here into a range full of strong made hands is a leak.'},
{c:'C-Bet',q:'You open CO, BTN calls, BB calls. Flop is A32 rainbow. Multiway c-bet strategy?',o:['A) C-bet aggressively — you have range advantage with the ace','B) Check — multiway pots require much stronger hands to c-bet profitably','C) Always bet large multiway','D) Same strategy as heads-up'],a:'B',e:'In multiway pots you need significantly stronger hands to c-bet profitably because multiple opponents must fold. Check boards more often even with range advantage in multiway spots.'},
{c:'C-Bet',q:'What is the main goal of a small c-bet on a dry board?',o:['A) To build the pot for later streets','B) To make a profit from air hands and thin value hands that benefit from charging the few draws','C) To represent a monster hand','D) To protect against runner-runner draws'],a:'B',e:'Small bets on dry boards extract thin value from worse made hands, keep the pot small with medium strength hands, and make a profit from the few draws that exist at favorable odds.'},
{c:'C-Bet',q:'Flop is K73 rainbow. You check as the preflop raiser. BB bets. What does this tell you?',o:['A) BB always has a strong hand','B) BB is likely probing with a medium hand or draw, not a monster','C) BB always has a 7 or 3','D) Nothing useful about BB range'],a:'B',e:'When BB bets into you after you checked on a K-high dry board, they often have Kx or a probe bet with a medium holding. Their range is capped — they would check-raise the flop with monsters.'},
{c:'C-Bet',q:'On a 432 two-tone flop what is the correct c-bet strategy for the preflop raiser?',o:['A) High frequency small bets — you have range advantage','B) Check frequently — this board hits the BB\'s range harder','C) Bet large to deny equity','D) Only bet with a set or overpair'],a:'B',e:'432 is the extreme case of range disadvantage for the opener. UTG rarely has 65s, 54s, or 43s — BB defends all of these. BB has two pair combos, straights, and pairs that all hit this board. If you c-bet 432 with a wide range you are c-betting into a calling range that is ahead of you on average. Check your entire range or very close to it. The principle: on boards that miss your range and hit theirs, you check, not bet.'},
{c:'C-Bet',q:'You have 88 on a KQ7 board. Should you c-bet?',o:['A) Yes — 88 is a made hand, always bet','B) It depends on position and range considerations','C) No — 88 is too vulnerable on K-high boards','D) Yes but check-fold to any raise'],a:'B',e:'88 on KQ7 is a medium strength hand. In position you can bet small to extract value from weaker pairs. OOP you might check to control pot size. Neither always-bet nor always-check is correct.'},
/* ── 3-BET SQUEEZE RESTEAL (25) ── */
{c:'3-Bet',q:'What percentage of your 3-bet range should be bluffs for a balanced strategy?',o:['A) 0% — 3-bets should always be for value','B) About 50% — roughly equal value and bluffs','C) 75% — mostly bluffs with some value','D) Depends entirely on opponent tendencies'],a:'B',e:'A balanced 3-bet range has roughly equal value and bluff hands. This makes you unexploitable. Against passive opponents you can tighten the bluffs; against folders you can widen them.'},
{c:'3-Bet',q:'Best position to execute a squeeze play?',o:['A) UTG — maximum fold equity','B) BTN or CO — good fold equity with position postflop if called','C) BB — you are already in the pot','D) SB — cheapest squeeze'],a:'B',e:'Squeezing from BTN or CO gives you fold equity against the opener and caller plus position if called. This is the ideal combination for a profitable squeeze.'},
{c:'3-Bet',q:'UTG opens, you 3-bet CO, both fold back to UTG who 4-bets. You have AJs. Action?',o:['A) Always call — AJs is too good to fold','B) Fold — AJs is a 3-bet bluff that should fold to a 4-bet from UTG','C) 5-bet shove — maximize pressure','D) Call and fold all bad flops'],a:'B',e:'AJs is a 3-bet bluff from CO vs UTG. When UTG 4-bets they have a strong linear range (AA, KK, QQ, AK) that dominates AJs. Fold as planned.'},
{c:'3-Bet',q:'Why is A5s a better 3-bet bluff than A9s?',o:['A) A5s has better flush potential and more outs','B) A5s has stronger blockers — the 5 does not block many calling hands while A blocks AA and AK','C) A9s blocks the middle of villain range and loses value as a bluff','D) A9s is better because higher equity when called'],a:'B',e:'A5s blocks AK and AA (reducing their combos) while the 5 kicker does not block many strong hands opponents would call with. A9s blocks fewer top-of-range hands and has reverse blocking issues.'},
{c:'3-Bet',q:'CO opens, you 3-bet BTN, SB cold-calls, CO calls. Now what?',o:['A) Always c-bet small — you are the aggressor','B) Check frequently — multiway pots reduce the effectiveness of your 3-bet range','C) Bet large — you have the most premium hands','D) Give up on any flop you miss'],a:'B',e:'Multiway pots after a 3-bet are tricky. Multiple players means someone is likely connected with the board. Check more, bet strong hands, and be cautious with pure bluffs.'},
{c:'3-Bet',q:'At 30BB BTN opens to 2.5BB. You are in SB with KQo. Best action?',o:['A) Fold — KQo OOP is too dangerous','B) Call — see a cheap flop with a strong hand','C) 3-bet shove — 30BB puts KQo in shove territory from SB','D) 3-bet small to 8BB'],a:'C',e:'At 30BB KQo is a 3-bet shove from SB vs BTN open. Strong enough to shove, generates fold equity, and at 30BB you do not want to play KQo OOP in a 3-bet pot.'},
{c:'3-Bet',q:'What makes a good resteal candidate?',o:['A) Any strong value hand — premiums only','B) A hand that has fold equity against the opener, decent equity when called, and ideally blockers to the calling range','C) Hands with strong equity when called, regardless of fold equity','D) Suited hands only — blockers do not matter as much as playability'],a:'B',e:'Good resteals have three components: fold equity (opener has wide range), equity when called (at least 35-40%), and blockers to premium hands. A5s, KTs, 77 are classic resteal hands.'},
