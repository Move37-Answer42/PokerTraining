/* ══════════════════════════════════════════════════════════════
   POST-FLOP DRILL — Option E
   Show hole cards + flop + position + stack depth
   Actions: Bet Small / Bet Large / Check-Raise / Check-Call / Check-Fold
══════════════════════════════════════════════════════════════ */

// ── Post-flop state ──
var pfHand=null,pfPos=null,pfBB=null,pfFlop=null,pfRes=null,pfAns=null;
var pfCor=0,pfTot=0,pfSubMode='all';

var PF_POSITIONS=['UTG','HJ','CO','BTN','SB'];
var PF_STACKS=[30,40,50,66,100];
var PF_RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
var PF_SUITS=['c','d','h','s'];

function rndCard(exclude){
  var attempts=0;
  while(attempts<200){
    var r=PF_RANKS[Math.floor(Math.random()*PF_RANKS.length)];
    var s=PF_SUITS[Math.floor(Math.random()*PF_SUITS.length)];
    var card=r+s;
    if(!exclude||exclude.indexOf(card)===-1)return card;
    attempts++;
  }
  return 'As';
}

function cardRank(card){return RV[card[0]]||0;}
function cardSuit(card){return card[1];}
function cardDisp(card){
  var suits={c:'&#9827;',d:'&#9830;',h:'&#9829;',s:'&#9824;'};
  var colors={c:'#00ddbb',d:'#ff4466',h:'#ff4466',s:'#aaddff'};
  return '<span style="color:'+colors[card[1]]+'">'+card[0]+suits[card[1]]+'</span>';
}

function classifyBoard(flop){
  var ranks=flop.map(function(c){return cardRank(c);});
  var suits=flop.map(function(c){return cardSuit(c);});
  var isPaired=ranks[0]===ranks[1]||ranks[1]===ranks[2]||ranks[0]===ranks[2];
  var isMonotone=suits[0]===suits[1]&&suits[1]===suits[2];
  var isTwoTone=(suits[0]===suits[1]||suits[1]===suits[2]||suits[0]===suits[2])&&!isMonotone;
  var maxR=Math.max.apply(null,ranks),minR=Math.min.apply(null,ranks);
  var isConnected=(maxR-minR)<=4;
  var hasAce=ranks.indexOf(14)>=0;
  var topCard=maxR;
  var isBroadway=topCard>=11;
  var isLow=maxR<=8;
  if(isPaired)return{type:'paired',monotone:isMonotone,twotone:isTwoTone,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:isConnected};
  if(isMonotone)return{type:'monotone',monotone:true,twotone:false,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:isConnected};
  if(isConnected&&isTwoTone)return{type:'wet',monotone:false,twotone:true,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:true};
  if(isConnected)return{type:'connected',monotone:false,twotone:isTwoTone,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:true};
  if(isTwoTone)return{type:'twoTone',monotone:false,twotone:true,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:false};
  return{type:'dry',monotone:false,twotone:false,hasAce:hasAce,topCard:topCard,isBroadway:isBroadway,isLow:isLow,isConnected:false};
}

function evalHandVsBoard(hand,flop){
  var h=evalH(hand);
  var fRanks=flop.map(function(c){return cardRank(c);});
  var fSuits=flop.map(function(c){return cardSuit(c);});
  var isPair=h.isPair;
  var v1=h.v1,v2=h.v2;
  var topBoard=Math.max.apply(null,fRanks),midBoard=fRanks.slice().sort(function(a,b){return b-a;})[1];
  var suited=h.suited;
  var flushDraw=suited&&fSuits.filter(function(s){return s===hand[1];}).length>=2;
  var oesd=!isPair&&Math.abs(v1-v2)===1&&((fRanks.indexOf(v1+1)>=0||fRanks.indexOf(v1-2)>=0)||(fRanks.indexOf(v2+1)>=0||fRanks.indexOf(v2-2)>=0));
  var hitTop=(fRanks.indexOf(v1)>=0&&v1===topBoard)||(fRanks.indexOf(v2)>=0&&v2===topBoard);
  var hitMid=(fRanks.indexOf(v1)>=0&&v1===midBoard)||(fRanks.indexOf(v2)>=0&&v2===midBoard);
  var hitPair=!isPair&&(fRanks.indexOf(v1)>=0||fRanks.indexOf(v2)>=0);
  var setHit=isPair&&fRanks.indexOf(v1)>=0;
  var overPair=isPair&&v1>topBoard;
  var underPair=isPair&&v1<topBoard;
  var twoPair=hitTop&&hitMid;
  var str='air';
  if(setHit)str='set';
  else if(twoPair)str='twopair';
  else if(hitTop)str='tpgk';
  else if(hitMid)str='mh';
  else if(overPair)str='overpair';
  else if(underPair)str='underpair';
  else if(hitPair)str='weakpair';
  var draws=[];
  if(flushDraw)draws.push('flush draw');
  if(oesd)draws.push('OESD');
  return{str:str,draws:draws,flushDraw:flushDraw,oesd:oesd,overPair:overPair,underPair:underPair};
}

function getPFAnswer(hand,pos,bb,flop,board){
  var h=evalH(hand);
  var ev=evalHandVsBoard(hand,flop);
  var str=ev.str;
  var isIP=pos==='BTN'||pos==='CO';
  var isOOP=pos==='SB'||pos==='UTG';
  var spr=Math.round(bb*0.6);
  var isSPRlow=bb<=35;
  var isWet=board.type==='wet'||board.type==='monotone'||board.type==='twoTone';
  var isDry=board.type==='dry';
  var isPaired=board.type==='paired';
  var hasAce=board.hasAce;
  // Determine action and explanation
  var action,note;
  if(str==='set'){
    if(isSPRlow){action='bet-large';note='You flopped a set. With low SPR ('+spr+') go large — build toward stack-off. Bet 60-75% pot to charge draws and get maximum value.';}
    else{action='bet-small';note='Set on '+board.type+' board. At '+bb+'BB start small (25-33%) to keep weaker hands in. Plan to barrel every street.';}
  }else if(str==='twopair'){
    if(isWet){action='bet-large';note='Two pair on a wet board. Bet large (65-75%) — protect your equity and charge draws. This hand wants to build a big pot NOW.';}
    else{action='bet-small';note='Two pair on dry board. Small bet (33%) at high frequency extracts value without folding out weaker pairs.';}
  }else if(str==='tpgk'){
    if(isWet){action='bet-large';note='Top pair good kicker on wet board. Bet large (65%) — charge the draws. Don\'t let them realize equity cheaply.';}
    else if(isDry){action='bet-small';note='TPGK on dry board. Bet small (25-33%) — board heavily favors your range, extract thin value from weaker pairs.';}
    else{action='bet-small';note='TPGK — standard value bet. Size based on wetness: small on dry, larger on connected boards.';}
  }else if(str==='overpair'){
    if(isWet){action='bet-large';note='Overpair on wet board. Bet large (65-75%) — protect against draws, get value from top pair hands. Do not slow-play.';}
    else if(isPaired){action='bet-small';note='Overpair on paired board — be cautious. Bet small to control pot. Villain could have trips. Fold to heavy resistance.';}
    else{action='bet-small';note='Overpair on dry board. Bet small (25-33%) at high frequency. You have range advantage, extract thin value.';}
  }else if(str==='mh'){
    if(isWet&&ev.flushDraw){action='check-call';note='Middle pair + flush draw. Check-call — you have solid equity (pair + draw). Do not fold. Call and re-evaluate turn.';}
    else if(isIP){action='check-call';note='Middle pair in position. Check-call (or bet small to probe). You have showdown value but are not strong enough to build a big pot.';}
    else{action='check-fold';note='Middle pair OOP on '+board.type+' board. Check and fold to a large bet. Too vulnerable to continue building a pot OOP.';}
  }else if(str==='underpair'){
    if(ev.flushDraw){action='check-call';note='Underpair + flush draw. Check-call once for the draw equity. Fold turn if draw misses and villain continues.';}
    else{action='check-fold';note='Underpair with no draw. Check-fold — you will often be behind a caller\'s range on this board. Save chips for better spots.';}
  }else if(str==='weakpair'){
    if(isIP&&isDry){action='check-call';note='Weak pair in position on dry board. Check-call small bets — you have showdown value in position. Fold to large bets.';}
    else{action='check-fold';note='Weak pair on '+board.type+' board. Check-fold. You rarely have the best hand and cannot profitably call large bets.';}
  }else{
    // Air
    if(isIP&&isDry&&!hasAce){action='bet-small';note='Air in position on dry board. Bet small (25-33%) as a c-bet bluff. Your range advantages on dry boards make this profitable with high fold frequency. Pick hands with some equity or blockers.';}
    else if(ev.flushDraw||ev.oesd){action='bet-large';note='Draw + no pair. Bet large (65%) as a semi-bluff — you have real equity ('+ev.draws.join('+')+') plus fold equity. Force the decision now.';}
    else if(isIP&&(board.type==='connected'||board.type==='wet')){action='check-fold';note='Air on connected board in position. Check and fold. Wet connected boards hit the caller\'s range — bluffing here has low fold equity.';}
    else if(isOOP){action='check-fold';note='Air OOP. Check-fold. Bluffing OOP without draws or blockers is a money-losing leak. Give up and wait for a better spot.';}
    else{action='check-fold';note='Air on '+board.type+' board. Check-fold. Without equity or strong position, c-betting here bleeds chips.';}
  }
  if(ev.draws.length>0&&(str==='air'||str==='weakpair'||str==='underpair')){
    note+=' Draws: '+ev.draws.join(', ')+'.';
  }
  return{action:action,note:note,str:str,draws:ev.draws,ev:ev};
}

function newPFDrill(){
  pfRes=null;pfAns=null;
  // Generate a random hand that would be in an opening range
  var pos=PF_POSITIONS[Math.floor(Math.random()*PF_POSITIONS.length)];
  var bb=PF_STACKS[Math.floor(Math.random()*PF_STACKS.length)];
  var validHands=[];
  for(var ri=0;ri<RANKS.length;ri++){
    for(var rj=0;rj<RANKS.length;rj++){
      var h2=ri===rj?RANKS[ri]+RANKS[ri]:(ri<rj?RANKS[ri]+RANKS[rj]+'s':RANKS[rj]+RANKS[ri]+'o');
      if(getAns(h2,pos,bb).action==='open')validHands.push(h2);
    }
  }
  validHands=validHands.filter(function(v,i,a){return a.indexOf(v)===i;});
  pfHand=validHands.length>0?rand(validHands):rndHand();
  pfPos=pos;pfBB=bb;
  // Generate flop (filter by sub-mode)
  var attempts=0,flop=null;
  while(attempts<100){
    var c1=rndCard([]);
    var c2=rndCard([c1]);
    var c3=rndCard([c1,c2]);
    var candidate=[c1,c2,c3];
    var board=classifyBoard(candidate);
    var typeOk=pfSubMode==='all'||(pfSubMode==='dry'&&board.type==='dry')||(pfSubMode==='wet'&&(board.type==='wet'||board.type==='monotone'||board.type==='twoTone'))||(pfSubMode==='paired'&&board.type==='paired')||(pfSubMode==='draw'&&(board.type==='wet'||board.type==='connected'));
    if(typeOk){flop=candidate;break;}
    attempts++;
  }
  pfFlop=flop||[rndCard([]),rndCard([]),rndCard([])];
}

function renderPostFlop(){
  if(!pfHand||!pfFlop)newPFDrill();
  var board=classifyBoard(pfFlop);
  var ev=evalHandVsBoard(pfHand,pfFlop);
  var hcol=evalH(pfHand).suited?'var(--pink)':evalH(pfHand).isPair?'var(--gold)':'var(--text)';
  var boardTypeColors={dry:'var(--text3)',wet:'#ff4466',paired:'var(--gold)',monotone:'var(--violet)',connected:'#ff9030',twoTone:'#44aaff'};
  var boardTypeLabel={dry:'Dry rainbow',wet:'Wet two-tone',paired:'Paired board',monotone:'Monotone',connected:'Connected',twoTone:'Two-tone'};
  var strLabels={set:'Set',twopair:'Two pair',tpgk:'Top pair GK',mh:'Middle pair',overpair:'Overpair',underpair:'Underpair',weakpair:'Weak pair / bottom pair',air:'No pair / air'};
  var posColors={UTG:'var(--pink)',HJ:'var(--gold)',CO:'var(--gold)',BTN:'var(--green)',SB:'var(--violet)'};

  var html='<div class="anim">';
  // Header
  html+='<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">';
  html+='<div><div style="font-size:18px;font-weight:700">Post-Flop</div>';
  html+='<div style="font-size:10px;color:var(--text3)">C-bet / check decision drill</div></div>';
  html+='<div style="text-align:right"><div style="font-size:10px;color:var(--text3)">Session</div>';
  html+='<div style="font-size:14px;font-weight:700;color:var(--cyan)">'+pfCor+'/'+pfTot+'</div></div></div>';

  // Sub-mode filter
  html+='<div class="tab-row" style="margin-bottom:14px">';
  var smodes=[['all','All Boards'],['dry','Dry'],['wet','Wet'],['paired','Paired'],['draw','Draw-heavy']];
  for(var si=0;si<smodes.length;si++)html+='<button class="tb'+(pfSubMode===smodes[si][0]?' on':'')+'" data-action="pf-mode" data-mode="'+smodes[si][0]+'">'+smodes[si][1]+'</button>';
  html+='</div>';

  // Scenario context
  html+='<div style="font-size:11px;color:var(--violet);text-align:center;margin-bottom:12px;font-weight:600">You raised from '+pfPos+' · Caller in position · '+pfBB+'BB deep</div>';

  // Hole cards display
  html+='<div style="text-align:center;margin-bottom:10px">';
  html+='<div style="font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Your Hand</div>';
  html+='<div style="font-size:clamp(36px,10vw,52px);font-weight:700;letter-spacing:4px;color:'+hcol+'">'+pfHand+'</div></div>';

  // Flop display
  html+='<div style="text-align:center;margin-bottom:6px">';
  html+='<div style="font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Flop</div>';
  html+='<div style="display:flex;justify-content:center;gap:10px;margin-bottom:8px">';
  for(var fi=0;fi<pfFlop.length;fi++){
    html+='<div style="background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:12px 16px;font-size:28px;font-weight:700;min-width:52px;text-align:center;">'+cardDisp(pfFlop[fi])+'</div>';
  }
  html+='</div>';
  // Board type badge
  var btColor=boardTypeColors[board.type]||'var(--text3)';
  html+='<span class="pill" style="background:'+btColor+'22;color:'+btColor+';border:1px solid '+btColor+'44">'+( boardTypeLabel[board.type]||board.type)+'</span>';
  html+='</div>';

  // SPR context
  var spr=Math.round((pfBB-2.5)*0.85/((pfBB-2.5)*0.15+2.5));
  spr=Math.max(1,Math.min(15,spr));
  html+='<div style="display:flex;justify-content:center;gap:16px;font-size:11px;color:var(--text2);margin:10px 0">';
  html+='<span>Stack <strong style="color:var(--text)">'+pfBB+'BB</strong></span>';
  html+='<span>Est. SPR <strong style="color:'+(spr<=3?'var(--pink)':spr<=6?'var(--gold)':'var(--cyan)')+'">~'+spr+'</strong></span>';
  html+='<span>Pos <strong style="color:'+(posColors[pfPos]||'var(--text)')+'">'+pfPos+'</strong></span>';
  html+='</div>';
  html+='<div style="text-align:center;font-size:16px;letter-spacing:8px;opacity:.08;margin:6px 0">&#9824; &#9829; &#9830; &#9827;</div>';

  if(!pfRes){
    html+='<div class="act-row">';
    html+='<button class="abtn a-open" style="min-width:110px" data-action="postflop" data-choice="bet-small">&#8593; Bet Small</button>';
    html+='<button class="abtn a-shove" style="min-width:110px" data-action="postflop" data-choice="bet-large">&#8679; Bet Large</button>';
    html+='<button class="abtn" style="min-width:110px;background:rgba(0,200,160,.1);color:#00ddb0;border:1px solid rgba(0,200,160,.3)" data-action="postflop" data-choice="check-raise">&#8597; Check-Raise</button>';
    html+='<button class="abtn" style="min-width:110px;background:rgba(168,85,247,.1);color:var(--violet);border:1px solid rgba(168,85,247,.3)" data-action="postflop" data-choice="check-call">&#8596; Check-Call</button>';
    html+='<button class="abtn a-fold" style="min-width:110px" data-action="postflop" data-choice="check-fold">&#10003; Check-Fold</button>';
    html+='</div>';
  }else{
    var ok=pfRes==='ok';
    var actionLabels={'bet-small':'Bet Small (25-33%)','bet-large':'Bet Large (60-75%)','check-raise':'Check-Raise','check-call':'Check-Call','check-fold':'Check-Fold'};
    html+='<div class="anim"><div class="'+(ok?'res-ok':'res-no')+'" style="margin-bottom:8px">';
    html+='<div style="font-weight:700;font-size:13px;margin-bottom:6px;color:'+(ok?'var(--green)':'var(--pink)')+'">';
    html+=(ok?'&#10003; Correct - +10 XP':'&#10007; Incorrect - +2 XP')+'</div>';
    html+='<div style="font-size:10px;color:var(--text3);margin-bottom:5px">Hand strength: <strong style="color:var(--text)">'+(strLabels[pfAns.str]||pfAns.str)+'</strong>';
    if(pfAns.draws.length>0)html+=' · Draws: '+pfAns.draws.join(', ');
    html+='</div>';
    html+='<div style="font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:6px">'+pfAns.note+'</div>';
    html+='<div style="font-size:10px;color:var(--text3)">Correct: <strong style="color:var(--text)">'+(actionLabels[pfAns.action]||pfAns.action)+'</strong></div></div>';
    if(pfTot>0){
      var pacc=Math.round(pfCor/pfTot*100);
      html+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:6px">';
      html+='<span>Session: '+pfCor+'/'+pfTot+'</span>';
      html+='<span style="color:'+(pacc>=70?'var(--green)':pacc>=50?'var(--gold)':'var(--pink)')+'">'+pacc+'% accuracy</span></div>';
    }
    html+='<button class="nbtn" data-action="next-pf">Next hand &#8594;</button></div>';
  }
  html+='</div>';
  return html;
}

function render(){
  var el=document.getElementById('main');
  if(view==='home')el.innerHTML=renderHome();
  else if(view==='drill')el.innerHTML=renderDrill();
  else if(view==='flash')el.innerHTML=renderFlash();
  else if(view==='quiz')el.innerHTML=renderQuiz();
  else if(view==='grid')el.innerHTML=renderGrid();
  else if(view==='cash'){if(!cHand)newCashDrill();el.innerHTML=renderCash();}
  else if(view==='postflop'){if(!pfHand)newPFDrill();el.innerHTML=renderPostFlop();}
}

document.addEventListener('click',function(e){
  var el=e.target;
  for(var i=0;i<6;i++){
    if(!el||el===document.body)break;
    var a=el.getAttribute('data-action');
    if(a){
      e.preventDefault();
      if(a==='nav'){view=el.getAttribute('data-view');document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-view')===view);});if(view==='drill')newDrill();if(view==='cash')newCashDrill();if(view==='postflop')newPFDrill();render();}
      else if(a==='drill'){
        var choice=el.getAttribute('data-choice');
        var ans;
        if(dMode==='3bet'){ans=get3BetAns(hand,pos,bb,d3VillainPos||'BB',d3VillainSize||8);}
        else if(dMode==='vs_co'){ans=getVsOpenAns(hand,pos,bb,'CO');}
        else if(dMode==='vs_btn'){ans=getVsOpenAns(hand,pos,bb,'BTN');}
        else if(dMode==='vs_ep'){ans=getVsOpenAns(hand,pos,bb,'EP');}
        else if(dMode==='bvb'&&pos==='BB'){ans=getVsOpenAns(hand,pos,bb,'SB');}
        else{ans=getAns(hand,pos,bb);}
        var ok=choice===ans.action;
        dAns=ans;dRes=ok?'ok':'no';dCor+=(ok?1:0);dTot++;xp+=(ok?10:2);streak=ok?streak+1:0;
        sessionLog.unshift({hand:hand,pos:pos,bb:bb,ok:ok,mode:dMode,label:'MTT'});
        if(sessionLog.length>8)sessionLog.pop();
        save();updHdr();render();
      }
      else if(a==='next-drill'){newDrill();render();}
      else if(a==='drill-mode'){dMode=el.getAttribute('data-mode');newDrill();render();}
      else if(a==='fc-flip'){fcF=!fcF;render();}
      else if(a==='fc-pillar'){fcMode='cards';fcP=parseInt(el.getAttribute('data-p'));fcI=0;fcF=false;render();}
      else if(a==='fc-mode'){fcMode=el.getAttribute('data-m');if(fcMode==='cards'){fcP=1;fcI=0;fcF=false;}render();}
      else if(a==='fc-prev'){var deck=FC[fcP]||[];fcI=(fcI-1+deck.length)%deck.length;fcF=false;render();}
      else if(a==='fc-next'){var deck2=FC[fcP]||[];fcI=(fcI+1)%deck2.length;fcF=false;render();}
      else if(a==='quiz-cat'){qCatFilter=el.getAttribute('data-cat');qCur=null;qSeen=[];render();}
      else if(a==='next-quiz'){getNextQuestion();render();}
      else if(a==='ans-quiz'){
        if(qAns)break;
        var qi=parseInt(el.getAttribute('data-qi'));
        qSel=qCur.o[qi].charAt(0);
        qAns=(qSel===qCur.a)?'ok':'no';
        xp+=(qAns==='ok'?15:3);streak=qAns==='ok'?streak+1:0;
        // Track per-category accuracy for weakness detection
        try{
          var catStr=localStorage.getItem('ft_catacc')||'{}';
          var catData=JSON.parse(catStr);
          var k=qCur.c;
          if(!catData[k])catData[k]={c:0,t:0};
          catData[k].t++;
          if(qAns==='ok')catData[k].c++;
          localStorage.setItem('ft_catacc',JSON.stringify(catData));
          // Also store overall quiz accuracy
          var qCorTotal=0,qTotTotal=0;
          Object.values(catData).forEach(function(d){qCorTotal+=d.c;qTotTotal+=d.t;});
          if(qTotTotal>0)localStorage.setItem('ft_qacc',Math.round(qCorTotal/qTotTotal*100));
        }catch(e){}
        save();updHdr();render();
      }
      else if(a==='cash'){
        var ch=el.getAttribute('data-choice');
        var ca;
        if(cMode==='3bet'){ca=getCash3BetAns(cHand,cPos,cDepth,c3VPos,c3VSize);}
        else{ca=evalCashHand(cHand);}
        var cok=ch===ca.action;cAns=ca;cRes=cok?'ok':'no';cCor+=(cok?1:0);cTot++;xp+=(cok?10:2);streak=cok?streak+1:0;save();updHdr();render();
      }
      else if(a==='next-cash'){newCashDrill();render();}
      else if(a==='cash-mode'){cMode=el.getAttribute('data-mode');newCashDrill();render();}
      else if(a==='postflop'){
        var choice=el.getAttribute('data-choice');
        var board=classifyBoard(pfFlop);
        pfAns=getPFAnswer(pfHand,pfPos,pfBB,pfFlop,board);
        var ok=choice===pfAns.action;
        pfRes=ok?'ok':'no';pfCor+=(ok?1:0);pfTot++;
        xp+=(ok?10:2);streak=ok?streak+1:0;
        sessionLog.unshift({hand:pfHand,pos:pfPos,bb:pfBB,ok:ok,mode:'postflop',label:'Post-Flop'});
        if(sessionLog.length>8)sessionLog.pop();
        save();updHdr();render();
      }
      else if(a==='next-pf'){newPFDrill();render();}
      else if(a==='pf-mode'){pfSubMode=el.getAttribute('data-mode');newPFDrill();render();}
      else if(a==='cash-cfg'){
        var k=el.getAttribute('data-k');var v=el.getAttribute('data-v');
        if(k==='table')cTableSize=v;
        else if(k==='depth')cDepth=v;
        newCashDrill();render();
      }
      else if(a==='cash-tip'){var ti2=parseInt(el.getAttribute('data-ti'));cashTipOpen=cashTipOpen===ti2?-1:ti2;render();}
      else if(a==='launch-mtt'){
        view='drill';dMode=el.getAttribute('data-mode');newDrill();
        document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-view')==='drill');});
        render();
      }
      else if(a==='launch-quiz-cat'){
        qCatFilter=el.getAttribute('data-cat');qCur=null;qSeen=[];
        view='quiz';document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-view')==='quiz');});
        render();
      }
      else if(a==='reset-confirm'){_confirmReset=!_confirmReset;render();}
      else if(a==='reset-execute'){
        xp=0;streak=0;dCor=0;dTot=0;pfCor=0;pfTot=0;cCor=0;cTot=0;
        qSeen=[];sessionLog=[];_confirmReset=false;
        try{localStorage.removeItem('ft_xp');localStorage.removeItem('ft_str');localStorage.removeItem('ft_d');localStorage.removeItem('ft_catacc');localStorage.removeItem('ft_qacc');}catch(e){}
        updHdr();render();
      }
      else if(a==='launch-other'){
        view=el.getAttribute('data-view');
        document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-view')===view);});
        if(view==='cash')newCashDrill();if(view==='postflop')newPFDrill();render();
      }
      else if(a==='quiz-cat'){
        qCatFilter=el.getAttribute('data-cat');qCur=null;qSeen=[];
        view='quiz';document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-view')==='quiz');});
        render();
      }
      else if(a==='toggle-pillar'){var pi2=parseInt(el.getAttribute('data-pi'));pillarOpen=pillarOpen===pi2?-1:pi2;render();}
      else if(a==='grid-depth'){gridD=el.getAttribute('data-depth');render();}
      break;
    }
    el=el.parentElement;
  }
});

setInterval(function(){suitI=(suitI+1)%4;if(view==='home'){var s=SUITS[suitI];var d=document.getElementById('suit-deco');var b=document.getElementById('suit-bg');if(d)d.textContent=s;if(b)b.textContent=s;}},1800);

updHdr();render();
</script>
