{c:'3-Bet',q:'At 25BB CO opens, you are BTN with 99. Action?',o:['A) Fold — 99 is too vulnerable to play a 3-bet pot','B) Call — implied odds with a pair','C) 3-bet shove — 25BB with 99 is a clear shove','D) 3-bet small to 6BB'],a:'C',e:'At 25BB 99 is a 3-bet shove from BTN vs CO. Strong enough to be ahead of CO opening range often, enough fold equity, and great equity when called.'},
{c:'3-Bet',q:'You 3-bet with KK. Opponent calls. Flop is A65 rainbow. Action?',o:['A) Check-fold — they have an ace','B) C-bet — your range includes AK, AQ so you still have range advantage','C) Check-call any bet','D) Bet large to represent the ace'],a:'B',e:'With KK on A65r after 3-betting, you still c-bet. Your 3-bet range includes AK, AQ so your range connects well. KK itself can bluff-catch or fold depending on action.'},
{c:'3-Bet',q:'BTN opens, SB cold-calls, you are BB. When do you squeeze?',o:['A) Only with premium value hands — 3-bets should always be value','B) Only when you are in position — squeezing OOP is never profitable','C) With strong hands and some suited ace bluffs — both players have capped ranges and you have maximum fold equity','D) Only squeeze vs weak players — against regs it folds too rarely'],a:'C',e:'BB squeeze is powerful here. BTN has opened wide, SB has flatted and capped their range (no 3-bet), and your 3-bet has great fold equity. Use strong hands plus A3s-A5s.'},
{c:'3-Bet',q:'What is the optimal 3-bet size from OOP?',o:['A) 3x the open','B) 3.5-4x the open — larger OOP to compensate for positional disadvantage','C) Same as in position — sizing does not change','D) Pot-sized always'],a:'B',e:'OOP 3-bets should be larger (3.5-4x) to build a bigger pot when you have the advantage preflop and to put more pressure on the opener\'s range.'},
{c:'3-Bet',q:'At 40BB you 3-bet and get called. What stack-to-pot ratio (SPR) should you expect postflop?',o:['A) About 10 — deep and difficult to get all-in','B) About 3-4 — relatively low, committed with most strong hands','C) About 1 — near-shoving on every flop','D) SPR does not matter in tournaments'],a:'B',e:'After a 3-bet pot at 40BB the SPR is typically 3-4. This means you are committed with top pair or better and the stacks go in naturally on the flop or turn.'},
{c:'3-Bet',q:'You 3-bet from HJ, CO calls. SPR is 3. Flop is KT4 rainbow. You have QQ. Action?',o:['A) Check — scared of the king','B) C-bet all-in immediately','C) C-bet for about 40% pot to build into natural all-in','D) Give up — QQ on K-high is too dangerous'],a:'C',e:'QQ on KT4 with SPR 3 is a strong hand. Bet to build pot naturally toward all-in. You beat most of CO calling range and are not far behind even against Kx.'},
{c:'3-Bet',q:'What is a light 3-bet?',o:['A) A 3-bet with a medium strength hand that does not want to be called','B) A 3-bet with a very small sizing','C) A 3-bet from the blinds only','D) A 3-bet with a suited connector'],a:'A',e:'A light 3-bet uses hands like KJo, AT that have decent equity but prefer folds. The goal is to pick up the open raise. If called, these hands play okay but not great.'},
{c:'3-Bet',q:'CO opens, BTN 3-bets, SB 4-bets. You are in BB with KK. Action?',o:['A) Call — KK plays well heads-up','B) 5-bet shove — KK is strong enough to 5-bet against a 4-bet','C) Fold — you might be up against AA','D) Call and fold to any flop bet'],a:'B',e:'KK is a 5-bet shove here. The 4-bet range is AA, KK, QQ, AK — you are crushing QQ and AK and a small dog to AA. With pot odds in a 5-bet pot, 5-bet shove is correct.'},
{c:'3-Bet',q:'At 50BB, UTG opens, CO 3-bets. You are in BB with TT. Call or fold?',o:['A) Always fold — TT is never strong enough here','B) Call — TT has great set-mining equity and you are getting odds','C) 4-bet shove — strong enough to go to war','D) Fold — cold-calling OOP into two strong ranges is a losing play'],a:'D',e:'This is a cold-call spot, not a direct 3-bet response. BB is OOP against two strong ranges: UTG tight opener and CO 3-bet range. Implied odds are terrible in 3-bet pots (stacks are too shallow to win a big enough pot when you set-mine). Fold is correct. 4-bet shoving 50BB into two players who both likely have strong hands is also bad. Fold and wait for a better spot.'},
{c:'3-Bet',q:'You 3-bet from SB, BTN calls. Flop is 964 two-tone. You have AK with backdoor nut flush. C-bet?',o:['A) Check — you missed the board completely','B) C-bet — AK with backdoor nut flush is an excellent barrel hand in a 3-bet pot','C) Check-fold','D) Always check out of position'],a:'B',e:'AK with backdoor nut flush is a strong barrel hand. You have overcards (6 outs), backdoor nut flush (2-3% extra equity per card), and good fold equity in a 3-bet pot.'},
{c:'3-Bet',q:'Opponent 3-bets you. You have AQo. At what stack depth should you 4-bet vs call?',o:['A) Always 4-bet AQo — it is too strong to flat','B) 4-bet shove at 20-30BB, flat or fold at deeper stacks','C) Always call — AQo does not want to be re-raised','D) Always fold AQo to a 3-bet'],a:'B',e:'At 20-30BB AQo 4-bet shoves for fold equity plus it is often ahead of 3-bet range. Deep (50BB+) you can flat in position or fold OOP depending on your opponent tendencies.'},
{c:'3-Bet',q:'When does a squeeze become a resteal?',o:['A) They are the same thing','B) Resteal is specifically from the blinds over a late-position open; squeeze is over an open plus one or more cold-callers','C) Resteal is a larger size than a squeeze','D) Resteals only happen with short stacks'],a:'B',e:'Resteal: blinds shoving over a late-position open. Squeeze: 3-betting over an open after one or more players have called (no need to be from the blinds).'},
{c:'3-Bet',q:'At 35BB you 3-bet and opponent calls. What hands should you c-bet with on a T83 board?',o:['A) Only your strong made hands','B) Polarized range — your premium hands and your draws/semi-bluffs, check medium hands','C) Your entire range — you are the 3-bettor','D) Only check-raise on this board'],a:'B',e:'In 3-bet pots use a polarized strategy. Bet your strongest hands and draws. Check with medium-strength hands like JJ, QQ on T-high boards to protect your checking range.'},
{c:'3-Bet',q:'A5s vs A9s for a resteal from the SB. Which is better and why?',o:['A) A9s is better — higher equity when called','B) A5s is better — blocks AK/AA while the wheel combo adds extra equity vs tight ranges','C) They are equivalent — same suit, close in rank','D) Neither is good for restealing'],a:'B',e:'A5s is the better resteal hand. The 5 does not block many calling hands, A blocks AA and AK, and the wheel possibility (A2345) adds extra equity when called by broadways.'},
{c:'3-Bet',q:'You 3-bet from BTN vs CO. Action folds to CO who shoves for 40BB. You have QQ. Call or fold?',o:['A) Always fold — QQ might be crushed','B) Call — QQ has about 55-60% equity vs CO 4-bet shove range which includes AK and some bluffs','C) Fold — you need to be ahead more than 60% to call','D) Call only if CO is aggressive'],a:'B',e:'QQ vs a 40BB shove from CO is a call. CO 4-bet range includes AA, KK, AK, and some bluffs. QQ has approximately 55-60% equity — a profitable call with the pot odds.'},
{c:'3-Bet',q:'What is the correct 3-bet size from in position?',o:['A) 3x the open','B) 2.5x — keep it small to control pot','C) 3x is standard in position — enough to pressure, not too large to scare away calls','D) Pot-sized always — maximize fold equity'],a:'C',e:'3x the open is standard IP 3-bet size. Large enough to pressure the opener\'s range and build a pot, small enough to get called by hands you dominate.'},
{c:'3-Bet',q:'Multiway pot after a squeeze. You have AK and the board is K62 rainbow. What is your bet frequency?',o:['A) 100% — top pair top kicker, always bet','B) Lower than heads-up — maybe 50-60%, multiway requires stronger hands to bet','C) 0% — never bet TPGK multiway','D) Same as heads-up — board texture drives frequency'],a:'B',e:'In multiway pots you need stronger hands to bet profitably. AK on K62 is strong but in a 3-way pot someone might have K6, K2, or 66. Bet but not at 100% frequency.'},
{c:'3-Bet',q:'HJ opens 2x, CO 3-bets to 6BB, you are BTN with TT at 50BB. Best action?',o:['A) Call — TT in position is strong enough to cold-call a 3-bet','B) 4-bet shove — isolate vs CO and eliminate multiway risk','C) Fold — TT is not strong enough in this spot','D) Call and fold to any c-bet on an A/K/Q flop'],a:'B',e:'This is a cold-call situation — you have not put a chip in yet. Flatting creates a three-way pot (HJ still lives), lets the blinds squeeze, and puts TT OOP against two strong ranges postflop. 4-bet shoving eliminates the multiway problem, generates fold equity vs CO 3-bet range, and gets the money in as a ~45-50% equity favorite vs their continuing range. Fold is also reasonable. Cold-calling is the worst option.'},
{c:'3-Bet',q:'What makes cold-calling a 3-bet different from calling a direct 3-bet of your own open?',o:['A) Nothing — same decision either way','B) Cold-calling is worse: you are OOP vs two strong ranges, no dead money advantage, and blinds can squeeze behind','C) Cold-calling is better — you have more information about both ranges','D) Only position matters, not how the pot was opened'],a:'B',e:'When you opened and face a 3-bet, at least you have a positional advantage from late position and the 3-bettor must play vs your range. Cold-calling means you enter a pot where two players already have defined strong ranges, you are often OOP, and you have no fold equity from prior action. GTO Wizard research shows cold-calling is the least frequent action — lean toward 4-bet or fold in cold-call spots.'},
/* ── BLIND VS BLIND (20) ── */
{c:'BvB',q:'SB with T9o at 30BB, folded to you. Raise or complete?',o:['A) Complete — T9o is too speculative to raise OOP','B) Raise — T9o is in SB raising range at 30BB','C) Fold — T9o is dominated too often','D) Always complete suited, fold offsuit'],a:'B',e:'T9o is a standard SB raise at 30BB. Connected broadway-adjacent hands with decent equity raise for fold equity against the BB. Completing often lets BB realize equity too cheaply.'},
{c:'BvB',q:'BB with K7o, SB raises 3x. Call or fold?',o:['A) Fold — K7o is too weak to defend','B) Call — getting 2:1 odds with K7o which has decent equity and you close the action','C) 3-bet — K7o is a strong BB defense hand','D) Only call if SB is aggressive'],a:'B',e:'K7o in BB vs SB raise is a call at most depths. You are getting great pot odds, your hand has reasonable equity, and you close the action in position for the rest of the hand.'},
{c:'BvB',q:'SB completes with 65s, BB checks. Flop is J52 rainbow. Who has range advantage?',o:['A) SB — they bet preflop','B) BB — they have uncapped range and J-high boards favor BB checking range','C) Neither — pot was checked through','D) Equal range advantage'],a:'B',e:'After a BvB completion, the BB has an uncapped range and J52r is a neutral to BB-favoring board. BB should probe frequently. SB\'s range is weaker having just completed.'},
{c:'BvB',q:'At 25BB, SB shoves. You are BB with QJo. Call or fold?',o:['A) Always fold — QJo vs SB shove is dominated','B) Call — QJo has about 45-50% equity vs SB push range and you are getting 2:1','C) Fold — wait for a better hand','D) Call only if SB is very loose'],a:'B',e:'QJo vs SB 25BB shove is a call. You are getting 2:1 pot odds and need only 33% equity. QJo has approximately 42-48% equity vs a reasonable SB shoving range.'},
{c:'BvB',q:'What is the BB squeeze and when is it most effective?',o:['A) BB 3-betting after the SB calls a raise','B) BB 3-betting after BTN opens and SB cold-calls — both players are capped and you have maximum fold equity','C) BB shoving after multiple limpers','D) BB betting large on any flop'],a:'B',e:'BB squeeze is most effective when BTN opens and SB cold-calls. SB cannot have a strong hand (they would have 3-bet), BTN range is wide, and your 3-bet has huge fold equity.'},
{c:'BvB',q:'SB with A8o at 40BB, folded to you. Raise or complete?',o:['A) Complete — A8o has reverse implied odds OOP','B) Raise — A8o is a clear SB raise at 40BB','C) Fold — A8o is dominated by AJ+','D) Raise only vs tight BBs'],a:'B',e:'A8o is a standard SB raise at 40BB. Strong kicker, reasonable equity, fold equity against the BB. You should be raising about 40% of hands from SB.'},
{c:'BvB',q:'BB defends with 54s vs SB raise. Flop is A93 rainbow. Action?',o:['A) Donk bet — you have position leverage','B) Check — you missed completely, check-fold to a c-bet','C) Check and evaluate — 54s has backdoor equity and can peel once','D) Bluff-raise the flop'],a:'C',e:'54s has backdoor straight equity (3-4-5-6 possibilities) on A93r. Check and call a small to medium c-bet once. You can fold to large bets or double barrels.'},
{c:'BvB',q:'At 20BB in the BB with ATo, SB shoves. Call or fold?',o:['A) Fold — ATo is dominated by AJ+','B) Call — ATo is a clear call vs SB 20BB shove','C) It depends entirely on SB tendency','D) Only call if SB is extremely loose'],a:'B',e:'ATo is a comfortable call vs SB 20BB shove. SB shove range at 20BB is wide (40%+). ATo has excellent equity vs that range and you are getting 2:1 on your call.'},
{c:'BvB',q:'What hands should BB 3-bet vs SB raise?',o:['A) Only AA, KK, QQ, AK — premium hands only','B) Premium value hands plus suited ace bluffs A3s-A5s for balance','C) Any two cards — you are getting good odds','D) Only suited hands'],a:'B',e:'BB should 3-bet value hands (QQ+, AK) plus bluffs with blockers (A3s-A5s). The bluffs have blocker equity plus nut potential. A balanced range prevents SB from exploiting your tendencies.'},
{c:'BvB',q:'SB with KJo at 15BB, BB is unknown. Raise or shove?',o:['A) Raise to 2.5BB','B) Shove — 15BB puts KJo in shove territory from SB','C) Complete — KJo plays better postflop','D) Fold — KJo gets dominated too often'],a:'B',e:'At 15BB KJo shoves from SB. Strong broadway hand, fold equity vs BB, decent equity when called. Completing and navigating postflop OOP at 15BB is much worse.'},
{c:'BvB',q:'Flop is 752 rainbow, BB checked. SB c-bets 30% pot. BB action with K8o?',o:['A) Fold — K8o has no pair and no draws','B) Call — K8o has overcards and backdoor possibilities, small bet gives good odds','C) Raise — pressure the small c-bet','D) Always fold K-high to any c-bet'],a:'B',e:'K8o vs a small c-bet on 752r has reasonable pot odds. Two overcards (K and 8) have about 25-30% equity vs SB\'s range. The small bet makes this a viable call.'},
{c:'BvB',q:'BB with 22 vs SB raise at 50BB. What is the primary strategy?',o:['A) Fold — 22 plays poorly OOP','B) Call and set-mine — 50BB gives implied odds to flop a set and win a big pot','C) 3-bet bluff — 22 has good blocker properties','D) Only call if SB raise is small'],a:'B',e:'At 50BB 22 in BB vs SB is a call for set-mining value. You need about 10-15x implied odds and at 50BB vs a likely-to-stack-off opponent you have enough.'},
{c:'BvB',q:'SB at 35BB with Q4s. Raise or fold?',o:['A) Fold — Q4s is too speculative','B) Raise — Q4s is in SB opening range at 35BB','C) Complete only','D) Open only if BB is tight'],a:'B',e:'Q4s suited is in SB opening range at 35BB. Suited cards have extra value, you have fold equity against one player, and at 35BB you can navigate postflop.'},
{c:'BvB',q:'After SB completes, BB checks. What should BB\'s strategy be on K-high boards?',o:['A) Always check — SB will bet first','B) Probe frequently — BB has uncapped range and SB is weak for not raising','C) Give up all weak hands','D) Only bet with Kx or better'],a:'B',e:'BB should probe on K-high boards after a BvB completion. SB\'s range is weak (they did not raise), BB\'s range is uncapped. Probe bets with medium holdings and draws are effective.'},
{c:'BvB',q:'At 22BB with J9s in BB, SB shoves. Call or fold?',o:['A) Fold — J9s is too speculative vs a shove','B) Call — J9s has about 40-42% equity vs SB 22BB shove range and you are getting 2:1','C) Always fold non-pairs to shoves','D) Only call if you have a read'],a:'B',e:'J9s vs SB 22BB shove: you need 33% equity and you have about 40-42% vs a wide SB shove range. Pot odds make this a call. Suited connectors play well vs wide ranges.'},
{c:'BvB',q:'SB raises 3x at 30BB. BB has 97s. Call or fold?',o:['A) Fold — 97s OOP is too speculative','B) Call — suited connector with implied odds, getting good pot odds','C) 3-bet — 97s is a good bluff candidate','D) Call only vs wide SB ranges'],a:'B',e:'97s in BB vs SB raise is a standard call. You are getting pot odds, have implied odds for straights and flushes, and 97s has enough equity to be a profitable defend.'},
{c:'BvB',q:'What is the main mistake players make in BB defense?',o:['A) Defending too wide','B) 3-betting too often','C) Defending too tight — folding hands that have enough pot odds to call profitably','D) Never check-raising'],a:'C',e:'Most players fold too much from BB. The pot odds you receive when defending BB (2:1 or better) mean many hands are profitable defends even OOP. Study your defense frequency and widen.'},
{c:'BvB',q:'SB with A2o at 20BB, folded to you. Shove or fold?',o:['A) Fold — A2o is too weak','B) Shove — A2o has strong blockers and fold equity vs the BB at 20BB','C) Complete — A2o plays better postflop','D) Open to 2x'],a:'B',e:'At 20BB A2o shoves from SB. Blocks AA and AK (reducing calling combos), has decent equity when called, and generates fold equity. A2o is in the SB shove range here.'},
{c:'BvB',q:'Heads-up (SB vs BB) — how wide should the SB open?',o:['A) Same as 6-handed BTN — about 45-50%','B) Very wide — 75-85% of hands HU, folding 2-high type hands','C) Tight — more players fold, HU is more variance','D) Only open premium hands and steal with shoves'],a:'B',e:'Heads-up the SB should open 75-85% of hands. With only one opponent you have maximum fold equity and any reasonable hand has playable equity. Folding 52o type hands is standard.'},
{c:'BvB',q:'BB with QQ, SB shoves 25BB. Call or fold?',o:['A) Fold — QQ might be up against KK or AA','B) Call — QQ has about 70-75% equity vs SB 25BB shove range','C) It depends only on SB tendencies','D) Only call if SB is known to be loose'],a:'B',e:'QQ is a comfortable call vs SB 25BB shove. SB shoves wide (50%+) at this depth, meaning QQ has approximately 70-75% equity vs their range. Easy profitable call.'},
/* ── ICM AND TOURNAMENT PLAY (25) ── */
{c:'ICM',q:'Definition: what is ICM in tournament poker?',o:['A) A method for calculating pot odds','B) Independent Chip Model — converts chip stacks to real dollar equity using the payout structure','C) International Card Method — a card-ranking system','D) A type of bluff strategy near the bubble'],a:'B',e:'ICM converts chips into their real-money equivalent based on everyone\'s stack sizes and the remaining prize pool distribution. A chip is not worth a fixed amount — it changes with stack size.'},
{c:'ICM',q:'What is the key ICM principle about chip value?',o:['A) Chips become more valuable as you accumulate more','B) Chips are worth more when you have fewer — marginal chips are worth less the more you have','C) All chips have equal value at all times','D) Chips only have ICM value on the final table'],a:'B',e:'ICM chip value is non-linear. In a $100 buy-in with 100 players, the average chip stack is worth $100 in real money. But if you have 2x the average stack, you are NOT worth 2x. You might be worth $160. This is because more chips do not guarantee proportionally more money — you still have to survive to cash. Losing 50% of your stack loses you more real money than winning 50% more chips earns you. That asymmetry is ICM.'},
{c:'ICM',q:'You are on the money bubble with medium stack. BB vs UTG shove. You have ATo. Pure ChipEV says call. ICM says?',o:['A) ICM says the same as ChipEV','B) ICM often says fold — the risk of busting outweighs the chip gain when a min-cash is valuable','C) ICM always says call with ATo','D) ICM only applies at the final table'],a:'B',e:'On the bubble ICM heavily penalizes elimination. A min-cash has real value. ATo vs UTG is often a fold ICM-adjusted even if ChipEV is breakeven, because the ICM cost of busting is too high.'},
{c:'ICM',q:'Final table bubble with 9 players. 8 get paid. You have average stack. Short stack is in BB. UTG shoves. You have KK. Call or fold?',o:['A) Always call — KK is too strong to fold','B) Fold — ICM says protect your stack when a payout jump is imminent','C) Call — KK equity overcomes ICM pressure','D) It depends on exact stack sizes and payout structure'],a:'D',e:'This is a genuine ICM dilemma. KK is strong but stack sizes matter — if the short stack is about to bust you might fold. Run the ICM math. KK is usually a call but the situation determines it.'},
{c:'ICM',q:'What is the "bubble factor"?',o:['A) How tight you should be on the bubble','B) The ratio of ICM value gained to ChipEV — how much ICM adjusts your decisions','C) The number of players left to bust before the money','D) The percentage of hands you should play at the bubble'],a:'B',e:'The bubble factor quantifies how much ICM adjusts decisions. A bubble factor of 2 means you need to win 2x as often as ChipEV breakeven to make a call profitable ICM-wise.'},
{c:'ICM',q:'You have a huge chip lead at the final table. How does ICM affect your strategy vs short stacks?',o:['A) Chip leader ignores ICM — they can absorb any loss','B) Chip leader should exploit ICM — shove wide vs short stacks who are protecting payout equity','C) Chip leader should play tighter to protect the lead','D) ICM does not apply to the chip leader'],a:'B',e:'As chip leader you can exploit ICM by shoving wide. Short stacks are highly ICM-constrained and must fold many profitable ChipEV calls. The leader benefits from this asymmetry.'},
{c:'ICM',q:'Two players have equal chips. One is near the bubble, one is deep in the money. Who has more ICM pressure?',o:['A) The player near the bubble — each bust-out has larger payout consequences','B) The player deep in the money','C) Equal ICM pressure at equal stack sizes','D) The player with the more experienced opponents'],a:'A',e:'ICM pressure is highest near payout jumps. Near the bubble each spot eliminated has huge value. Deep in the money (final few) the jumps between spots are smaller relative to already secured value.'},
{c:'ICM',q:'Monster Stack event, 500 players left, 300 get paid. You have 30BB. UTG shoves 20BB. You have 99. Action?',o:['A) Fold — ICM is severe near the bubble','B) Call — you are far enough from the bubble that ChipEV dominates, 99 is ahead of shove range','C) Always fold pairs under QQ near the bubble','D) The number of players remaining does not matter'],a:'B',e:'500 players with 300 paid means you are relatively far from the bubble. ICM pressure exists but is not severe. 99 is ahead of a UTG 20BB shove range — call ChipEV.'},
{c:'ICM',q:'Push/fold ICM situation: you have 12BB on the FT bubble. AJs from UTG. Action?',o:['A) Fold — ICM says protect stack on FT bubble','B) Shove — AJs is strong enough to shove despite ICM pressure','C) Open to 2.5BB','D) Depends on whether antes are running'],a:'B',e:'AJs from UTG at 12BB on FT bubble is a shove despite ICM. The hand is too strong and your stack is too short to wait. Shoving AJs generates fold equity and has excellent equity when called.'},
{c:'ICM',q:'What is the Nash equilibrium in push/fold poker?',o:['A) A strategy where both players are shoving the same hands','B) A push/fold strategy where no player can improve their EV by changing strategy given that all others play optimally','C) Playing perfectly balanced ranges','D) Always shoving with 10BB or less'],a:'B',e:'Nash equilibrium in push/fold is the unexploitable strategy. Given optimal calling ranges, these are the exact hands you should shove. In practice you adjust for actual caller tendencies.'},
{c:'ICM',q:'You have 40BB at a final table. Chip leader covers you. How does this change your strategy?',o:['A) No change — ignore the chip leader','B) Play tighter, especially against the chip leader. Being covered means busting costs you maximum ICM equity.','C) Play looser to accumulate chips quickly','D) Shove every hand the chip leader is not in'],a:'B',e:'Being covered by the chip leader is the worst ICM position. Any confrontation risks elimination vs maximum EV gain. Avoid marginal spots against the chip leader and exploit shorter stacks instead.'},
{c:'ICM',q:'Colossus tournament pays 2000 places out of 20000. You have 25BB with 3000 players left. How much ICM pressure?',o:['A) Extreme — act as if on the bubble','B) Low-moderate — still far from the money, play mostly ChipEV','C) Maximum — always fold to preserve stack','D) No ICM pressure this far from the money'],a:'B',e:'The bubble factor — the multiplier on how cautious to be — is proportional to how close you are to a payout jump. With 3000 players and 2000 spots paying, over 33% still need to bust. You are far from the bubble. ICM exists but your decisions are mostly ChipEV. Save the extreme ICM caution for when you are within 2-3 eliminations of the money, or at significant pay jumps like the final table bubble.'},
{c:'ICM',q:'What is a "deal" in tournament poker and when should you consider one?',o:['A) A side bet between players at the table','B) An agreement to distribute remaining prize money based on ICM or chip-count equity when few players remain','C) A chop of the blinds','D) A deal should never be made'],a:'B',e:'A deal makes sense when ICM equity exceeds your expected tournament equity. Example: ICM says you are worth $45,000. But you have a significant skill edge vs the remaining players. Your EV of continuing might be $50,000. Then declining the deal is correct. If you are up against better players, or the payout structure means high variance in outcomes, taking the ICM-based deal locks in real money vs theoretical equity. Deals favor scared money. Take them when you are a skill underdog or the variance is uncomfortable.'},
{c:'ICM',q:'With 3 players remaining, you have the short stack. Correct strategy?',o:['A) Fold everything — preserve your stack','B) Pick spots to shove from the BTN/SB where ICM pressure on opponents is highest','C) Play normal poker as if it were a cash game','D) Shove every hand to accumulate chips quickly'],a:'B',e:'3-handed ICM creates a specific dynamic: the medium stack is caught in the middle. They cannot call a shove as liberally as chip-EV would suggest, because busting to 3rd costs them real money vs the guaranteed 2nd place payout. As the short stack, shove wide from BTN/SB — the medium stack folds hands they would normally call. As the chip leader, attack the medium stack relentlessly. The short stack survives by exploiting the medium stack ICM pressure.'},
{c:'ICM',q:'Payout structure: 1st $50K, 2nd $30K, 3rd $15K. Heads-up. You have 40% of chips vs opponent 60%. What is your ICM equity?',o:['A) $32K — proportional to chip count','B) Between $30K and $50K, closer to $38-40K ICM-adjusted','C) Exactly $30K since you would get second place','D) $40K exactly'],a:'B',e:'With 40% of chips HU you are likely to win 40% of the time and lose 60%. ICM: 0.4 x $50K + 0.6 x $30K = $20K + $18K = $38K ICM equity. Better than the $30K payout for 2nd.'},
{c:'ICM',q:'Freezeout event. Near the bubble. You have a dominant chip lead. Short stack is all-in vs another player. Action?',o:['A) Root for the short stack to bust — it is almost never correct to interfere','B) Try to eliminate both players yourself','C) No action required — sit out and let ICM sort itself out','D) Donate chips to medium stack to make them comfortable'],a:'A',e:'When two other players are involved in a hand that could eliminate the short stack, do nothing. Let it play out. If the short stack busts, everyone moves up in the payout structure and your ICM position improves.'},
{c:'ICM',q:'PKO (Progressive Knockout Bounty) tournament. Does ICM change vs regular MTT?',o:['A) No — ICM is the same regardless of format','B) Yes — bounties add extra EV to eliminations, shifting strategy toward calling wider vs short stacks','C) PKO tournaments have no ICM pressure','D) PKO ICM is simpler than regular MTT'],a:'B',e:'In PKO the bounty math changes calling thresholds. If you bust a player worth a $50 bounty, that $50 adds directly to your EV of calling. A shove you might fold in a regular MTT becomes a call in PKO because the bounty equity tips the math. Rule of thumb: you need about 10% less equity to profitably call a shove in PKO vs regular MTT, depending on bounty size. Also — flat more when you cover multiple players. Letting them shove into you with their bounties in play is profitable even if you lose the hand.'},
{c:'ICM',q:'Final table. A deal is proposed. ICM give you $45K equity. Chip-count gives you $52K. Should you take the deal?',o:['A) Yes — guaranteed money is always better','B) Consider your edge vs remaining opponents — if you have a significant skill edge, declining might be correct','C) No — always play for the win','D) It depends only on payout structure'],a:'B',e:'ICM equity is not the only factor. If you have a skill edge vs remaining opponents, your EV might exceed ICM equity. Against tough opponents in a skill-driven format, deals often make sense.'},
{c:'ICM',q:'You are 3 spots from the money with 22BB. Under-the-gun shove or wait?',o:['A) Never shove 3 from the money — preserve stack','B) Continue to shove strong hands — tighten marginally but do not lock up','C) Fold everything until in the money','D) Shove every hand to accumulate chips for the money'],a:'B',e:'3 spots from money you tighten slightly from pure ChipEV but do not lock up. Continue shoving strong hands. Paralysis near the bubble costs more in missed steals than it saves in bust-out avoidance.'},
{c:'ICM',q:'Super Turbo format. How does ICM pressure compare to regular MTT?',o:['A) Same ICM pressure as regular MTT','B) Less ICM pressure per hand — turbo structures mean shorter play and chips matter more for survival','C) More ICM pressure — turbo formats have bigger swings','D) ICM is less relevant in turbo formats'],a:'B',e:'Super Turbo formats are more ChipEV-dominant than regular MTTs because the payout structure compresses faster. You have less time to navigate ICM spots and chip accumulation matters more.'},
{c:'ICM',q:'Final 2 tables of WSOP Freezeout. Payout jumps are about $2K per spot. How should you adjust?',o:['A) Extreme ICM adjustments — fold everything borderline','B) Mild adjustments — $2K jumps justify small tightening in marginal spots','C) No adjustments — too far from final table for ICM to matter','D) The dollar amount alone determines ICM adjustments'],a:'B',e:'$2K per spot is real money but not earth-shattering in a Freezeout context. Make mild ICM adjustments — tighten slightly in very close marginal spots, play near-ChipEV otherwise.'},
{c:'ICM',q:'With 10BB remaining at a final table, you are the short stack. Strategy?',o:['A) Play super tight and wait for aces','B) Pick your shove spot soon — waiting costs you fold equity and antes drain your stack','C) Call any shove with any two cards','D) Shove only from BTN and SB'],a:'B',e:'At 10BB you need to shove soon. Every orbit you lose antes and fold equity decreases. Pick a reasonable shove hand from position and go. Waiting for aces at 10BB is a significant mistake.'},
{c:'ICM',q:'What percentage equity do you need for a profitable bubble call with high ICM pressure?',o:['A) The same as ChipEV — >33% for 2:1 pot odds','B) Significantly more than ChipEV — sometimes 60-70% depending on ICM bubble factor','C) 50% always','D) It only depends on pot odds not ICM'],a:'B',e:'With high ICM pressure the bubble factor can require 60-70% equity to make a call profitable. The cost of elimination is so high that normally profitable ChipEV calls become folds.'},
/* ── OVERSIZED OPENS AND ADJUSTMENTS (15) ── */
{c:'Oversize',q:'Villain opens 5x in early position. What does this typically signal?',o:['A) A weak hand trying to steal','B) Often a strong but vulnerable hand or a recreational player uncomfortable with standard sizing','C) Always pocket aces or kings','D) A mis-click or error'],a:'B',e:'5x opens often indicate strength (recreational players who are excited about their hand) or vulnerability (wanting to reduce multi-way action). Widen your respect for their range.'},
{c:'Oversize',q:'Optimal response to a 4x BTN open when you are in BB with AKs?',o:['A) Fold — AKs is dominated at 4x','B) Call — implied odds are too good to fold','C) 3-bet for about 12-14x — scale your 3-bet proportionally','D) Shove immediately at any stack depth'],a:'C',e:'Versus a 4x open you scale your 3-bet proportionally. AKs is a clear 3-bet — size to about 3-3.5x the open (12-14BB) to maintain the same pot-odds pressure as a standard 3-bet.'},
{c:'Oversize',q:'Villain open-limps then raises large after you 3-bet. What does this usually mean?',o:['A) A weak hand trying a stop-and-go','B) A monster hand — limp-reraise is nearly always premium','C) A drawing hand','D) Nothing — all player types do this equally'],a:'B',e:'Limp-reraise is one of the strongest lines possible. Recreational players especially use this line with AA and KK. Treat it as premium range (AA, KK, sometimes QQ or AK suited).'},
{c:'Oversize',q:'You open to 3BB and villain 3-bets to 15BB. How does your flatting range change?',o:['A) No change — flat the same hands as you would vs any 3-bet','B) Flat a narrower range — the larger sizing shrinks implied odds and forces tighter calling','C) Flat wider — punish the large sizing','D) Always 4-bet vs large 3-bets'],a:'B',e:'A larger 3-bet sizing reduces implied odds and increases pot commitment. Flat a narrower range of hands that have strong equity (not just implied odds hands). Fold more marginal flats.'},
{c:'Oversize',q:'At a WSOP table, a recreational player opens 6x every hand. What is your adjustment?',o:['A) Play tighter — 6x opens are scary','B) Value-bet wider — recreational players opening large often call off with weak hands','C) 3-bet every hand to exploit the sizing','D) Only play premium hands in position'],a:'B',e:'Recreational players who open large are often calling stations. Widen your value 3-bet range since they will call with dominated hands. Reduce bluffs since they call too much.'},
{c:'Oversize',q:'BTN opens 3x. You 3-bet SB to 10x. BTN calls. How does the 3x open affect your postflop strategy?',o:['A) No difference — treat it as any 3-bet pot','B) The SPR is slightly lower than a standard 3-bet pot, adjust commitment thresholds accordingly','C) Always c-bet large since the pot is bigger','D) Check more often since the pot is big'],a:'B',e:'When villain opens 3x instead of 2.5x, the pot entering the flop is larger. If you 3-bet to 10x (30BB), and they call, the pot is ~63BB with ~70BB behind — SPR of ~1.1. That is a commit-or-fold SPR. Any top pair or better stacks off naturally. This changes your postflop options: checking to control pot makes less sense when you are already committed. Adjust by playing more straightforwardly — fewer fancy plays, more value betting.'},
{c:'Oversize',q:'Villain makes an oversized check-raise on the flop (5x your bet). What range does this represent?',o:['A) Mostly bluffs — strong hands slowplay','B) Almost always a very strong hand — sets, two pairs, combo draws at minimum','C) A balanced range of bluffs and value','D) Always a draw trying to deny equity'],a:'B',e:'Oversized check-raises (5x+) represent the strongest part of a player\'s range — sets, two pairs, nutted draws. Recreational players almost never do this as a bluff. Fold all but your strongest hands.'},
{c:'Oversize',q:'Optimal 3-bet size vs a 2.5x open, in position?',o:['A) 7.5BB — 3x the open','B) 6-7BB — slightly under 3x is fine in position','C) 10BB — larger to get more value','D) Always size to exactly 3x'],a:'A',e:'3x the open is standard in position. Vs 2.5x open that is 7.5BB. This applies correct pressure, builds a pot with your value hands, and offers you calls from dominated hands.'},
{c:'Oversize',q:'Villain min-raises (2x) every hand. What adjustment does this warrant?',o:['A) 3-bet wider — min-raises deserve less respect','B) Flat wider in position — excellent implied odds','C) Both A and B — min-raises allow you to see flops cheap and also 3-bet light','D) No adjustment needed'],a:'C',e:'Min-raises give you excellent pot odds to flat in position and 3-bets only need to be 5-6BB. Both flatting and 3-betting wider are profitable. Exploit the cheap price to enter pots.'},
{c:'Oversize',q:'You raise to 3BB, villain shoves for 45BB. Effective stack is 45BB. You have TT. Action?',o:['A) Always fold — shoves face down equity','B) Call — TT has about 55% equity vs a 45BB shove range and you are committed in the hand','C) Fold — 45BB is too deep to call off','D) Depends only on villain read'],a:'B',e:'TT vs a 45BB shove has approximately 55-60% equity vs a range that includes QQ-22, AK, AQs, and some bluffs. With the dead money in the pot this is a profitable call.'},
{c:'Oversize',q:'Opponent always bets 80-90% pot regardless of hand strength. How do you exploit?',o:['A) Fold more — large bets usually mean strong hands','B) Call or raise more freely — large sizing regardless of strength means their bluffs are expensive mistakes you can profitably call','C) Also bet large yourself','D) Move to a different table'],a:'B',e:'Players who always use large sizing have no sizing tells. However, their bluffs are very expensive. You can call more profitably because their bluffing frequency is constrained by the large size.'},
{c:'Oversize',q:'How should your 4-bet sizing change when responding to a large 3-bet (12BB vs standard 9BB)?',o:['A) Same 4-bet size — about 24-26BB always','B) Scale up proportionally — about 28-32BB vs a 12BB 3-bet','C) Always 4-bet shove regardless of 3-bet size','D) 4-bet smaller to represent a stronger hand'],a:'B',e:'Scale 4-bets proportionally to 3-bet size. Vs 12BB 3-bet, 4-bet to about 2.5-3x (28-36BB). This maintains the same fold equity and pot-odds pressure as a standard 4-bet would.'},
{c:'Oversize',q:'In a live WSOP field, recreational players often limp in early position. What is your adjustment?',o:['A) Limp behind — see cheap flops','B) Raise larger to isolate — 4-5x to price out other limpers','C) Only play premium hands in EP','D) Check raises with strong hands only'],a:'B',e:'Versus limpers in live poker, raise larger (4-5x or more) to isolate and reduce multiway action. Taking control of the pot with a wide range vs a recreational limper is profitable.'},
{c:'Oversize',q:'Your standard open is 2.5BB. You open with QQ but make it 4BB accidentally. What do you do?',o:['A) Take it back — you misclicked','B) In a live game, incorrect sizing is binding — play QQ in a 4BB raised pot','C) Announce the error and rebid','D) Fold since your hand is now readable'],a:'B',e:'4BB is a slightly larger than standard open (standard is 2-2.5BB), but it is not a sizing tell that screams strong hand to an aware opponent. Many recreational players open 4x routinely. The key: do not act embarrassed or announce the error. Just play the hand. The bigger mistake would be trying to change the sizing or acting differently — that telegraphs your hand far more than the size itself. Own it and play QQ normally.'},
{c:'Oversize',q:'Villain bets 3x pot on the river. You have a medium-strength bluff catcher (middle pair). Call or fold?',o:['A) Always call — villain is always bluffing with huge bets','B) Consider villain tendencies — 3x pot polarizes their range. If they bluff this sizing, call. If they only value-bet this sizing, fold.','C) Always fold — 3x pot is always value','D) The sizing alone determines the decision'],a:'B',e:'3x pot bets are highly polarizing. Against a player who bluffs this sizing, call profitably. Against a value-heavy player who only bets large for value, fold. Player tendencies determine the answer.'}

/* ── Range sets ── */
var OPEN40=new Set('AA KK QQ JJ TT 99 88 77 AKs AQs AJs ATs A9s A8s A7s A6s A5s A4s A3s A2s KQs KJs KTs K9s QJs QTs JTs T9s AKo AQo AJo ATo KQo KJo'.split(' '));
var PREM=new Set('AA KK QQ JJ TT AKs AKo AQs AQo'.split(' '));
var OPEN30=new Set('AA KK QQ JJ TT 99 88 77 AKs AQs AJs ATs A9s A8s A7s A6s A5s A4s A3s A2s KQs KJs KTs QJs JTs AKo AQo AJo ATo KQo KJo'.split(' '));
var DEAD30=new Set('66 55 44 33 22 T9s 98s 87s 76s 65s 54s 43s K9s QTs Q9s J9s T8s 97s 86s QJo KTo'.split(' '));
var SHOVE22=new Set('66 55 44 33 22 A9s A8s A7s A6s A5s A4s A3s A2s K9s K8s K7s K6s K5s K4s K3s K2s Q9s Q8s Q7s Q6s Q5s Q4s Q3s Q2s J8s J7s J6s J5s T8s T7s 98s 87s 76s 65s K9o K8o K7o K6o QTo Q9o Q8o JTo J9o J8o T9o T8o A9o A8o A7o A6o A5o A4o A3o A2o'.split(' '));
var SHOVE15=new Set('55 44 33 22 K4s K3s K2s Q4s Q3s Q2s J5s J4s J3s T6s T5s 96s 95s 85s 84s 75s 74s 64s 53s 52s 42s 32s K5o K4o K3o K2o Q6o Q5o J7o J6o T7o 96o 86o'.split(' '));
var BLVB=new Set('A2s A3s A4s A5s A6s K2s K3s K4s K5s K6s K7s K8s K9s Q5s Q6s Q7s Q8s Q9s J6s J7s J8s J9s T7s T8s T9s 97s 98s 87s 88 77 66 76s 65s 54s A2o A3o A4o A5o K4o K5o K6o K7o K8o K9o Q6o Q7o Q8o Q9o J7o J8o J9o T7o T8o T9o 97o 98o 87o 76o 65o'.split(' '));

function getZone(hand,depth){
  var iP=PREM.has(hand);
  if(depth==='15'){if(OPEN30.has(hand)&&!SHOVE15.has(hand))return 'prem';if(SHOVE22.has(hand)||SHOVE15.has(hand))return 'sh15';return 'fold';}
  if(depth==='22'){if(iP)return 'prem';if(OPEN30.has(hand)||SHOVE22.has(hand))return 'shove';return 'fold';}
  if(depth==='30'){if(iP)return 'prem';if(OPEN30.has(hand))return 'open';if(DEAD30.has(hand))return 'dead';if(SHOVE22.has(hand))return 'shove';return 'fold';}
  if(depth==='blvb'){if(iP)return 'prem';if(OPEN30.has(hand))return 'open';if(BLVB.has(hand))return 'blvb';return 'fold';}
  // Facing opens — 3-bet / call / fold
  if(depth==='vutg'){if(VS_UTG_3BET.has(hand)||VS_UTG_3BET_BLF.has(hand))return '3bv';if(VS_UTG_CALL_IP.has(hand))return 'call';if(VS_UTG_CALL_OOP.has(hand))return 'opn2';return 'fold';}
  if(depth==='vco'){if(VS_CO_3BET_IP.has(hand)||VS_CO_3BET_BLF.has(hand))return '3bv';if(VS_CO_CALL_IP.has(hand))return 'call';if(VS_CO_CALL_OOP.has(hand))return 'opn2';return 'fold';}
  if(depth==='vbtn'){if(VS_BTN_3BET.has(hand)||VS_BTN_3BET_BLF.has(hand))return '3bv';if(VS_BTN_CALL.has(hand))return 'call';return 'fold';}
  // 3-bet ranges by hero position
  if(depth==='3b_utg'){if(THREEBET_UTG.has(hand))return '3bv';if(OPEN40.has(hand))return 'open';return 'fold';}
  if(depth==='3b_co'){if(THREEBET_CO.has(hand))return '3bv';if(OPEN40.has(hand))return 'open';return 'fold';}
  if(depth==='3b_btn'){if(THREEBET_BTN.has(hand))return '3bv';if(OPEN40.has(hand))return 'open';return 'fold';}
  // Cash 6-max 100BB opens
  if(depth==='c6utg'){if(CASH6_UTG.has(hand))return 'open';if(PREM.has(hand))return 'prem';return 'fold';}
  if(depth==='c6co'){if(CASH6_CO.has(hand))return 'open';if(PREM.has(hand))return 'prem';return 'fold';}
  if(depth==='c6btn'){if(CASH6_BTN.has(hand))return 'open';if(PREM.has(hand))return 'prem';return 'fold';}
  // Default 40BB+ MTT
  if(iP)return 'prem';if(OPEN40.has(hand))return 'open';if(SHOVE22.has(hand))return 'shove';return 'fold';
}
function evalH(h){
  var isPair=h.length===2,suited=h.endsWith('s');
  var r1=h[0],r2=h[1],v1=RV[r1],v2=RV[r2];
  return{isPair:isPair,suited:suited,r1:r1,r2:r2,v1:v1,v2:v2,isBW:!isPair&&v1>=10&&v2>=10,isAx:r1==='A',isKx:!isPair&&r1==='K',gap:isPair?0:Math.abs(v1-v2)};
}
function getAns(hand,pos,bb){
  var h=evalH(hand),pw=PW[pos];
  var isPrem=(h.isPair&&h.v1>=10)||(h.r1==='A'&&h.r2==='K');
  var isStrong=(h.isPair&&h.v1>=7)||(h.isAx&&h.v2>=11)||(h.isBW&&h.suited);
  var isMed=(h.isPair&&h.v1>=4)||(h.isAx&&h.suited)||(h.isBW&&h.v2>=10)||(h.isKx&&h.suited&&h.v2>=9);
  var isSC=h.suited&&!h.isAx&&!h.isKx&&h.gap<=2&&h.v1<=10&&h.v2>=5;
  var isBvB=(pos==='SB'||pos==='BB');
  if(bb<=22){var isRaiseCall=(h.isPair&&h.v1>=12)||(h.r1==='A'&&h.r2==='K');var isRaiseFold=bb>=20&&((h.isAx&&h.suited&&h.v2<=5)||(h.isKx&&h.suited&&h.v2>=10)||(!h.isAx&&h.isBW&&h.suited&&h.v2>=11&&pw>=0.26));if(isRaiseCall)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — open 2x and call off any jam. Too strong to fold; shoving folds out hands you dominate.'};if(isRaiseFold)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — open 2x, fold to a jam (raise/fold). Blocker value + minimal risk. At '+bb+'BB open 2x — fold to jam, do not shove directly.'};if(isPrem||isStrong)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove directly.'+(bb>=20?' (Or open 2x and call off — both are fine with this hand.':'')};if(isMed&&pw>=0.26)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove.'+(bb>=20?' Could also open 2x from LP and fold to jam.':'')};if(isBvB&&h.isAx)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove. Any Ax in BvB shoves at this depth.'};if(isBvB&&isMed)return{action:'shove',note:hand+' in BvB at '+bb+'BB — shove. Heads-up ranges are wide.'};if(h.isAx&&!h.suited){if(pw>=0.42)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove. Ax from late position at this depth.'};if(pw>=0.26&&h.v2>=6)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove. A'+h.r2+'o from '+pos+'.'};if(pw>=0.19&&h.v2>=9)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove. Strong offsuit ace from HJ.'};if(h.v2>=10)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB — shove. ATo+ shoves from any position.'};return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB — fold. Weak offsuit ace from early position, too easily dominated.'};}return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB — fold. Insufficient equity vs calling range.'};}
  if(bb>=23&&bb<=39){if(isPrem)return{action:'open',note:hand+' is premium - always open.'};if(isStrong)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open. Strong enough for the dead zone.'};if(isMed&&(h.isBW||h.isAx||h.isKx))return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open. Broadway/suited aces in range.'};if(isMed&&h.isPair&&pw>=0.26)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open medium pair in position.'};if(pw>=0.42&&isMed)return{action:'open',note:hand+' from late position at '+bb+'BB - open wide.'};if(isBvB&&(isMed||isSC))return{action:'open',note:hand+' in BvB at '+bb+'BB - playable heads-up.'};if(h.isAx&&!h.suited){if(pw>=0.42)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB — open. Ax offsuit opens from BTN/SB at any depth. Strong blocker and fold equity.'};if(pw>=0.26&&h.v2>=5)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB — open. A'+h.r2+'o opens from CO at this depth.'};if(pw>=0.19&&h.v2>=8)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB — open. Strong offsuit ace opens from HJ.'};if(h.v2>=10)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB — open. ATo+ opens from any position.'};return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB — fold. Weak offsuit ace from early position in dead zone.'}}if(isSC||h.isPair)return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - dead zone. Too shallow for implied odds, too deep to shove.'};return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - fold.'}}
  if(isPrem||isStrong)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - standard open.'};
  if(isMed&&pw>=0.15)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open.'};
  if(isSC&&pw>=0.26)return{action:'open',note:hand+' suited connector from '+pos+' at '+bb+'BB - open for implied odds.'};
  if(h.isPair&&pw>=0.26&&bb>=45)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open in position for set-mining.'};
  return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - fold.'};
}

// Positions that can 3-bet vs your open (villain position depends on hero pos)
var VILLAIN_POSITIONS_VS={
  UTG:['HJ','CO','BTN','SB','BB'],
  HJ:['CO','BTN','SB','BB'],
  CO:['BTN','SB','BB'],
  BTN:['SB','BB'],
  SB:['BB']
};
var VILLAIN_3BET_SIZES=[6,7,8,9,10,11,12]; // BB sizing options

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

function newDrill(){
  dRes=null;dAns=null;
  hand=rndHand();
  bb=STACKS[Math.floor(Math.random()*STACKS.length)];

  if(dMode==='rfi'){
    pos=rand(POSITIONS);
  } else if(dMode==='vs_co'){
    // Hero is in the blinds or BTN facing a CO open
    pos=rand(['BTN','SB','BB']);
  } else if(dMode==='vs_btn'){
    pos=rand(['SB','BB']);
  } else if(dMode==='bvb'){
    pos=rand(['SB','BB']);
    bb=rand([20,25,30,35,40,50,75]); // BvB is more interesting deeper
  } else if(dMode==='vs_ep'){
    pos=rand(['HJ','CO','BTN','SB','BB']);
  } else if(dMode==='short_stack'){
    bb=rand([10,12,13,15,16,18,20,22]);
    pos=rand(POSITIONS);
  } else if(dMode==='3bet'){
    // Hero opens from various positions, faces a 3-bet.
    // Hand must be in hero's actual MTT opening range at this depth.
    pos=rand(['UTG','HJ','CO','BTN','SB']);
    bb=rand([25,30,35,40,50,66,100]);
    // Build the valid opening range for this pos/depth, pick a hand from it
    // Collect all 169 hand combos that hero would open here
    var validHands=[];
    var rks=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
    for(var ri=0;ri<rks.length;ri++){
      for(var rj=0;rj<rks.length;rj++){
        var h2;
        if(ri===rj) h2=rks[ri]+rks[ri];
        else if(ri<rj) h2=rks[ri]+rks[rj]+'s';
        else h2=rks[rj]+rks[ri]+'o';
        if(getAns(h2,pos,bb).action==='open'||getAns(h2,pos,bb).action==='shove'){
          validHands.push(h2);
        }
      }
    }
    // Remove duplicates
    validHands=validHands.filter(function(v,i,a){return a.indexOf(v)===i;});
    hand=validHands.length>0?rand(validHands):rndHand();
    var vPos=rand((VILLAIN_POSITIONS_VS[pos]||['BB']));
    d3VillainPos=vPos;
    d3VillainSize=rand(VILLAIN_3BET_SIZES);
    if(bb<=30) d3VillainSize=Math.min(d3VillainSize, Math.round(bb*0.35));
  }
}

// ── Facing an open: 3-bet / Call / Fold ──
// villainPos: the opener's position. heroPos: where hero sits.
// openWidth: approximate open range width of villain by position
function getVsOpenAns(hand,heroPos,bb,villainPos){
  var h=evalH(hand);
  var isIP=(heroPos==='BTN')||
           (heroPos==='CO'&&(villainPos==='UTG'||villainPos==='HJ'||villainPos==='UTG+1'))||
           (heroPos==='HJ'&&(villainPos==='UTG'||villainPos==='UTG+1'));
  var isOOP=(heroPos==='SB'||heroPos==='BB');
  var isBB=(heroPos==='BB');
  var isSB=(heroPos==='SB');
  var isPrem=(h.isPair&&h.v1>=10)||(h.r1==='A'&&h.r2==='K');
  var isStrong=(h.isPair&&h.v1>=8)||(h.isAx&&h.v2>=12)||(h.isBW&&h.suited&&h.v2>=11);
  var isMed=(h.isPair&&h.v1>=6)||(h.isAx&&h.suited)||(h.isBW&&h.v2>=10)||(h.isKx&&h.suited&&h.v2>=9);
  var isSC=h.suited&&!h.isAx&&!h.isKx&&h.gap<=2&&h.v1<=10&&h.v2>=5;
  var openLabel=villainPos==='BTN'?'BTN':villainPos==='CO'?'CO':'EP';

  // Short stack — shove or fold (no calls)
  if(bb<=22){
    if(isPrem||isStrong)return{action:'3bet',note:hand+' vs '+openLabel+' open at '+bb+'BB — 3-bet shove. Strong enough to go all-in over the open.'};
    if(isBB&&isMed)return{action:'call',note:hand+' in BB vs '+openLabel+' open at '+bb+'BB — call. Getting good odds to defend.'};
    return{action:'fold',note:hand+' vs '+openLabel+' open at '+bb+'BB — fold. Not strong enough to 3-bet shove or call short-stacked.'};
  }

  // Premium — always 3-bet
  if(h.r1==='A'&&h.r2==='A')return{action:'3bet',note:'AA — always 3-bet vs '+openLabel+'. Build the pot preflop with the best hand.'};
  if(h.r1==='K'&&h.r2==='K')return{action:'3bet',note:'KK — always 3-bet vs '+openLabel+'. Never flat KK, you want to go to war preflop.'};
  if(h.r1==='Q'&&h.r2==='Q')return{action:'3bet',note:'QQ — 3-bet vs '+openLabel+'. Strong enough to 3-bet for value from any position.'};
  if(h.r1==='A'&&h.r2==='K')return{action:'3bet',note:'AK — 3-bet vs '+openLabel+'. Premium hand, generates fold equity, and has great equity when called.'};

  // JJ: 3-bet IP, call or 3-bet OOP depending on villain width
  if(h.r1==='J'&&h.r2==='J'){
    if(isIP)return{action:'3bet',note:'JJ in position vs '+openLabel+' — 3-bet for value. You are ahead of their range and want to narrow the field.'};
    if(villainPos==='BTN')return{action:'3bet',note:'JJ in '+heroPos+' vs BTN open — 3-bet. BTN opens very wide; JJ crushes their range.'};
    return{action:'call',note:'JJ in '+heroPos+' vs '+openLabel+' open — call. OOP vs a tight EP/CO range, flatting preserves your equity better than 3-betting into their strong range.'};
  }
  // TT
  if(h.r1==='T'&&h.r2==='T'){
    if(isIP&&villainPos==='BTN')return{action:'3bet',note:'TT in position vs BTN open — 3-bet. BTN opens ~45% of hands; TT dominates their range.'};
    if(isIP)return{action:'call',note:'TT in position vs '+openLabel+' — call. Good equity, strong hand, but EP/CO open ranges reduce the incentive to 3-bet.'};
    if(isBB&&villainPos==='BTN')return{action:'3bet',note:'TT in BB vs BTN — 3-bet. BTN opens wide, TT has too much equity to just call.'};
    return{action:'call',note:'TT in '+heroPos+' vs '+openLabel+' — call. Solid hand, but 3-betting OOP into a tight EP range puts you in a tough spot. Flat and play postflop.'};
  }
  // 99
  if(h.isPair&&h.v1===9){
    if(isIP&&villainPos==='BTN')return{action:'3bet',note:'99 in position vs BTN — 3-bet. BTN range is wide enough that 99 is comfortably ahead.'};
    if(isIP)return{action:'call',note:'99 in position vs '+openLabel+' — call. Good implied odds and set value in position.'};
    return{action:'call',note:'99 in '+heroPos+' vs '+openLabel+' — call. Set value plus decent equity. 3-betting OOP risks turning this into a coin-flip spot.'};
  }
  // 88-66
  if(h.isPair&&h.v1>=6&&h.v1<=8){
    if(isIP)return{action:'call',note:hand+' in position vs '+openLabel+' — call for set value. Good implied odds at '+bb+'BB.'};
    if(isBB)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Getting pot odds and closing the action.'};
    return{action:'fold',note:hand+' in SB vs '+openLabel+' — fold. Medium pairs OOP without the pot odds of the BB.'};
  }
  // Small pairs
  if(h.isPair&&h.v1<=5){
    if(isIP&&bb>=35)return{action:'call',note:hand+' in position vs '+openLabel+' — call for set value at '+bb+'BB.'};
    if(isBB)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Getting 2:1+ pot odds to set-mine.'};
    return{action:'fold',note:hand+' vs '+openLabel+' — fold. Small pairs need position or big pot odds to be profitable.'};
  }
  // AQ
  if(h.isAx&&h.v2===12){
    if(h.suited){
      if(isIP||villainPos==='BTN'||villainPos==='CO')return{action:'3bet',note:'AQs vs '+openLabel+' — 3-bet. Strong hand with blockers and nut-flush potential.'};
      return{action:'call',note:'AQs in '+heroPos+' vs tight '+openLabel+' open — call. Avoid 3-betting into an EP range that dominates AQ with AK frequently.'};
    }
    if(isIP&&(villainPos==='BTN'||villainPos==='CO'))return{action:'3bet',note:'AQo in position vs '+openLabel+' — 3-bet. Wide enough range to 3-bet for value.'};
    if(isBB&&villainPos==='BTN')return{action:'3bet',note:'AQo in BB vs BTN — 3-bet. BTN opens very wide and AQo has strong equity vs their range.'};
    if(villainPos==='UTG'||villainPos==='HJ')return{action:'fold',note:'AQo vs '+openLabel+' (tight EP) open — fold. AQ is often dominated by AK in an EP range and plays poorly OOP.'};
    return{action:'call',note:'AQo in '+heroPos+' vs '+openLabel+' — call. Decent hand but avoid 3-betting OOP into a range that has AK frequently.'};
  }
  // AJ
  if(h.isAx&&h.v2===11){
    if(h.suited&&isIP)return{action:'3bet',note:'AJs in position vs '+openLabel+' — 3-bet bluff with blocker value and nut-flush equity.'};
    if(h.suited&&isBB&&(villainPos==='BTN'||villainPos==='CO'))return{action:'3bet',note:'AJs in BB vs '+openLabel+' — 3-bet. Wide open range means your hand has strong equity.'};
    if(isBB)return{action:'call',note:'AJo/AJs in BB vs '+openLabel+' — call. Getting pot odds with a decent hand.'};
    return{action:'fold',note:'AJo in '+heroPos+' vs '+openLabel+' — fold. Reverse implied odds OOP, dominated by AQ+ in villain range.'};
  }
  // Suited aces A2s-A9s
  if(h.isAx&&h.suited){
    if(h.v2<=5){ // A2s-A5s are 3-bet bluffs
      if(isOOP&&(villainPos==='BTN'||villainPos==='CO'))return{action:'3bet',note:hand+' in '+heroPos+' vs '+openLabel+' — 3-bet bluff. Blocks AA/AK, generates fold equity, nut-flush potential when called.'};
      if(isIP)return{action:'call',note:hand+' in position vs '+openLabel+' — call. Nut-flush potential and implied odds in position.'};
      return{action:'fold',note:hand+' in '+heroPos+' vs '+openLabel+' — fold. Better as a 3-bet bluff than a call OOP, but tight EP range reduces fold equity.'};
    }
    // A6s-A9s
    if(isIP||isBB)return{action:'call',note:hand+' vs '+openLabel+' — call. Suited ace with implied odds. Good equity in position or from BB.'};
    return{action:'fold',note:hand+' in SB vs '+openLabel+' — fold. Suited aces play best in position or from BB.'};
  }
  // KQs/KJs
  if(h.isKx&&h.suited&&h.v2>=11){
    if(isIP||(isBB&&(villainPos==='BTN'||villainPos==='CO')))return{action:'3bet',note:hand+' vs '+openLabel+' — 3-bet. Strong suited broadway with value and equity.'};
    if(isBB)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Strong enough to call, 3-betting into EP can be tricky.'};
    return{action:'call',note:hand+' in '+heroPos+' vs '+openLabel+' — call.'};
  }
  // KQo KJo in position
  if(h.isKx&&!h.suited&&h.v2>=11){
    if(isIP&&(villainPos==='BTN'||villainPos==='CO'))return{action:'3bet',note:hand+' in position vs '+openLabel+' — 3-bet. Strong offsuit broadway with good equity.'};
    if(isBB&&villainPos==='BTN')return{action:'3bet',note:hand+' in BB vs BTN — 3-bet. BTN opens wide and KQo/KJo has strong equity.'};
    if(isBB)return{action:'call',note:hand+' in BB — call. Getting pot odds with a strong hand.'};
    return{action:'fold',note:hand+' in '+heroPos+' vs '+openLabel+' — fold. Offsuit KJ/KQ plays poorly OOP vs a tight range.'};
  }
  // Suited connectors in position or BB
  if(isSC){
    if(isIP&&bb>=35)return{action:'call',note:hand+' in position vs '+openLabel+' — call. Implied odds and playability in position at '+bb+'BB.'};
    if(isBB)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Pot odds justify defending suited connectors from BB.'};
    return{action:'fold',note:hand+' in SB vs '+openLabel+' — fold. Suited connectors need position or pot odds to be profitable.'};
  }
  // Suited broadways (KQs, QJs, KJs, JTs, QTs) — strong BB defends and IP calls
  if(h.isBW&&h.suited){
    if(isIP)return{action:'call',note:hand+' suited in position vs '+openLabel+' — standard call. Strong equity, good playability, and position make this profitable.'};
    if(isBB)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Suited broadways are clear BB defends at any depth. Great pot odds, strong equity, good playability.'};
    if(isSB&&(villainPos==='BTN'||villainPos==='CO'))return{action:'3bet',note:hand+' in SB vs '+openLabel+' — 3-bet. Suited broadway OOP benefits from 3-betting to take initiative rather than calling into positional disadvantage.'};
    return{action:'fold',note:hand+' vs '+openLabel+' OOP in SB — fold. Suited broadways need position or the pot-odds advantage of BB to be profitable in single-raised pots.'};
  }
  // Broadway offsuit
  if(h.isBW&&!h.suited){
    if(isIP&&(villainPos==='BTN'||villainPos==='CO')&&h.v2>=10)return{action:'call',note:hand+' in position vs '+openLabel+' — call. Decent equity in position.'};
    if(isBB&&h.v2>=10)return{action:'call',note:hand+' in BB vs '+openLabel+' — call. Getting pot odds with a broadway hand.'};
    return{action:'fold',note:hand+' in '+heroPos+' vs '+openLabel+' — fold. Offsuit broadways need strong position or pot odds.'};
  }
  // Default fold
  return{action:'fold',note:hand+' in '+heroPos+' vs '+openLabel+' open at '+bb+'BB — fold.'};
}

function get3BetAns(hand,pos,bb,villainPos,villainSize){
  var h=evalH(hand);
  var isPrem=(h.isPair&&h.v1>=10)||(h.r1==='A'&&h.r2==='K');
  var isStrong=(h.isPair&&h.v1>=7)||(h.isAx&&h.v2>=11)||(h.isBW&&h.suited);
  var isMed=(h.isPair&&h.v1>=4)||(h.isAx&&h.suited)||(h.isBW&&h.v2>=10)||(h.isKx&&h.suited&&h.v2>=9);
  var isIP=(pos==='BTN'||(pos==='CO'&&(villainPos==='SB'||villainPos==='BB')));
  var remaining=bb-villainSize;
  var potCommitted=remaining<(bb*0.35); // less than 35% stack behind = committed

  // 4-bet shove threshold
  var shoveThresh=potCommitted||(bb<=35);

  // Value 4-bet hands (QQ+ AKs always, AKo at most depths)
  if(h.r1==='A'&&h.r2==='A')return{action:'4bet',note:'AA — always 4-bet. Shove at '+bb+'BB, 4-bet to '+(shoveThresh?'shove':Math.round(villainSize*2.5)+'BB')+' at deeper stacks.'};
  if(h.r1==='K'&&h.r2==='K')return{action:'4bet',note:'KK — 4-bet for value. At '+bb+'BB '+(shoveThresh?'shove.':'4-bet to '+Math.round(villainSize*2.5)+'BB, call off vs a 5-bet.')};
  if(h.r1==='Q'&&h.r2==='Q'){
    if(bb<=40)return{action:'4bet',note:'QQ at '+bb+'BB facing a 3-bet — 4-bet shove. Too shallow to flat and play postflop with an overpair guessing game.'};
    return{action:'4bet',note:'QQ vs '+villainPos+' 3-bet — 4-bet to ~'+Math.round(villainSize*2.5)+'BB. QQ wants to go to war preflop vs most 3-bet ranges.'};
  }
  if(h.r1==='J'&&h.r2==='J'){
    if(bb<=30)return{action:'4bet',note:'JJ at '+bb+'BB — 4-bet shove. Too shallow to flat comfortably, and JJ is strong vs most 3-bet ranges.'};
    if(isIP)return{action:'call',note:'JJ in position vs '+villainPos+' 3-bet at '+bb+'BB — call. Deep enough to realize set and overpair equity in position. Avoid 4-betting and turning it into a guessing game.'};
    return{action:'4bet',note:'JJ OOP vs '+villainPos+' 3-bet — 4-bet shove at '+bb+'BB. Playing JJ OOP in a 3-bet pot deep is difficult. Prefer to end it preflop.'};
  }
  if(h.r1==='T'&&h.r2==='T'){
    if(bb<=25)return{action:'4bet',note:'TT at '+bb+'BB — 4-bet shove. Ahead of most 3-bet bluff ranges and short enough that flatting OOP is bad.'};
    if(isIP&&bb>=40)return{action:'call',note:'TT in position at '+bb+'BB vs a direct 3-bet of your open — call or 4-bet shove, both are valid. Calling keeps JJ/QQ in their range and realizes equity in position. 4-bet shoving generates fold equity and avoids postflop guessing. Either line is fine; calling is slightly preferred when deep.'};
    if(bb<=35)return{action:'4bet',note:'TT at '+bb+'BB OOP — 4-bet shove. Not deep enough to flat comfortably out of position.'};
    return{action:'call',note:'TT at '+bb+'BB — marginal. Call if in position. 4-bet shove if OOP at this depth.'};
  }
  // AK
  if(h.r1==='A'&&h.r2==='K'){
    if(bb<=40)return{action:'4bet',note:'AK at '+bb+'BB vs 3-bet — 4-bet shove. Strong equity vs 3-bet range, flip or better vs all hands. Never flat AK short-stacked.'};
    return{action:'4bet',note:'AK vs '+villainPos+' 3-bet — 4-bet. AK has ~55% equity vs QQ and crushes all 3-bet bluffs. 4-bet to ~'+Math.round(villainSize*2.5)+'BB.'};
  }
  // AQ — position dependent
  if(h.isAx&&h.v2===12){
    if(bb<=30)return{action:'4bet',note:'AQo/AQs at '+bb+'BB — 4-bet shove. Strong blocker, ahead of 3-bet bluff range, short enough to commit.'};
    if(isIP)return{action:'call',note:'AQs in position vs '+villainPos+' 3-bet — call. Strong hand, good playability in position. Avoid 4-betting and folding to a 5-bet with AQ.'};
    return{action:'fold',note:'AQo OOP vs '+villainPos+' 3-bet at '+bb+'BB — fold. Dominated by AK often, vulnerable OOP. The weakest of the "strong" hands in this spot.'};
  }
  // Suited bluff 4-bets (A5s, A4s)
  if(h.isAx&&h.suited&&(h.v2===5||h.v2===4||h.v2===3)){
    if(bb<=30)return{action:'4bet',note:hand+' — 4-bet bluff shove at '+bb+'BB. Strong blockers on AA/AK, fold equity, decent equity when called.'};
    return{action:'4bet',note:hand+' — 4-bet bluff vs '+villainPos+'. Blocks AA and AK (fewer combos to call), nut flush potential, fold equity. Classic 4-bet bluff hand.'};
  }
  // Medium pairs — call or fold based on position
  if(h.isPair&&h.v1>=7&&h.v1<=9){
    if(isIP&&bb>=35)return{action:'call',note:hand+' in position vs '+villainPos+' 3-bet at '+bb+'BB — call. Set value, decent equity, and position make this a profitable flat.'};
    if(bb<=25)return{action:'4bet',note:hand+' at '+bb+'BB vs 3-bet — 4-bet shove. Pair equity + fold equity make this better than calling short-stacked.'};
    return{action:'fold',note:hand+' OOP vs '+villainPos+' 3-bet at '+bb+'BB — fold. Not strong enough to 4-bet, too hard to play OOP in a 3-bet pot.'};
  }
  // Small pairs
  if(h.isPair&&h.v1<=6){
    if(isIP&&bb>=50)return{action:'call',note:hand+' in position at '+bb+'BB — marginal call for set value. Need roughly 15x implied odds. Only profitable at this depth in position.'};
    return{action:'fold',note:hand+' vs '+villainPos+' 3-bet — fold. Small pairs do not have enough equity to call a 3-bet, especially OOP or short-stacked.'};
  }
  // Suited connectors
  if(h.suited&&!h.isAx&&!h.isKx&&h.gap<=2&&bb>=50&&isIP){
    return{action:'call',note:hand+' in position at '+bb+'BB — can call a 3-bet for implied odds and playability. Deep stack + position make this marginally profitable.'};
  }
  // Broadway hands
  if(h.isBW&&h.suited&&isIP&&bb>=35){
    return{action:'call',note:hand+' suited in position vs '+villainPos+' 3-bet — call. Strong equity, position, and playability justify a call. Fold if OOP or short-stacked.'};
  }
  if(h.isBW&&!h.suited){
    if(isIP&&h.v2>=11&&bb>=35)return{action:'call',note:hand+' in position vs '+villainPos+' 3-bet — marginal call. Decent equity, playable in position. Fold if OOP.'};
    return{action:'fold',note:hand+' vs '+villainPos+' 3-bet — fold. Offsuit broadways outside the top range struggle in 3-bet pots, especially OOP.'};
  }
  // Default: fold
  return{action:'fold',note:hand+' vs '+villainPos+' 3-bet to '+villainSize+'BB at '+bb+'BB — fold. Hand does not have the equity or blocker value to call or 4-bet profitably.'};
}

// ── Facing-3bet for CASH (200BB/100BB) ──
function getCash3BetAns(hand,pos,bb,villainPos,villainSize){
  var h=evalH(hand);
  var isPrem=(h.isPair&&h.v1>=10)||(h.r1==='A'&&h.r2==='K');
  var isIP=(pos==='BTN'||(pos==='CO'&&(villainPos==='SB'||villainPos==='BB')));
  var depthLabel=cDepth+'BB '+cTableSize.replace('max','-max');

  if(h.r1==='A'&&h.r2==='A')return{action:'4bet',note:'AA — always 4-bet to ~'+Math.round(villainSize*3)+'BB. Never flat AA in cash games at any depth.'};
  if(h.r1==='K'&&h.r2==='K')return{action:'4bet',note:'KK — 4-bet to ~'+Math.round(villainSize*3)+'BB. Strong enough to go to war preflop.'};
  if(h.r1==='Q'&&h.r2==='Q'){
    if(isIP)return{action:'call',note:'QQ in position at '+depthLabel+' — call the 3-bet. At this depth you have room to navigate postflop and extract max value.'};
    return{action:'4bet',note:'QQ OOP vs '+villainPos+' 3-bet — 4-bet. Playing QQ OOP in a bloated pot is difficult. Prefer to take control preflop.'};
  }
  if(h.r1==='J'&&h.r2==='J'){
    if(isIP&&cDepth==='200')return{action:'call',note:'JJ in position at 200BB — call. Deep stacks give you set value and strong overpair equity. Postflop edge is high in position.'};
    if(isIP)return{action:'call',note:'JJ in position at '+depthLabel+' — call. Good equity and position. Be prepared to fold on A/K/Q flops vs continued aggression.'};
    return{action:'fold',note:'JJ OOP vs '+villainPos+' 3-bet at '+depthLabel+' — fold or 4-bet. Playing JJ OOP in a 3-bet pot deep is a losing spot long-term.'};
  }
  if(h.r1==='A'&&h.r2==='K'){
    if(cDepth==='200')return{action:'4bet',note:'AK at 200BB — 4-bet to ~'+Math.round(villainSize*3)+'BB. AK benefits from fold equity and has excellent equity when called. Do not flat AK in cash games.'};
    return{action:'4bet',note:'AK at '+depthLabel+' — 4-bet. Strong equity, blocker value, and 4-betting charges draws.'};
  }
  if(h.isAx&&h.suited&&(h.v2===5||h.v2===4||h.v2===3)){
    return{action:'4bet',note:hand+' — 4-bet bluff at '+depthLabel+'. Blocks AA/AK, nut flush potential when called. Classic cash game bluff 4-bet hand. Size to ~'+Math.round(villainSize*3)+'BB.'};
  }
  if(h.isAx&&h.v2===12){
    if(isIP)return{action:'call',note:'AQs in position at '+depthLabel+' — call the 3-bet. Deep stacks make the implied odds strong and you have position. 4-betting AQ risks getting 5-bet off your hand.'};
    return{action:'fold',note:'AQo OOP vs '+villainPos+' at '+depthLabel+' — fold. Reverse implied odds OOP and vulnerable to AK domination.'};
  }
  if(h.isPair&&h.v1>=7&&h.v1<=9){
    if(isIP&&cDepth==='200')return{action:'call',note:hand+' in position at 200BB — call. Set value is enormous deep stacked, and overpair equity is significant.'};
    if(isIP)return{action:'call',note:hand+' in position at '+depthLabel+' — call. Good equity and set value justify calling in position.'};
    return{action:'fold',note:hand+' OOP vs 3-bet at '+depthLabel+' — fold. Medium pairs play poorly OOP in 3-bet pots without hitting a set.'};
  }
  if(h.isPair&&h.v1<=6){
    if(isIP&&cDepth==='200')return{action:'call',note:hand+' in position at 200BB — call for set value. At 200BB effective the implied odds are ~25x. Extremely profitable when you hit.'};
    if(isIP&&cDepth==='100')return{action:'call',note:hand+' in position at 100BB — marginal call for set value. Need to stack off when you hit. Fold if 3-bet size makes odds unfavorable.'};
    return{action:'fold',note:hand+' OOP vs 3-bet — fold. Small pairs in 3-bet pots OOP lose money without hitting sets and cannot realize equity easily.'};
  }
  if(h.suited&&!h.isAx&&!h.isKx&&h.gap<=1&&cDepth==='200'&&isIP){
    return{action:'call',note:hand+' in position at 200BB — call. Deep stacks make suited connectors extremely profitable in 3-bet pots. You can win massive pots hitting straights and flushes.'};
  }
  if(h.isBW&&h.suited&&isIP){
    return{action:'call',note:hand+' suited in position at '+depthLabel+' — call the 3-bet. Strong equity, blocker value, and position.'};
  }
  return{action:'fold',note:hand+' vs '+villainPos+' 3-bet at '+depthLabel+' — fold. Not in the calling or 4-betting range here.'};
}

}

    if(pos==='CO')return CASH_OPEN_100_CO;
    if(pos==='BTN')return CASH_OPEN_100_BTN;
    return CASH_OPEN_100_SB;
  }
  if(pos==='UTG'||pos==='UTG+1')return CASH_OPEN_UTG;
  if(pos==='HJ')return CASH_OPEN_HJ;
  if(pos==='CO')return CASH_OPEN_CO;
  if(pos==='BTN')return CASH_OPEN_BTN;
  return CASH_OPEN_SB;
}

function evalCashHand(h){
  var isPair=h.length===2,suited=h.endsWith('s');
  var r1=h[0],r2=h[1],v1=RV[r1],v2=RV[r2];
  var isAx=r1==='A',isKx=!isPair&&r1==='K';
  var isBW=!isPair&&v1>=10&&v2>=10;
  var gap=isPair?0:Math.abs(v1-v2);
  var isSC=suited&&!isAx&&!isKx&&gap<=2&&v1<=10&&v2>=5;
  var isPrem=(isPair&&v1>=10)||(r1==='A'&&r2==='K');
  var depthLabel=cDepth+'BB '+cTableSize.replace('max','-max');
  var openSet=getCashOpenSet(cPos);
  var inOpen=openSet.has(h);
  var action=inOpen?'open':'fold';
  var note='';
  if(inOpen){
    if(isPrem)note=h+' is premium — standard open from '+cPos+' ('+depthLabel+'). Size 2.5BB, 3BB from SB.';
    else if(isSC&&cDepth==='200')note=h+' from '+cPos+' — open. At 200BB suited connectors have massive implied odds. One of the biggest edges in deep stack cash.';
    else if(isSC)note=h+' from '+cPos+' — open. 100BB gives solid implied odds for suited connectors in position.';
    else if(isAx&&suited)note=h+' from '+cPos+' — open. Suited aces have nut-flush potential and strong equity ('+depthLabel+').';
    else if(isPair)note=h+' from '+cPos+' — open for set-mining. '+depthLabel+' gives the implied odds to profitably flop sets.';
    else note=h+' from '+cPos+' — standard open ('+depthLabel+'). Size to 2.5BB.';
  }else{
    var tableNote=cTableSize==='8max'?' 8-max requires tighter ranges — 2 extra players behind increase the chance of a 3-bet or strong caller.':' Range is tight at this position in 6-max.';
    var depthNote=cDepth==='100'?' At 100BB speculative hands need more equity to compensate for lower implied odds vs 200BB.':'';
    if(isPair&&v1<=5)note=h+' from '+cPos+' — fold.'+tableNote+depthNote+' Small pairs need 15x implied odds; stack depth or position does not justify it here.';
    else if(isKx&&!suited)note=h+' from '+cPos+' — fold. Weak offsuit K-x has reverse implied odds when dominated by AK, KQ.'+tableNote;
    else note=h+' from '+cPos+' — fold ('+depthLabel+').'+tableNote+depthNote;
  }
  return{action:action,note:note};
}
