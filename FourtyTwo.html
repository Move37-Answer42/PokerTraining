<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FourtyTwo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#141b26;--bg4:#1a2235;
  --cyan:#00d4ff;--pink:#ff2d78;--violet:#a855f7;--gold:#f5c842;
  --green:#00ff88;
  --text:#e8edf5;--text2:#7a8aa0;--text3:#3d4f66;
  --bd:rgba(255,255,255,.07);--bd2:rgba(0,212,255,.22);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px}
/* Nav */
#nav{display:flex;gap:4px;padding:10px 12px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--bd);overflow-x:auto;align-items:center;position:sticky;top:0;z-index:99}
.nb{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit;letter-spacing:.4px}
.nb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
.xpb{margin-left:auto;flex-shrink:0;display:flex;gap:14px;font-size:11px;padding-left:10px;white-space:nowrap}
/* Layout */
#main{padding:16px 14px;max-width:720px;margin:0 auto;padding-bottom:60px}
/* Surfaces */
.sf{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.sf2{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:14px}
/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border-radius:8px;padding:12px}
.ml{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.mv{font-size:24px;font-weight:700;line-height:1}
/* Pills */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.pc{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)}
.pp{background:rgba(255,45,120,.1);color:var(--pink);border:1px solid rgba(255,45,120,.25)}
.pv{background:rgba(168,85,247,.1);color:var(--violet);border:1px solid rgba(168,85,247,.25)}
.pm{background:rgba(122,138,160,.08);color:var(--text2);border:1px solid rgba(122,138,160,.15)}
.pn{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
/* Pillars */
.pillar{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.pillar:last-child{border-bottom:none}
.pico{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
/* Tabs */
.tab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tb{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit}
.tb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
/* Drill */
.hand-big{font-size:clamp(48px,14vw,72px);font-weight:700;text-align:center;letter-spacing:6px;line-height:1;padding:18px 0 8px}
.act-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.abtn{padding:14px 28px;font-size:14px;font-weight:700;font-family:inherit;border-radius:8px;cursor:pointer;letter-spacing:.5px;border:1px solid;min-width:130px}
.a-open{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.35)}
.a-fold{background:rgba(255,45,120,.1);color:var(--pink);border-color:rgba(255,45,120,.35)}
.a-shove{background:rgba(168,85,247,.1);color:var(--violet);border-color:rgba(168,85,247,.35)}
.res-ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);border-radius:8px;padding:12px}
.res-no{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.25);border-radius:8px;padding:12px}
/* Flashcard */
.fcard{border:1px solid var(--bd2);border-radius:10px;min-height:200px;background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;user-select:none}
.fc-q{font-size:clamp(14px,4vw,16px);font-weight:700;line-height:1.6;margin-top:10px}
.fc-a{font-size:12px;line-height:1.9;color:var(--text2)}
/* Quiz */
.qbox{font-size:14px;line-height:1.8;padding:14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;margin-bottom:12px}
.qopt{display:block;text-align:left;padding:12px 14px;font-size:12px;cursor:pointer;border-radius:7px;border:1px solid var(--bd);background:var(--bg3);color:var(--text);font-family:inherit;width:100%;margin-bottom:6px;line-height:1.5}
.qopt.qok{background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.3)}
.qopt.qno{background:rgba(255,45,120,.08);color:var(--pink);border-color:rgba(255,45,120,.3)}
.qopt.qdim{opacity:.3}
.gbtn{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3);padding:12px 20px;font-size:12px;cursor:pointer;border-radius:7px;font-family:inherit;font-weight:600;letter-spacing:.4px;width:100%;margin-bottom:10px}
.gbtn:disabled{opacity:.4}
.key-wrap{margin-bottom:12px}
.key-lbl{font-size:9px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.key-in{width:100%;padding:10px 12px;font-size:12px;font-family:inherit;background:var(--bg3);border:1px solid var(--bd2);border-radius:7px;color:var(--text);outline:none}
/* Grid */
.grid-wrap{display:grid;grid-template-columns:18px repeat(13,minmax(0,1fr));gap:2px}
.gc{font-size:clamp(5.5px,1.5vw,7.5px);text-align:center;padding:3px 1px;border-radius:2px;border:1px solid transparent;line-height:1.3;font-family:'Courier New',monospace;font-weight:600}
.g-prem{background:rgba(245,200,66,.18);color:#f5c842;border-color:rgba(245,200,66,.3)}
.g-open{background:rgba(0,212,255,.13);color:var(--cyan);border-color:rgba(0,212,255,.22)}
.g-blvb{background:rgba(168,85,247,.13);color:var(--violet);border-color:rgba(168,85,247,.22)}
.g-dead{background:rgba(255,45,120,.1);color:#ff6699;border-color:rgba(255,45,120,.18)}
.g-shove{background:rgba(168,85,247,.13);color:var(--violet);border-color:rgba(168,85,247,.22)}
.g-sh15{background:rgba(0,212,255,.08);color:#66ddff;border-color:rgba(0,212,255,.15)}
.g-fold{background:rgba(20,27,38,.9);color:#2a3a50;border-color:rgba(255,255,255,.03)}
/* Utils */
.nbtn{width:100%;padding:12px;font-size:12px;cursor:pointer;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--text2);font-family:inherit;font-weight:600;margin-top:8px}
.pb{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:12px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#00a8cc,#00d4ff)}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes gl{0%,100%{opacity:1}50%{opacity:.72}}
.anim{animation:fi .2s ease forwards}
.glow{animation:gl 2s ease-in-out infinite}
</style>
</head>
<body>

<div id="nav">
  <button class="nb on" data-action="nav" data-view="home">&#9824; FourtyTwo</button>
  <button class="nb" data-action="nav" data-view="drill">&#9829; Drill</button>
  <button class="nb" data-action="nav" data-view="flash">&#9830; Cards</button>
  <button class="nb" data-action="nav" data-view="quiz">&#9827; AI Quiz</button>
  <button class="nb" data-action="nav" data-view="grid">&#9632; Grid</button>
  <div class="xpb">
    <span id="xpd" style="color:#f5c842;font-weight:700">&#9889; 0 XP</span>
    <span id="std" style="color:#a855f7">&#9670; 0</span>
  </div>
</div>
<div id="main"></div>

<script>
'use strict';

/* ── Data ── */
var RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
var RV={A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
var WSOP=new Date('2026-06-04');
var POSITIONS=['UTG','HJ','CO','BTN','SB'];
var PW={UTG:.15,HJ:.19,CO:.26,BTN:.48,SB:.42};
var STACKS=[15,18,20,22,25,30,35,40,50,75];
var SUITS=['\u2660','\u2665','\u2666','\u2663'];

var PILLARS=[
  {id:1,name:'Opening Ranges',sub:'Position + depth fundamentals',status:'done'},
  {id:2,name:'Post-Flop Foundations',sub:'C-bet, board textures, check-raise',status:'done'},
  {id:3,name:'3-Bet & Squeeze',sub:'Resteal math, oversized opens',status:'active',
    gaps:['A7s multiway resteal math','3x-5x open response drill pending']},
  {id:4,name:'ICM & Tournament Play',sub:'Bubble, FT, payout ladders',status:'pending'},
  {id:5,name:'Advanced Adjustments',sub:'Exploits, live reads, dynamics',status:'pending'},
];

var FC={
  1:[
    {q:'UTG open range at 40BB+?',a:'~15%: All pairs (22+), broadways (ATo+, KJo+, QJs+, JTs), suited aces (A2s+), suited kings (KTs+). Fold low SCs and speculative hands.'},
    {q:'What hands enter the dead zone at 30BB UTG?',a:'Suited connectors 67s-T9s, low pairs 22-66, speculative gappers. Too shallow for implied odds, too deep to shove. Fold.'},
    {q:'KJo from CO at 30BB?',a:'Open. Standard CO open at any depth. At 30BB open for value, fold to a 3-bet.'},
    {q:'Dead zone boundaries for speculative hands?',a:'23-40BB. 67s cannot realize implied odds (need 50BB+) and cannot shove profitably. Shove at 22BB or less, open at 40BB+.'},
    {q:'BTN open range at 30BB?',a:'About 45-50%. Near any two decent cards. Position is the asset.'},
    {q:'67s shove threshold from UTG?',a:'22BB or less. Dead zone 23-40BB. Open 40BB+. Exact shove line: 20-22BB.'},
  ],
  2:[
    {q:'A72r (dry board) c-bet freq + sizing?',a:'High frequency (~75%), small size (25-33% pot). Dry board heavily favors raiser. Caller has few two-pairs, sets, or draws.'},
    {q:'987tt (wet board) c-bet adjustment?',a:'Check more often (~50%) or use large sizing (60-75%) when betting. Board hits caller with sets, two-pairs, and draws.'},
    {q:'Rule of 2 and 4?',a:'Multiply outs: times 4 on flop (two streets), times 2 on turn (one street). 9-out flush draw is about 36% on flop.'},
    {q:'When is a flop check-raise bluff correct?',a:'With strong combo draws (flush+OESD, pair+flush) on boards where PFR c-bets wide. Need fold equity plus real equity when called.'},
    {q:'What is a blocker bet?',a:'Small OOP bet (20-25% pot) with marginal made hands to control pot size and reach showdown cheaply.'},
  ],
  3:[
    {q:'A7s BTN vs UTG open at 40BB - 3-bet or call?',a:'Lean 3-bet. A7s blocks Ax combos, has good equity. Blocker value plus fold equity outweigh flatting.'},
    {q:'Optimal resteal spot?',a:'Shoving over late-pos open from blinds at 15-25BB. Best when opener folds often and you have decent equity when called.'},
    {q:'A7s multiway resteal - key math?',a:'Value drops with multiple potential callers. Combined calling frequencies multiply. ICM makes multiple callers catastrophic for payout equity.'},
    {q:'Villain opens 4x. What changes?',a:'Scale 3-bet up (11-13x vs typical 7-8x), or flat more if deep. Lean toward flatting strong hands rather than isolating marginals.'},
    {q:'Best 3-bet bluff candidates BTN vs CO?',a:'Suited aces A3s-A5s (block AK and AA). Suited K-x gappers. About 50% of 3-bet range should be bluffs for balance.'},
    {q:'4-bet shove vs flat a 3-bet at 25BB?',a:'4-bet shove when pot-committed (villain 3-bets to about 8-9BB leaving 16-17BB). At 25BB most re-raises are shove-or-fold decisions.'},
  ],
  4:[
    {q:'SB vs BB - raise or complete?',a:'Raise about 40%, complete 15%, fold 45%. Completing gives BB perfect odds. Raise-or-fold is cleaner at normal depths.'},
    {q:'BB defense frequency vs BTN open?',a:'Defend about 50-55% (call plus 3-bet). Great pot odds, last to act preflop. At 30BB call T8s, 65s, K5o that you would fold from BTN.'},
    {q:'BB squeeze - when and with what?',a:'When BTN opens and SB cold-calls. Both have capped ranges. Use strong hands plus suited ace bluffs (A3s-A5s).'},
    {q:'SB complete range at 30BB?',a:'Complete suited hands (T8s-K6s range), small pairs 22-55. Raise strong hands and steals. Avoid weak offsuit hands.'},
    {q:'ICM - what is it and when does it matter?',a:'Converts chip stack into real dollar equity using payout structure. Matters near bubbles and final tables - a chip is worth LESS as you accumulate more.'},
    {q:'ICM pressure on the bubble?',a:'Tighten early-position shoves when covered by big stacks. A min-cash has real value. Widen late-position steals vs short stacks who fear busting.'},
    {q:'Push/fold threshold at 10BB UTG?',a:'About 30%+ of hands: all pairs 22+, Ax, Kxs, KTo+, broadways. Antes amplify the urgency to accumulate chips.'},
    {q:'ICM vs ChipEV near final table bubble?',a:'ChipEV says shove wider. ICM says tighten - especially medium stacks. Bigger payout jump means tighter ICM-adjusted range.'},
  ],
};

/* ── Range sets ── */
var OPEN40=new Set('AA KK QQ JJ TT 99 88 77 AKs AQs AJs ATs A9s A8s A7s A6s A5s A4s A3s A2s KQs KJs KTs K9s QJs QTs JTs T9s AKo AQo AJo ATo KQo KJo'.split(' '));
var PREM=new Set('AA KK QQ JJ TT AKs AKo AQs AQo'.split(' '));
var OPEN30=new Set('AA KK QQ JJ TT 99 88 77 AKs AQs AJs ATs A9s A8s A7s A6s A5s A4s A3s A2s KQs KJs KTs QJs JTs AKo AQo AJo ATo KQo KJo'.split(' '));
var DEAD30=new Set('66 55 44 33 22 T9s 98s 87s 76s 65s 54s 43s K9s QTs Q9s J9s T8s 97s 86s QJo KTo'.split(' '));
var SHOVE22=new Set('66 55 44 33 22 A9s A8s A7s A6s A5s A4s A3s A2s K9s K8s K7s K6s K5s K4s K3s K2s Q9s Q8s Q7s Q6s Q5s Q4s Q3s Q2s J8s J7s J6s J5s T8s T7s 98s 87s 76s 65s K9o K8o K7o K6o QTo Q9o Q8o JTo J9o J8o T9o T8o A9o A8o A7o A6o A5o A4o A3o A2o'.split(' '));
var SHOVE15=new Set('55 44 33 22 K4s K3s K2s Q4s Q3s Q2s J5s J4s J3s T6s T5s 96s 95s 85s 84s 75s 74s 64s 53s 52s 42s 32s K5o K4o K3o K2o Q6o Q5o J7o J6o T7o 96o 86o'.split(' '));
var BLVB=new Set('A2s A3s A4s A5s A6s K2s K3s K4s K5s K6s K7s K8s K9s Q5s Q6s Q7s Q8s Q9s J6s J7s J8s J9s T7s T8s T9s 97s 98s 87s 88 77 66 76s 65s 54s A2o A3o A4o A5o K4o K5o K6o K7o K8o K9o Q6o Q7o Q8o Q9o J7o J8o J9o T7o T8o T9o 97o 98o 87o 76o 65o'.split(' '));

function getZone(hand,depth){
  var iP=PREM.has(hand);
  if(depth==='15'){
    if(OPEN30.has(hand)&&!SHOVE15.has(hand))return 'prem';
    if(SHOVE22.has(hand)||SHOVE15.has(hand))return 'sh15';
    return 'fold';
  }
  if(depth==='22'){
    if(iP)return 'prem';
    if(OPEN30.has(hand)||SHOVE22.has(hand))return 'shove';
    return 'fold';
  }
  if(depth==='30'){
    if(iP)return 'prem';
    if(OPEN30.has(hand))return 'open';
    if(DEAD30.has(hand))return 'dead';
    if(SHOVE22.has(hand))return 'shove';
    return 'fold';
  }
  if(depth==='blvb'){
    if(iP)return 'prem';
    if(OPEN30.has(hand))return 'open';
    if(BLVB.has(hand))return 'blvb';
    return 'fold';
  }
  if(iP)return 'prem';
  if(OPEN40.has(hand))return 'open';
  if(SHOVE22.has(hand))return 'shove';
  return 'fold';
}

function evalH(h){
  var isPair=h.length===2,suited=h.endsWith('s');
  var r1=h[0],r2=h[1],v1=RV[r1],v2=RV[r2];
  return{isPair:isPair,suited:suited,r1:r1,r2:r2,v1:v1,v2:v2,
    isBW:!isPair&&v1>=10&&v2>=10,isAx:r1==='A',isKx:!isPair&&r1==='K',
    gap:isPair?0:Math.abs(v1-v2)};
}

function getAns(hand,pos,bb){
  var h=evalH(hand),pw=PW[pos];
  var isPrem=(h.isPair&&h.v1>=10)||(h.r1==='A'&&h.r2==='K');
  var isStrong=(h.isPair&&h.v1>=7)||(h.isAx&&h.v2>=11)||(h.isBW&&h.suited);
  var isMed=(h.isPair&&h.v1>=4)||(h.isAx&&h.suited)||(h.isBW&&h.v2>=10)||(h.isKx&&h.suited&&h.v2>=9);
  var isSC=h.suited&&!h.isAx&&!h.isKx&&h.gap<=2&&h.v1<=10&&h.v2>=5;
  var isBvB=(pos==='SB'||pos==='BB');
  if(bb<=22){
    if(isPrem||isStrong)return{action:'shove',note:hand+' is a shove from '+pos+' at '+bb+'BB.'};
    if(isMed&&pw>=0.26)return{action:'shove',note:hand+' from '+pos+' at '+bb+'BB - shove. Blockers + equity when called.'};
    if(isBvB&&isMed)return{action:'shove',note:hand+' in BvB at '+bb+'BB - shove. Heads-up ranges are wider.'};
    return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - fold. Insufficient equity vs calling range.'};
  }
  if(bb>=23&&bb<=39){
    if(isPrem)return{action:'open',note:hand+' is premium - always open.'};
    if(isStrong)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open. Strong enough for the dead zone.'};
    if(isMed&&(h.isBW||h.isAx||h.isKx))return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open. Broadway/suited aces in range.'};
    if(isMed&&h.isPair&&pw>=0.26)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open medium pair in position.'};
    if(pw>=0.42&&isMed)return{action:'open',note:hand+' from late position at '+bb+'BB - open wide.'};
    if(isBvB&&(isMed||isSC))return{action:'open',note:hand+' in BvB at '+bb+'BB - playable heads-up.'};
    if(isSC||h.isPair)return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - dead zone. Too shallow for implied odds, too deep to shove.'};
    return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - fold.'};
  }
  if(isPrem||isStrong)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - standard open.'};
  if(isMed&&pw>=0.15)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open.'};
  if(isSC&&pw>=0.26)return{action:'open',note:hand+' suited connector from '+pos+' at '+bb+'BB - open for implied odds.'};
  if(h.isPair&&pw>=0.26&&bb>=45)return{action:'open',note:hand+' from '+pos+' at '+bb+'BB - open in position for set-mining.'};
  return{action:'fold',note:hand+' from '+pos+' at '+bb+'BB - fold.'};
}

/* ── State ── */
var xp=0,streak=0,dCor=0,dTot=0;
var view='home';
var hand=null,pos=null,bb=null,dRes=null,dAns=null;
var fcP=1,fcI=0,fcF=false;
var qData=null,qLoading=false,qAns=null,qSel=null,qOpts=[];
var gridD='40';
var suitI=0;

try{
  xp=parseInt(localStorage.getItem('ft_xp')||'0')||0;
  streak=parseInt(localStorage.getItem('ft_str')||'0')||0;
  var _d=JSON.parse(localStorage.getItem('ft_d')||'{"c":0,"t":0}');
  dCor=_d.c||0; dTot=_d.t||0;
}catch(e){}

function save(){
  try{
    localStorage.setItem('ft_xp',String(xp));
    localStorage.setItem('ft_str',String(streak));
    localStorage.setItem('ft_d',JSON.stringify({c:dCor,t:dTot}));
  }catch(e){}
}

function updHdr(){
  document.getElementById('xpd').innerHTML='&#9889; '+xp+' XP';
  document.getElementById('std').innerHTML=(streak>2?'&#128293;':'\u25c6')+' '+streak;
}

function rndHand(){
  var i=Math.floor(Math.random()*13),j=Math.floor(Math.random()*13);
  if(i===j)return RANKS[i]+RANKS[i];
  if(i<j)return RANKS[i]+RANKS[j]+'s';
  return RANKS[j]+RANKS[i]+'o';
}

function newDrill(){
  hand=rndHand();
  pos=POSITIONS[Math.floor(Math.random()*POSITIONS.length)];
  bb=STACKS[Math.floor(Math.random()*STACKS.length)];
  dRes=null; dAns=null;
}

/* ── Renderers ── */
function renderHome(){
  var days=Math.max(0,Math.ceil((WSOP-new Date())/86400000));
  var acc=dTot>0?Math.round(dCor/dTot*100):0;
  var suit=SUITS[suitI];
  var pct=Math.min(100,Math.max(2,(365-days)/365*100));
  var html='<div class="anim">';
  html+='<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:2px">';
  html+='<div style="font-size:22px;font-weight:700;letter-spacing:2px">Four<span style="color:var(--cyan)">ty</span>Two</div>';
  html+='<span id="suit-deco" style="font-size:16px;opacity:.18">'+suit+'</span></div>';

function renderDrill(){

  var isBvB=pos==='SB'||pos==='BB';
  var zoneLabel=bb<=22?'short stack - shove or fold':bb<=39?'dead zone (23-39BB)':'standard depth';
  var zoneClass=bb<=22?'pv':bb<=39?'pp':'pc';
  var html='<div class="anim">';
  html+='<div style="font-size:9px;letter-spacing:2px;color:var(--text3);text-align:center;margin-bottom:14px;text-transform:uppercase">What\'s your move?</div>';

  html+='<div style="display:flex;justify-content:center;gap:28px;font-size:12px;color:var(--text2);margin-bottom:10px">';
  html+='<span>Pos <strong style="color:var(--text)">'+pos+'</strong></span>';
  html+='<span>Stack <strong style="color:var(--text)">'+bb+'BB</strong></span></div>';
  html+='<div style="text-align:center;margin-bottom:10px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">';
  html+='<span class="pill '+zoneClass+'">'+zoneLabel+'</span>';

  html+='</div>';
  html+='<div style="text-align:center;font-size:16px;letter-spacing:8px;opacity:.1;margin:8px 0">&#9824; &#9829; &#9830; &#9827;</div>';

    if(bb<=22){
      html+='<button class="abtn a-shove" data-action="drill" data-choice="shove">&#8679; Shove All-In</button>';
      html+='<button class="abtn a-fold" data-action="drill" data-choice="fold">&#10007; Fold</button>';
    }else{
      html+='<button class="abtn a-open" data-action="drill" data-choice="open">&#8593; Open / Raise</button>';
      html+='<button class="abtn a-fold" data-action="drill" data-choice="fold">&#10007; Fold</button>';

    html+='<div class="anim"><div class="'+(ok?'res-ok':'res-no')+'" style="margin-bottom:8px">';
    html+='<div style="font-weight:700;font-size:13px;margin-bottom:6px;color:'+(ok?'var(--green)':'var(--pink)')+'">';

    html+='<div style="font-size:10px;color:var(--text3)">Answer: <strong style="color:var(--text)">'+lbl+'</strong></div></div>';
    html+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:6px">';

  }
  html+='</div>';

function render(){
  var el=document.getElementById('main');
  if(view==='home')el.innerHTML=renderHome();
  else if(view==='drill')el.innerHTML=renderDrill();
  else if(view==='flash')el.innerHTML=renderFlash();
  else if(view==='quiz')el.innerHTML=renderQuiz();
  else if(view==='grid')el.innerHTML=renderGrid();
}

/* ── Single event delegation handler — no inline onclick anywhere ── */
document.addEventListener('click',function(e){
  var el=e.target;
  // Walk up to find data-action
  for(var i=0;i<5;i++){
    if(!el||el===document.body)break;
    var a=el.getAttribute('data-action');
    if(a){
      e.preventDefault();
      if(a==='nav'){
        view=el.getAttribute('data-view');
        document.querySelectorAll('.nb').forEach(function(b){
          b.classList.toggle('on',b.getAttribute('data-view')===view);
        });
        if(view==='drill')newDrill();
        render();
      }
      else if(a==='drill'){
        var choice=el.getAttribute('data-choice');
        var ans=getAns(hand,pos,bb);
        var ok=choice===ans.action;
        dAns=ans; dRes=ok?'ok':'no';
        dCor+=(ok?1:0); dTot++;
        xp+=(ok?10:2); streak=ok?streak+1:0;
        save(); updHdr(); render();
      }
      else if(a==='next-drill'){newDrill();render();}
      else if(a==='fc-flip'){fcF=!fcF;render();}
      else if(a==='fc-pillar'){fcP=parseInt(el.getAttribute('data-p'));fcI=0;fcF=false;render();}
      else if(a==='fc-prev'){var deck=FC[fcP]||[];fcI=(fcI-1+deck.length)%deck.length;fcF=false;render();}
      else if(a==='fc-next'){var deck2=FC[fcP]||[];fcI=(fcI+1)%deck2.length;fcF=false;render();}
      else if(a==='ans-quiz'){
        if(qAns)break;
        var qi=parseInt(el.getAttribute('data-qi'));
        var opt=qOpts[qi];
        qSel=opt.charAt(0);
        qAns=(qSel===qData.correct)?'ok':'no';
        xp+=(qAns==='ok'?15:3);
        save(); updHdr(); render();
      }
      else if(a==='gen-quiz'){
        var keyEl=document.getElementById('apikey-input');
        var key=keyEl?keyEl.value.trim():(localStorage.getItem('ft_key')||'');
        if(key)localStorage.setItem('ft_key',key);
        if(!key){alert('Please enter your Anthropic API key first.\n\nGet one at: console.anthropic.com');break;}
        qLoading=true; qData=null; qAns=null; qSel=null; qOpts=[];
        render();
        fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':key,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({
            model:'claude-sonnet-4-20250514',max_tokens:900,
            messages:[{role:'user',content:'Poker coach. Wayne preps WSOP 2026: Monster Stack, Freezeout, Super Turbo Bounty, Colossus. Skill 70/100. Completed: ranges, c-bet, 3-bet. Include BvB spots occasionally. ONE MTT NLH quiz question: practical in-game decision, 15-50BB, ICM, squeeze, push/fold, BvB defense. WSOP large-field live. Return ONLY valid JSON, no markdown: {"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":"A","explanation":"..."}'}]
          })
        }).then(function(r){return r.json();})
        .then(function(d){
          var t=(d.content&&d.content[0]&&d.content[0].text)||'';
          qData=JSON.parse(t.replace(/```json|```/g,'').trim());
          qOpts=qData.options||[];
          qLoading=false; render();
        }).catch(function(err){
          qData={question:'Error: '+err.message,options:[],correct:'',explanation:''};
          qOpts=[]; qLoading=false; render();
        });
      }
      else if(a==='grid-depth'){gridD=el.getAttribute('data-depth');render();}
      break;
    }
    el=el.parentElement;
  }
});

  suitI=(suitI+1)%4;

updHdr();
render();
