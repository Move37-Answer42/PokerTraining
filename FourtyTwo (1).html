<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FourtyTwo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#141b26;--bg4:#1a2235;
  --cyan:#00d4ff;--pink:#ff2d78;--violet:#a855f7;--gold:#f5c842;
  --green:#00ff88;
  --text:#e8edf5;--text2:#7a8aa0;--text3:#3d4f66;
  --bd:rgba(255,255,255,.07);--bd2:rgba(0,212,255,.22);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px}
#nav{display:flex;gap:4px;padding:10px 12px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--bd);overflow-x:auto;align-items:center;position:sticky;top:0;z-index:99}
.nb{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit;letter-spacing:.4px}
.nb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
.xpb{margin-left:auto;flex-shrink:0;display:flex;gap:14px;font-size:11px;padding-left:10px;white-space:nowrap}
#main{padding:16px 14px;max-width:720px;margin:0 auto;padding-bottom:60px}
.sf{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.sf2{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:14px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border-radius:8px;padding:12px}
.ml{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.mv{font-size:24px;font-weight:700;line-height:1}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.pc{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)}
.pp{background:rgba(255,45,120,.1);color:var(--pink);border:1px solid rgba(255,45,120,.25)}
.pv{background:rgba(168,85,247,.1);color:var(--violet);border:1px solid rgba(168,85,247,.25)}
.pm{background:rgba(122,138,160,.08);color:var(--text2);border:1px solid rgba(122,138,160,.15)}
.pn{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.pillar{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.pillar:last-child{border-bottom:none}
.pico{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.tab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tb{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--text2);font-family:inherit}
.tb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--bd2)}
.hand-big{font-size:clamp(48px,14vw,72px);font-weight:700;text-align:center;letter-spacing:6px;line-height:1;padding:18px 0 8px}
.act-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.abtn{padding:14px 28px;font-size:14px;font-weight:700;font-family:inherit;border-radius:8px;cursor:pointer;letter-spacing:.5px;border:1px solid;min-width:130px}
.a-open{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.35)}
.a-fold{background:rgba(255,45,120,.1);color:var(--pink);border-color:rgba(255,45,120,.35)}
.a-shove{background:rgba(168,85,247,.1);color:var(--violet);border-color:rgba(168,85,247,.35)}
.res-ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);border-radius:8px;padding:12px}
.res-no{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.25);border-radius:8px;padding:12px}
.fcard{border:1px solid var(--bd2);border-radius:10px;min-height:200px;background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;user-select:none}
.fc-q{font-size:clamp(14px,4vw,16px);font-weight:700;line-height:1.6;margin-top:10px}
.fc-a{font-size:12px;line-height:1.9;color:var(--text2)}
.qbox{font-size:14px;line-height:1.8;padding:14px;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;margin-bottom:12px}
.qopt{display:block;text-align:left;padding:12px 14px;font-size:12px;cursor:pointer;border-radius:7px;border:1px solid var(--bd);background:var(--bg3);color:var(--text);font-family:inherit;width:100%;margin-bottom:6px;line-height:1.5}
.qopt.qok{background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.3)}
.qopt.qno{background:rgba(255,45,120,.08);color:var(--pink);border-color:rgba(255,45,120,.3)}
.qopt.qdim{opacity:.3}
.gbtn{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3);padding:12px 20px;font-size:12px;cursor:pointer;border-radius:7px;font-family:inherit;font-weight:600;letter-spacing:.4px;width:100%;margin-bottom:10px}
.grid-wrap{display:grid;grid-template-columns:18px repeat(13,minmax(0,1fr));gap:2px}
.gc{font-size:clamp(5.5px,1.5vw,7.5px);text-align:center;padding:3px 1px;border-radius:2px;border:1px solid transparent;line-height:1.3;font-family:'Courier New',monospace;font-weight:600}
.g-prem{background:rgba(245,200,66,.22);color:#f5d020;border-color:rgba(245,200,66,.5);font-weight:700}
.g-open{background:rgba(0,160,255,.18);color:#4dc8ff;border-color:rgba(0,160,255,.45)}
.g-blvb{background:rgba(0,210,170,.15);color:#00e8bb;border-color:rgba(0,210,170,.45)}
.g-dead{background:rgba(255,120,0,.15);color:#ff9030;border-color:rgba(255,120,0,.45)}
.g-shove{background:rgba(130,220,0,.14);color:#88dd00;border-color:rgba(130,220,0,.4)}
.g-sh15{background:rgba(255,200,60,.12);color:#ffc83c;border-color:rgba(255,200,60,.35)}
.g-fold{background:rgba(14,17,23,.95);color:#1e2d42;border-color:rgba(255,255,255,.04)}
.nbtn{width:100%;padding:12px;font-size:12px;cursor:pointer;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--text2);font-family:inherit;font-weight:600;margin-top:8px}
.pb{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:12px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#00a8cc,#00d4ff)}
.qpb{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:14px;overflow:hidden}
.qpf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width .3s}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes gl{0%,100%{opacity:1}50%{opacity:.72}}
.anim{animation:fi .2s ease forwards}
.glow{animation:gl 2s ease-in-out infinite}
</style>
</head>
