{c:'Ranges',q:'UTG at 60BB with 22. Open or fold?',o:['A) Fold — 22 is too speculative from UTG','B) Open — pairs always open at 60BB+','C) Open only from BTN or later','D) Limp — set-mining only'],a:'B',e:'At 60BB you have the implied odds to set-mine even from UTG. 22 is a standard open — if you flop a set you can win a big pot.'},
{c:'Ranges',q:'CO at 20BB with KTs. Action?',o:['A) Open — KTs is strong enough to open','B) Fold — too short to open KTs','C) Shove — 20BB is shove territory','D) Limp — KTs plays better in position'],a:'C',e:'At 20BB KTs is a shove from CO. Strong broadway suited hand with good equity when called and generates fold equity.'},
{c:'Ranges',q:'BTN at 50BB with 54s. Open or fold?',o:['A) Fold — 54s is too speculative','B) Open — BTN range is wide enough for 54s at 50BB','C) Open only if SB and BB are weak','D) Limp — 54s needs to see cheap flops'],a:'B',e:'At 50BB with BTN position, 54s is in range. Good implied odds, great playability in position, and you cover the gap with stack depth.'},
{c:'Ranges',q:'SB at 40BB with 98o, BB is a calling station. Raise or fold?',o:['A) Raise — 98o is in SB range at 40BB','B) Fold — 98o OOP vs calling station is -EV','C) Complete — see a cheap flop','D) Shove — remove postflop decisions'],a:'B',e:'Against a calling station who will call and play well postflop, 98o OOP loses its fold equity and plays poorly. Fold or complete only.'},
{c:'Ranges',q:'UTG+1 (HJ) at 100BB with AJo. Action?',o:['A) Fold — AJo is a trap hand from early position','B) Open — AJo is a standard HJ open at any depth','C) Limp — AJo is reverse implied odds OOP','D) 3-bet if there was a limp'],a:'B',e:'AJo is a clear open from HJ. Strong broadway, top pair top kicker on J-high boards, and you have fold equity against the remaining positions.'},
{c:'Ranges',q:'BTN at 30BB with 33. Action?',o:['A) Fold — too shallow to set-mine','B) Open — BTN range includes 33 even at 30BB','C) Shove — 30BB is shove territory for small pairs','D) Limp — small pairs need cheap flops'],a:'B',e:'From BTN you open 33 at any depth above 20BB. At 30BB you have fold equity when opened and can still set-mine if called.'},
{c:'Ranges',q:'CO at 45BB with Q9s. Open or fold?',o:['A) Fold — Q9s is too speculative from CO','B) Open — Q9s is a standard CO open at 45BB+','C) Open only if tight players behind','D) Limp — suited cards need cheap flops'],a:'B',e:'Q9s from CO at 45BB is a standard open. Good suited connectivity, reasonable equity, and position helps realize value.'},
{c:'Ranges',q:'UTG at 50BB with TT. Action?',o:['A) Open — TT is a strong pair, standard UTG open','B) Limp — TT flops poorly, keep pot small','C) Shove — TT is too vulnerable to flat at 50BB','D) Fold if there are aggressive players behind'],a:'A',e:'TT is a standard open from any position. At 50BB you can open and call off a 3-bet profitably, or fold to a 5-bet with short stacks.'},
{c:'Ranges',q:'HJ at 25BB with A5s. Action?',o:['A) Open — A5s is a standard open','B) Fold — A5s is in the dead zone','C) Shove — 25BB puts A5s in shove territory','D) Limp — suited aces like multiway pots'],a:'C',e:'At 25BB A5s is a shove from HJ. Strong blocker, nut flush draw equity, and fold equity combine to make this a clear shove.'},
{c:'Ranges',q:'CO at 30BB with KJo. Open or fold?',o:['A) Fold — KJo is dominated too often from CO','B) Open — KJo is a standard CO open at any depth','C) Open only if BTN is tight','D) Shove — avoid postflop decisions'],a:'B',e:'KJo from CO is a clear open at 30BB. Strong broadway, good position, and fold equity against the remaining players.'},
{c:'Ranges',q:'BTN at 18BB with 77. Action?',o:['A) Open — 77 is strong enough to open','B) Shove — 18BB is shove territory for 77','C) Fold — 77 plays poorly short-stacked','D) Limp — small-medium pairs need to set-mine'],a:'B',e:'At 18BB 77 is a shove from BTN. Mid pair has good equity when called, strong fold equity, and you avoid difficult postflop spots.'},
{c:'Ranges',q:'SB at 50BB with Q8s, BB is unknown. Action?',o:['A) Fold — Q8s OOP is too speculative','B) Raise — Q8s is in SB opening range at 50BB','C) Complete — Q8s plays well multiway','D) Shove — maximize fold equity'],a:'B',e:'At 50BB with a wide SB opening range Q8s is a standard raise. Good suited value, and at 50BB you can navigate postflop.'},
{c:'Ranges',q:'UTG at 75BB with AQo. Action?',o:['A) Open — AQo is a premium UTG open','B) Limp — AQo is dominated by AK too often','C) Open and fold to 3-bet always','D) Open and 4-bet shove vs any 3-bet'],a:'A',e:'AQo is a clear UTG open at any depth. Top 10% hand. Open and navigate based on action — call 3-bets from position, fold to 4-bets unless very deep.'},
{c:'Ranges',q:'HJ at 35BB with 76s. Open or fold?',o:['A) Open — 76s is a standard HJ open above 30BB','B) Fold — 76s is in the dead zone at 35BB','C) Open only if tight players in the blinds','D) Shove — 35BB makes this a shove'],a:'B',e:'76s from HJ at 35BB is squarely in the dead zone. Too shallow for implied odds (need 50BB+), too deep to shove profitably. Fold.'},
{c:'Ranges',q:'CO at 20BB with AJo. Action?',o:['A) Open — AJo is strong enough to open','B) Fold — too short to open AJo','C) Shove — 20BB puts AJo in shove territory','D) Limp — AJo plays better in multiway pots'],a:'C',e:'At 20BB AJo is a shove from CO. Strong hand that generates fold equity and has great equity when called by any reasonable range.'},
{c:'Ranges',q:'BTN at 100BB with K2s. Open or fold?',o:['A) Fold — K2s is too weak regardless of depth','B) Open — BTN range includes K2s at 100BB','C) Limp — K2s needs a cheap flop','D) Open only vs specific player types'],a:'B',e:'At 100BB with BTN position and fold equity against two players, K2s becomes a profitable open. Suited, has backdoor nut flush draws, blocker on KK.'},
{c:'Ranges',q:'UTG at 40BB with 99. Action?',o:['A) Open — 99 is a standard UTG open','B) Shove — 99 is too strong to just open','C) Limp — 99 is vulnerable to overcards','D) Fold — too many overcards will come'],a:'A',e:'99 is a standard UTG open at any depth above 15BB. It is in the top 10% of hands and benefits from opening for value and fold equity.'},
{c:'Ranges',q:'HJ with 65s at 60BB. Open or fold?',o:['A) Fold — 65s is marginal from HJ','B) Open — 60BB gives enough implied odds for 65s from HJ','C) Limp — suited connectors like multiway pots','D) Only open if CO and BTN are tight'],a:'B',e:'At 60BB from HJ you have the depth to justify 65s. Implied odds are strong, and you have reasonable position vs the blinds.'},
{c:'Ranges',q:'CO at 15BB with QQ. Action?',o:['A) Open — QQ is premium, open at any depth','B) Shove — 15BB puts QQ in shove territory','C) Limp — trap with a strong hand','D) Open and fold to a shove'],a:'B',e:'At 15BB QQ is a shove from any position. Too shallow to open and fold, and you want the fold equity plus protection against bad runouts.'},
{c:'Ranges',q:'BTN at 40BB with KTo. Action?',o:['A) Fold — KTo is too speculative from BTN','B) Open — BTN range is wide, KTo is standard','C) Limp — KTo plays better multiway','D) Open only vs tight blinds'],a:'B',e:'KTo is a standard BTN open at any depth. From BTN you open near 45-50% of hands and KTo is a solid broadway hand in that range.'},
{c:'Ranges',q:'UTG at 30BB with 55. Action?',o:['A) Open — 55 is a standard UTG open','B) Fold — small pairs enter the dead zone at 30BB','C) Shove — 30BB is short stack territory','D) Limp — small pairs need cheap flops'],a:'B',e:'55 from UTG at 30BB is in the dead zone. Too shallow for set-mining implied odds, too deep to shove profitably. Fold and wait.'},
{c:'Ranges',q:'SB at 30BB with AKs, BB is a nit. Action?',o:['A) Raise — AKs is premium, always raise','B) Complete — trap with a strong hand','C) Shove — 30BB is short enough for AKs shove','D) Raise small — keep pot manageable'],a:'A',e:'AKs is premium and always raises from SB regardless of depth or opponent. Raise and call off a 3-bet from the BB.'},
{c:'Ranges',q:'CO at 75BB with J8s. Open or fold?',o:['A) Open — J8s is in CO range at 75BB','B) Fold — J8s is too speculative from CO','C) Limp — J8s needs a cheap flop','D) Open only if BTN is tight'],a:'A',e:'At 75BB from CO, J8s is a playable hand with good implied odds, suited connectivity, and enough stack to realize equity in position.'},
/* ── STACK DEPTH DECISIONS (20) ── */
{c:'Depth',q:'Dead zone definition?',o:['A) 10-20BB where you should shove everything','B) 23-40BB where speculative hands lose EV — too shallow for implied odds, too deep to shove','C) 40-60BB where you play cautiously','D) Any depth below 50BB'],a:'B',e:'The dead zone is 23-40BB. Speculative hands like suited connectors and small pairs cannot realize equity (too shallow) and cannot shove profitably (too deep).'},
{c:'Depth',q:'At 38BB with T9s from UTG. Action?',o:['A) Open — approaching the 40BB threshold','B) Fold — still in the dead zone','C) Shove — 38BB is close enough to shove territory','D) Open only if antes are large'],a:'B',e:'38BB is still inside the dead zone for T9s from UTG. The threshold to open suited connectors is 40BB+. Fold.'},
{c:'Depth',q:'At what stack depth does set-mining become profitable with small pairs?',o:['A) 25BB+ with any pair','B) 40BB+ in position','C) 50BB+ with deep implied odds stacks','D) Only profitable with antes'],a:'C',e:'You need roughly 15x implied odds to set-mine profitably. At 50BB+ you can win a large enough pot when you hit. Shallower stacks cannot justify the investment.'},
{c:'Depth',q:'At 22BB with 67s from CO. Action?',o:['A) Open — 67s is playable at 22BB','B) Fold — dead zone','C) Shove — 22BB is at the shove threshold for 67s','D) Limp — suited connectors like multiway pots'],a:'C',e:'22BB is exactly the shove threshold for 67s from CO. It generates fold equity and has decent equity when called. Shoving beats both opening and folding.'},
{c:'Depth',q:'Why are suited connectors worse at 30BB than 60BB?',o:['A) They are not, suited connectors play the same at any depth','B) At 30BB you cannot win a big enough pot to justify the preflop investment when you hit','C) Opponents play better at lower stakes','D) The blinds increase faster at 30BB'],a:'B',e:'Implied odds require deep stacks. At 30BB if you flop a flush draw and get it in, the pot is not big enough relative to your stack to justify speculative play preflop.'},
{c:'Depth',q:'At 50BB you open CO with 98s. BTN 3-bets. Action?',o:['A) Always fold — 98s cannot call a 3-bet','B) Call — deep enough for implied odds in position','C) 4-bet shove — maximize fold equity','D) 4-bet small and fold to a 5-bet'],a:'B',e:'At 50BB with 98s in position vs a 3-bet, you have the implied odds and position to call profitably. You can outplay opponents when you connect with the board.'},
{c:'Depth',q:'At 25BB with KK from UTG. Raise or shove?',o:['A) Open — KK should always open, never shove preflop','B) Shove — 25BB means KK should shove for maximum value','C) Open — you want action, shoving folds too many hands','D) Open to 2.5BB to build the pot slowly'],a:'A',e:'At 25BB you open KK. You want action and shoving often folds everyone. Open, and if someone 3-bets you call off your stack happily.'},
{c:'Depth',q:'At 40BB the effective stack is reached. What changes about speculative hands?',o:['A) Nothing changes — always fold speculative hands','B) Suited connectors and small pairs become profitable opens for the first time in the dead zone','C) You should only play premium hands at 40BB','D) Position matters less at 40BB'],a:'B',e:'At 40BB+ suited connectors and small pairs re-enter your opening range. You have enough depth for implied odds (set-mining, hitting straights/flushes) to justify the investment.'},
{c:'Depth',q:'You have 28BB at a WSOP tournament. Antes are running. What is your primary preflop strategy?',o:['A) Limp frequently to see cheap flops','B) Play tight and wait for premium hands','C) Open tight broadway range, shove strong hands and good blockers','D) Call off shoves widely to accumulate chips'],a:'C',e:'At 28BB with antes, you are in the dead zone for speculative hands but can still open broadway hands. Shove AJs+, 99+, strong aces. Fold marginal speculative hands.'},
{c:'Depth',q:'At 35BB with AJo from HJ. There has been one limp. Action?',o:['A) Raise — AJo is strong enough to isolate','B) Limp behind — AJo plays better multiway','C) Fold — AJo is dominated too often','D) Shove — 35BB + dead money makes this a shove'],a:'A',e:'AJo is a clear raise to isolate the limper from HJ at 35BB. You have a strong hand, fold equity, and position on the limper.'},
{c:'Depth',q:'At 15BB should you ever open-raise instead of shove?',o:['A) Yes — opening keeps pot smaller and gives options','B) No — at 15BB all opens are effective shoves, just shove directly','C) Only with AA and KK','D) Yes if there are aggressive players behind you'],a:'B',e:'At 15BB an open followed by a call commitment is essentially a shove anyway. Shoving directly is cleaner, maximizes fold equity, and avoids awkward spots.'},
{c:'Depth',q:'You have 45BB and face a 3-bet to 9BB. You have QQ. Action?',o:['A) Fold — QQ is too vulnerable against a 3-bet range','B) Call — keep pot manageable','C) 4-bet shove — at 45BB QQ is a clear 4-bet shove','D) 4-bet small to 18BB'],a:'C',e:'At 45BB with QQ facing a 3-bet, 4-bet shoving is correct. You are not deep enough to flat and play postflop profitably with an overpair worry. Get it in.'},
{c:'Depth',q:'At 60BB with A5s from SB facing a BTN open. Action?',o:['A) Fold — A5s OOP is too speculative','B) Call — implied odds and blocker value justify calling','C) 3-bet — A5s is an excellent bluff 3-bet with blockers','D) Always fold suited aces from SB vs BTN'],a:'C',e:'A5s is a premium 3-bet bluff from SB vs BTN at 60BB. It blocks AK and AA combos, has nut flush potential, and generates fold equity.'},
{c:'Depth',q:'What is the minimum depth to open 22 from UTG?',o:['A) Any depth — pairs always open from UTG','B) 20BB — pairs shove below this','C) 40BB+ — need implied odds to set-mine','D) 30BB — small pairs are in range at this depth'],a:'C',e:'Small pairs from UTG need 40BB+ to open. Below that you cannot realize set-mining equity. Between 20-39BB small pairs are in the dead zone — shove at 20BB or less.'},
{c:'Depth',q:'At 30BB with 88 from CO. Open or shove?',o:['A) Open — 88 is strong enough to open at 30BB','B) Shove — 30BB puts 88 in shove territory','C) Fold — 88 is in the dead zone','D) Depends on the players in the blinds'],a:'A',e:'88 is above the dead zone threshold. Strong pairs (77+) open at 30BB. Only small pairs (22-66) and speculative hands fall into the dead zone.'},
{c:'Depth',q:'Tournament levels just increased. You went from 40BB to 32BB. How do your suited connectors change?',o:['A) No change — same strategy at 32BB as 40BB','B) Drop suited connectors from UTG/HJ — you have entered the dead zone','C) Shove all suited connectors now','D) Only play suited connectors from BTN now'],a:'B',e:'At 32BB you have crossed into the dead zone for suited connectors. Drop them from UTG and HJ. You can still open them from CO/BTN/SB where the range advantage is higher.'},
{c:'Depth',q:'At 55BB with TT in the BB, BTN opens, SB calls. Action?',o:['A) Fold — TT plays poorly multiway','B) 3-bet — TT is strong enough to squeeze here','C) Call — implied odds multiway with an overpair','D) It depends entirely on BTN sizing'],a:'B',e:'TT is a strong hand and squeezing here isolates the field or wins the pot. Against the BTN open range TT is often the best hand. Squeeze for value and fold equity.'},
{c:'Depth',q:'You have 70BB. The effective stack is 30BB because your opponent is short. How does this change your opening strategy?',o:['A) No change — your strategy is based on your stack','B) Play as if you have 30BB effective — shorter stack drives the action','C) Always fold — effective short stack creates too much risk','D) Shove immediately with any good hand'],a:'B',e:'Effective stack depth is what matters. When playing against a 30BB stack, your implied odds are based on their 30BB, not your 70BB. Adjust your strategy to the effective depth.'},
{c:'Depth',q:'At 42BB with 65s from BTN. Open or fold?',o:['A) Fold — 65s is marginal at 42BB','B) Open — just crossed 40BB threshold, 65s opens from BTN','C) Shove — maximize fold equity','D) Limp — suited connectors need multiway action'],a:'B',e:'At 42BB you have crossed the 40BB threshold where suited connectors become profitable. From BTN you can open 65s for implied odds and position.'},
{c:'Depth',q:'Monster Stack event starts with 60,000 chips and 100/200 blinds. That is 300BB. How does this affect early strategy?',o:['A) Play ultra-tight since you have so many chips to protect','B) Play very deep stack poker — open wider, implied odds are massive, speculative hands are very profitable','C) No change — strategy is the same at any depth','D) Shove more often to maximize fold equity'],a:'B',e:'300BB deep stacks fundamentally change poker. Implied odds are enormous, suited connectors and small pairs are extremely profitable, and position is worth even more than usual.'},
/* ── SHORT STACK PUSH/FOLD (25) ── */
{c:'Short Stack',q:'At 12BB UTG with A8o. Shove or fold?',o:['A) Fold — A8o from UTG is too risky','B) Shove — A8o is in the shove range at 12BB UTG','C) Open to 2.5BB','D) Limp and evaluate'],a:'B',e:'At 12BB A8o from UTG is a clear shove. Any Ax hand with strong kicker is in the UTG shove range at this depth.'},
{c:'Short Stack',q:'At 8BB in the BB with 73o, SB shoves. Call or fold?',o:['A) Fold — 73o is too weak to call a shove','B) Call — getting 2:1 odds, almost any two cards are a call','C) Call only if SB is aggressive','D) Always fold non-paired hands below T-high'],a:'B',e:'At 8BB you are getting 2:1 pot odds and need only about 33% equity. 73o has roughly 35-40% equity vs most shove ranges. Call.'},
{c:'Short Stack',q:'At 20BB with KQo from UTG. Shove or open?',o:['A) Open to 2.5BB — KQo plays better with room to navigate','B) Shove — 20BB puts KQo in shove territory from UTG','C) Fold — KQo is dominated too often from UTG','D) Limp — KQo flops well'],a:'B',e:'At 20BB KQo is a shove from UTG. Strong broadway hand with great equity, fold equity, and you avoid difficult postflop spots.'},
{c:'Short Stack',q:'15BB at the bubble. BTN shoves, you have JJ in the BB. Call or fold?',o:['A) Fold — ICM says protect your stack at the bubble','B) Call — JJ has more than enough equity vs BTN shove range','C) It depends on stack sizes of other players','D) Always fold anything below QQ at the bubble'],a:'C',e:'JJ is a call in most cases, but ICM matters here. If there are shorter stacks about to bust and a min-cash matters, you might fold JJ. Assess the ICM impact first.'},
{c:'Short Stack',q:'At 10BB with 55 from CO, two players behind. Shove or fold?',o:['A) Fold — 55 is vulnerable with players behind','B) Shove — 55 is a standard shove from CO at 10BB','C) Open to 2x — keep the pot smaller','D) Limp — set-mine cheaply'],a:'B',e:'55 is a shove from CO at 10BB. Good equity (~50%) vs overcards, fold equity against the players behind, and position on the blinds if called.'},
{c:'Short Stack',q:'At 18BB with A2s from HJ. Action?',o:['A) Fold — A2s is too weak from HJ','B) Open — A2s is playable at 18BB','C) Shove — 18BB puts A2s in shove territory','D) Limp — suited aces need cheap flops'],a:'C',e:'At 18BB A2s is a shove from HJ. Strong blocker on AA/AK, nut flush potential when called, and enough fold equity to make it profitable.'},
{c:'Short Stack',q:'At 22BB with KJo from BTN. Action?',o:['A) Open — KJo is too strong to just shove','B) Shove — 22BB is at the top of shove territory for KJo','C) Fold — KJo gets dominated by AK and AJ','D) Limp — KJo plays well multiway'],a:'B',e:'At 22BB KJo is a shove from BTN. Strong broadway hand, generates fold equity against the blinds, and has decent equity when called.'},
{c:'Short Stack',q:'At 15BB with Q8s from SB, BB is a calling station. Shove or fold?',o:['A) Shove — Q8s is in range regardless of opponent tendency','B) Fold — against a calling station Q8s loses its fold equity advantage','C) Shove — suited hands always shove at 15BB','D) Complete — see a cheap flop'],a:'B',e:'Against a calling station you lose fold equity. Q8s is borderline at 15BB and is much weaker when the fold equity component is gone. Fold or complete.'},
{c:'Short Stack',q:'At 12BB with TT from UTG. Shove or open to 2.5BB?',o:['A) Open to 2.5BB — TT is strong enough to build a pot','B) Shove — at 12BB open-shoving TT maximizes value','C) Limp — trap with a strong hand','D) Fold — too many overcards'],a:'B',e:'At 12BB you shove TT. An open-raise and then fold to a 3-bet wastes your hand. Shoving gets called by worse pairs and gets folds from overcards.'},
{c:'Short Stack',q:'At 20BB with AA from UTG. Shove or open?',o:['A) Open to 2.5BB — AA wants callers, not folds','B) Shove — 20BB means AA should shove for value','C) Limp — maximize action multiway','D) Open to 2x to encourage calls'],a:'A',e:'At 20BB you open AA. Shoving folds hands that would call a raise and continue. Open to 2.5BB and call any 3-bet. You want to be called.'},
{c:'Short Stack',q:'At 17BB from BTN with K9o. Action?',o:['A) Fold — K9o is too marginal','B) Open to 2BB','C) Shove — K9o is in BTN shove range at 17BB','D) Limp behind if there are limpers'],a:'C',e:'At 17BB K9o is a shove from BTN. Decent blocking cards, fold equity against two players, and acceptable equity when called.'},
{c:'Short Stack',q:'At 8BB in CO with 96s. Shove or fold?',o:['A) Fold — 96s is too speculative at any depth','B) Shove — at 8BB almost any two decent cards shove','C) Open to 2x','D) Limp — suited cards need cheap flops'],a:'B',e:'At 8BB you are desperately short and need to accumulate chips. 96s suited has decent equity when called and generates fold equity. Shove.'},
{c:'Short Stack',q:'WSOP Super Turbo Bounty at 15BB. Your neighbor has 10BB. You have A9o from HJ. Shove or open?',o:['A) Open to 2.5BB — A9o is strong enough to open','B) Shove — 15BB puts A9o in shove territory','C) Fold — wait for a better spot','D) Limp to see a cheap flop'],a:'B',e:'In a Super Turbo at 15BB you shove A9o from HJ. Strong ace, fold equity, and in turbo formats accumulating chips is more important than ICM caution.'},
{c:'Short Stack',q:'At 19BB with JTo from BTN. Shove or open?',o:['A) Open — JTo plays well postflop','B) Shove — 19BB puts JTo in shove territory from BTN','C) Fold — JTo gets dominated','D) Limp — JTo needs to see flops'],a:'B',e:'At 19BB JTo is a shove from BTN. Connected broadway, fold equity, and decent equity vs the blind calling ranges.'},
{c:'Short Stack',q:'At 22BB with 77 in the BB, CO shoves. Call or fold?',o:['A) Fold — 77 has too many overcards','B) Call — 77 has about 50% equity vs CO shove range and getting good odds','C) It depends entirely on player reads','D) Only call if CO is very aggressive'],a:'B',e:'At 22BB vs a CO shove, 77 has roughly 52-55% equity vs a reasonable shove range. With pot odds included this is a profitable call.'},
{c:'Short Stack',q:'At 15BB with A5o from UTG. Shove or fold?',o:['A) Shove — A5o is in UTG shove range at 15BB','B) Fold — A5o from UTG is dominated too often','C) Open to 2.5BB','D) Limp behind'],a:'A',e:'At 15BB A5o is a shove from UTG. Decent blocker, fold equity, and acceptable equity vs calling ranges. With antes, urgency increases.'},
{c:'Short Stack',q:'At 20BB with KK from BTN. Shove or open?',o:['A) Open to 2.5BB — KK wants callers','B) Shove — KK should shove at 20BB for maximum value','C) Limp to disguise hand strength','D) Open to 4x to get it in'],a:'A',e:'Open KK at 20BB. You want callers. Shoving KK often folds worse hands that would gladly call a raise. Open and go all-in vs any 3-bet.'},
{c:'Short Stack',q:'Colossus tournament, 18BB. ATo from HJ. Shove or open?',o:['A) Open — ATo is too strong to just shove','B) Shove — 18BB is shove territory for ATo from HJ','C) Fold — ATo gets dominated by AJ, AQ, AK','D) Limp and hope to see a cheap flop'],a:'B',e:'At 18BB ATo shoves from HJ. Strong ace, good fold equity, and great equity vs blind calling ranges. In the Colossus field many players call too loose, making this even better.'},
{c:'Short Stack',q:'At 10BB with 33 from SB, BB is a strong player. Shove or complete?',o:['A) Complete — set-mine cheaply','B) Shove — 33 generates fold equity and has decent equity','C) Fold — 33 is too weak','D) Depends on reads only'],a:'B',e:'At 10BB you shove 33 from SB. Completing gives a skilled BB player a chance to outplay you postflop. Shoving removes that advantage.'},
{c:'Short Stack',q:'At 25BB with QQ from UTG. Open or shove?',o:['A) Shove — QQ at 25BB should just get it in','B) Open to 2.5BB — QQ wants value, not folds','C) Open to 3BB — slightly larger to build pot','D) Limp to disguise strength'],a:'B',e:'Open QQ at 25BB. Shoving folds hands you dominate. Open and call off any 3-bet — at 25BB you are committed to QQ regardless.'},
{c:'Short Stack',q:'At 16BB UTG in the Freezeout event with J9s. Shove or fold?',o:['A) Shove — J9s has good equity and fold equity','B) Fold — J9s is too speculative from UTG','C) Open to 2x','D) Limp and see a flop'],a:'B',e:'J9s from UTG at 16BB is a fold. Too many callers can come in behind you, and UTG shove ranges are tighter. Wait for a better position or better hand.'},
{c:'Short Stack',q:'At 13BB from BTN with A3o. SB is a nit. Action?',o:['A) Fold — A3o is too weak','B) Shove — A3o from BTN vs likely tight blinds is a clear shove','C) Open to 2x','D) Limp — A3o plays poorly as a shove'],a:'B',e:'At 13BB from BTN vs a tight SB, A3o shoves for fold equity. Even when called you have blocker equity. A3o is clearly in the BTN shove range here.'},
{c:'Short Stack',q:'At 20BB with 99 in the BB, UTG shoves. Call or fold?',o:['A) Fold — 99 vs UTG shove range is a coinflip at best','B) Call — 99 is comfortably ahead of UTG 20BB shove range','C) It depends on tournament stage','D) Fold unless you cover the shoving player'],a:'B',e:'99 vs UTG 20BB shove range is actually a favourite. UTG shoves wide enough (pairs, Ax, broadways) that 99 has around 55-60% equity. Call.'},
{c:'Short Stack',q:'At 15BB, the antes make the effective pot larger. How does this affect your shove range?',o:['A) No effect — antes do not change push/fold ranges','B) Widen your shove range — antes increase the reward for winning blinds+antes uncontested','C) Tighten your range — more money in the pot means more risk','D) Only affects BB vs SB decisions'],a:'B',e:'Antes increase the prize for stealing and make shoves more profitable. Your shove range should widen by about 5-10% of hands when antes are running.'},
{c:'Short Stack',q:'Super Turbo Bounty at 12BB with KQs from CO. Action?',o:['A) Open to 2x — KQs is too strong to shove','B) Shove — 12BB is shove territory, KQs is an excellent shove hand','C) Fold — wait for a stronger hand','D) Limp — KQs plays well multiway'],a:'B',e:'KQs is a premium shove at 12BB from CO. Strong suited broadway, great equity when called, good fold equity vs the field. In a bounty format hitting a call is even better.'},
/* ── C-BET SIZING AND BOARD TEXTURE (25) ── */
{c:'C-Bet',q:'You open CO, BTN calls. Flop is K72 rainbow. Optimal c-bet strategy?',o:['A) Check — dry boards favor the caller','B) Bet large — 70% pot to protect your range','C) Bet small — 25-33% pot, board heavily favors your range','D) Check-raise if bet into'],a:'C',e:'K72 rainbow is extremely dry and heavily favors the preflop raiser. Use a small bet (25-33% pot) at high frequency. Caller has few strong hands on this board.'},
{c:'C-Bet',q:'You open BTN, BB calls. Flop is 986 with two clubs. Optimal c-bet strategy?',o:['A) Bet large or check — wet board requires polarized betting','B) Bet small at high frequency','C) Always check — wet boards favor the defender','D) Bet pot — protect your equity'],a:'A',e:'On a wet connected board like 986cc, you should bet large when you bet (to charge draws) or check with your bluffs. Small bets do not charge draws and give away cheap equity.'},
{c:'C-Bet',q:'What is the primary factor determining c-bet sizing?',o:['A) Your hand strength','B) Stack depth','C) Board texture — how well it connects with each range','D) Position only'],a:'C',e:'Board texture is the primary driver of c-bet sizing. Dry boards that favor the raiser use small bets. Wet boards that favor the caller use large bets or checks.'},
{c:'C-Bet',q:'You open HJ, CO calls. Flop is QJT rainbow. C-bet or check?',o:['A) Always c-bet — you are the preflop aggressor','B) Check frequently — this board connects heavily with CO calling range','C) Bet large — protect your strong hands','D) Bet small — probe for weakness'],a:'B',e:'QJT rainbow connects extremely well with a CO calling range (two pairs, sets, straights). Your range advantage is minimal. Check frequently and respond to the CO.'},
{c:'C-Bet',q:'You 3-bet SB vs BTN open, BTN calls. Flop is A53 rainbow. C-bet or check?',o:['A) Check — aces are dangerous','B) Bet small — A-high boards heavily favor 3-bettor range','C) Bet large — protect your strong hands','D) It depends entirely on your specific hand'],a:'B',e:'A53r is a dream board for the 3-bettor. You have AK, AA, KK, QQ, JJ, TT — hands BTN rarely has. Bet small at high frequency and extract value.'},
{c:'C-Bet',q:'On a T65 two-tone flop, when should you check as the preflop raiser?',o:['A) Never — always c-bet as the aggressor','B) With your weakest hands only','C) With bluffs that have low equity — your range advantage is minimal on this board','D) Only when in position'],a:'C',e:'T65 two-tone connects with the caller\'s range well. Check your weakest bluffs (low equity hands without draws) and bet with draws and made hands.'},
{c:'C-Bet',q:'What sizing should you use on a paired board like KK7?',o:['A) Large — paired boards are dangerous','B) Small — paired boards heavily favor the preflop raiser','C) Check — paired boards are traps','D) The same sizing you use on every board'],a:'B',e:'Paired boards with a high card like KK7 heavily favor the preflop raiser who has AK, KQ, KJ, and all pairs in range. Use small sizing at high frequency.'},
{c:'C-Bet',q:'You are OOP after c-betting the flop. Turn is a blank. Should you barrel?',o:['A) Always barrel — maintain aggression','B) Barrel with hands that improved or have strong equity, check-fold bluffs','C) Never barrel OOP — too dangerous','D) Barrel sizing depends on exact card only'],a:'B',e:'OOP double-barreling should be done with equity (flush draws, straight draws, top pair) or strong made hands. Pure bluffs without equity get into trouble vs strong ranges.'},
{c:'C-Bet',q:'On a AKQ rainbow flop what is your c-bet frequency?',o:['A) Never — your range is capped and vulnerable','B) High frequency small bets — this board smashes your 3-bet range','C) Check — too dangerous, opponent could have the nuts','D) Polarized bets only — large or check'],a:'B',e:'AKQ rainbow is an elite board for the preflop raiser or 3-bettor. You have AK, KK, QQ, AA — opponent rarely does. Bet small at near 100% frequency.'},
{c:'C-Bet',q:'What is a probe bet?',o:['A) A small bet on the river to induce a bluff raise','B) An OOP bet on the turn after checking the flop to the preflop raiser who also checked','C) A large isolation bet preflop','D) A check-raise on a wet board'],a:'B',e:'A probe bet is made OOP on the turn when both players checked the flop. It represents a hand that improved on the turn and denies equity to the raiser who showed weakness.'},
{c:'C-Bet',q:'Flop is 882 rainbow. You opened BTN, BB called. C-bet or check?',o:['A) Check — paired boards are traps','B) Bet small at very high frequency — heavily favors your range','C) Bet large — force folds','D) Check and evaluate BB tendency'],a:'B',e:'882 rainbow is an extremely dry board that overwhelmingly favors the BTN opener. You have 88, AA, KK, QQ, JJ — BB rarely does. Bet small at near 100% frequency.'},
{c:'C-Bet',q:'You opened UTG, HJ called. Flop is 743 two-tone. C-bet strategy?',o:['A) Always bet — UTG range crushes this board','B) Check frequently — low boards connect well with HJ calling range which includes many suited connectors and small pairs','C) Bet large to price out draws','D) Check-call any bet'],a:'B',e:'Low connected boards hit the caller\'s range (small pairs, suited connectors) harder than the opener\'s. UTG rarely has 43s or 76s. Check your air frequently here.'},
{c:'C-Bet',q:'On a JJ4 board, the turn is another 4 (board: JJ44). Action?',o:['A) Always barrel — double paired boards are strong','B) Check frequently — this board heavily favors the BB calling range','C) Bet large to protect your Jx hands','D) The action should be the same as on the flop'],a:'B',e:'Double paired boards reduce your range advantage. BB calling range includes 44 and many Jx hands. Check more frequently on JJ44 and be cautious about barreling.'},
{c:'C-Bet',q:'You 3-bet KK, get called in position. Flop is A72 rainbow. What now?',o:['A) Give up — you missed the board','B) C-bet — you have the highest overpairs plus AK, so you still have range advantage even with an ace','C) Check-fold — your hand is probably beat','D) Shove — protect against draws'],a:'B',e:'Even when you miss with KK on an ace-high board, your 3-bet range includes AK, AQ, AJ so you still have range advantage. C-bet and continue balancing with KK as a bluff catcher.'},
{c:'C-Bet',q:'What is a delayed c-bet?',o:['A) A c-bet made on the turn after checking the flop','B) A slow-played strong hand','C) A bet made after a long tank','D) A second bullet on the river'],a:'A',e:'A delayed c-bet is when you check the flop as the preflop raiser and then bet the turn. Effective on boards where checking the flop is correct but turns improve your range.'},
{c:'C-Bet',q:'Flop is Q84 with two spades. You opened BTN, BB called. Sizing?',o:['A) Small — 25% pot','B) Medium — 50% pot','C) Large — 70-80% pot','D) Check — too many draws'],a:'C',e:'Q84 two-tone is a semi-wet board with flush draws. Use larger sizing (70%+) to charge draws and protect made hands. Small bets give draws cheap equity.'},
{c:'C-Bet',q:'On the river with a busted draw, you have zero equity. When should you bluff?',o:['A) Never — bluffing the river is too risky','B) When your bet will generate enough folds to show a profit given the pot odds you are laying','C) Only with the nut blocker','D) Always — make opponent uncomfortable'],a:'B',e:'River bluffing is about expected value. Bet when folds are frequent enough to profit. For example betting 67% pot requires >40% fold frequency. Having blockers to the nuts increases profitability.'},
{c:'C-Bet',q:'You have top pair good kicker (TPGK) on a wet board. Should you bet large or small?',o:['A) Small — protect your range and extract value','B) Large — you need to charge draws','C) Check — TPGK is a check-call hand','D) Depends entirely on opponent type'],a:'B',e:'TPGK on a wet board should bet large. You have a strong hand that wants to be called by worse, but you also need to charge flush draws and straight draws that have significant equity.'},
{c:'C-Bet',q:'What does it mean to have a "range advantage" on a board?',o:['A) Having more strong hands in your range than your opponent on that specific board texture','B) Having a higher overall hand frequency','C) Having more draws than your opponent','D) Always being in position'],a:'A',e:'Range advantage means your overall range connects better with the board texture than your opponent\'s range. Having range advantage justifies betting more frequently at smaller sizes.'},
{c:'C-Bet',q:'Board is T98 rainbow. You raised preflop, BB called. What percentage of your range should you c-bet?',o:['A) 80-100% — always c-bet as the aggressor','B) 30-40% — BB\'s range connects too well with this board','C) 0% — always check this board type','D) 50% — split your range evenly'],a:'B',e:'T98 rainbow is one of the best boards for the BB caller. They have suited connectors, two pairs, straights that you often do not have. Check frequently and pick spots carefully.'},
{c:'C-Bet',q:'You open CO, BTN calls, BB calls. Flop is A32 rainbow. Multiway c-bet strategy?',o:['A) C-bet aggressively — you have range advantage with the ace','B) Check — multiway pots require much stronger hands to c-bet profitably','C) Always bet large multiway','D) Same strategy as heads-up'],a:'B',e:'In multiway pots you need significantly stronger hands to c-bet profitably because multiple opponents must fold. Check boards more often even with range advantage in multiway spots.'},
{c:'C-Bet',q:'What is the main goal of a small c-bet on a dry board?',o:['A) To build the pot for later streets','B) To make a profit from air hands and thin value hands that benefit from charging the few draws','C) To represent a monster hand','D) To protect against runner-runner draws'],a:'B',e:'Small bets on dry boards extract thin value from worse made hands, keep the pot small with medium strength hands, and make a profit from the few draws that exist at favorable odds.'},
{c:'C-Bet',q:'Flop is K73 rainbow. You check as the preflop raiser. BB bets. What does this tell you?',o:['A) BB always has a strong hand','B) BB is likely probing with a medium hand or draw, not a monster','C) BB always has a 7 or 3','D) Nothing useful about BB range'],a:'B',e:'When BB bets into you after you checked on a K-high dry board, they often have Kx or a probe bet with a medium holding. Their range is capped — they would check-raise the flop with monsters.'},
{c:'C-Bet',q:'On a 432 two-tone flop what is the correct c-bet strategy for the preflop raiser?',o:['A) High frequency small bets — you have range advantage','B) Check frequently — this board hits the BB\'s range harder','C) Bet large to deny equity','D) Only bet with a set or overpair'],a:'B',e:'432 is one of the worst flops for the preflop raiser. The BB has 65s, 54s, 43s, small pairs — all the hands that connect. You have very little. Check frequently.'},
{c:'C-Bet',q:'You have 88 on a KQ7 board. Should you c-bet?',o:['A) Yes — 88 is a made hand, always bet','B) It depends on position and range considerations','C) No — 88 is too vulnerable on K-high boards','D) Yes but check-fold to any raise'],a:'B',e:'88 on KQ7 is a medium strength hand. In position you can bet small to extract value from weaker pairs. OOP you might check to control pot size. Neither always-bet nor always-check is correct.'},
/* ── 3-BET SQUEEZE RESTEAL (25) ── */
{c:'3-Bet',q:'What percentage of your 3-bet range should be bluffs for a balanced strategy?',o:['A) 0% — 3-bets should always be for value','B) About 50% — roughly equal value and bluffs','C) 75% — mostly bluffs with some value','D) Depends entirely on opponent tendencies'],a:'B',e:'A balanced 3-bet range has roughly equal value and bluff hands. This makes you unexploitable. Against passive opponents you can tighten the bluffs; against folders you can widen them.'},
{c:'3-Bet',q:'Best position to execute a squeeze play?',o:['A) UTG — maximum fold equity','B) BTN or CO — good fold equity with position postflop if called','C) BB — you are already in the pot','D) SB — cheapest squeeze'],a:'B',e:'Squeezing from BTN or CO gives you fold equity against the opener and caller plus position if called. This is the ideal combination for a profitable squeeze.'},
{c:'3-Bet',q:'UTG opens, you 3-bet CO, both fold back to UTG who 4-bets. You have AJs. Action?',o:['A) Always call — AJs is too good to fold','B) Fold — AJs is a 3-bet bluff that should fold to a 4-bet from UTG','C) 5-bet shove — maximize pressure','D) Call and fold all bad flops'],a:'B',e:'AJs is a 3-bet bluff from CO vs UTG. When UTG 4-bets they have a strong linear range (AA, KK, QQ, AK) that dominates AJs. Fold as planned.'},
{c:'3-Bet',q:'Why is A5s a better 3-bet bluff than A9s?',o:['A) A5s has better flush potential','B) A5s has stronger blockers — the 5 does not block many calling hands while A blocks AA and AK','C) A9s is too strong to use as a bluff','D) There is no difference'],a:'B',e:'A5s blocks AK and AA (reducing their combos) while the 5 kicker does not block many strong hands opponents would call with. A9s blocks fewer top-of-range hands and has reverse blocking issues.'},
{c:'3-Bet',q:'CO opens, you 3-bet BTN, SB cold-calls, CO calls. Now what?',o:['A) Always c-bet small — you are the aggressor','B) Check frequently — multiway pots reduce the effectiveness of your 3-bet range','C) Bet large — you have the most premium hands','D) Give up on any flop you miss'],a:'B',e:'Multiway pots after a 3-bet are tricky. Multiple players means someone is likely connected with the board. Check more, bet strong hands, and be cautious with pure bluffs.'},
{c:'3-Bet',q:'At 30BB BTN opens to 2.5BB. You are in SB with KQo. Best action?',o:['A) Fold — KQo OOP is too dangerous','B) Call — see a cheap flop with a strong hand','C) 3-bet shove — 30BB puts KQo in shove territory from SB','D) 3-bet small to 8BB'],a:'C',e:'At 30BB KQo is a 3-bet shove from SB vs BTN open. Strong enough to shove, generates fold equity, and at 30BB you do not want to play KQo OOP in a 3-bet pot.'},
{c:'3-Bet',q:'What makes a good resteal candidate?',o:['A) Any strong hand','B) A hand that has fold equity against the opener, decent equity when called, and ideally blockers to the calling range','C) Only premium pairs and AK','D) Any two cards from the blinds'],a:'B',e:'Good resteals have three components: fold equity (opener has wide range), equity when called (at least 35-40%), and blockers to premium hands. A5s, KTs, 77 are classic resteal hands.'},
{c:'3-Bet',q:'At 25BB CO opens, you are BTN with 99. Action?',o:['A) Fold — 99 is too vulnerable to play a 3-bet pot','B) Call — implied odds with a pair','C) 3-bet shove — 25BB with 99 is a clear shove','D) 3-bet small to 6BB'],a:'C',e:'At 25BB 99 is a 3-bet shove from BTN vs CO. Strong enough to be ahead of CO opening range often, enough fold equity, and great equity when called.'},
{c:'3-Bet',q:'You 3-bet with KK. Opponent calls. Flop is A65 rainbow. Action?',o:['A) Check-fold — they have an ace','B) C-bet — your range includes AK, AQ so you still have range advantage','C) Check-call any bet','D) Bet large to represent the ace'],a:'B',e:'With KK on A65r after 3-betting, you still c-bet. Your 3-bet range includes AK, AQ so your range connects well. KK itself can bluff-catch or fold depending on action.'},
{c:'3-Bet',q:'BTN opens, SB cold-calls, you are BB. When do you squeeze?',o:['A) Only with premium hands','B) Never — too many players in the pot','C) With strong hands and some suited ace bluffs — both players have capped ranges and you have maximum fold equity','D) Only if both players are tight'],a:'C',e:'BB squeeze is powerful here. BTN has opened wide, SB has flatted and capped their range (no 3-bet), and your 3-bet has great fold equity. Use strong hands plus A3s-A5s.'},
{c:'3-Bet',q:'What is the optimal 3-bet size from OOP?',o:['A) 3x the open','B) 3.5-4x the open — larger OOP to compensate for positional disadvantage','C) Same as in position — sizing does not change','D) Pot-sized always'],a:'B',e:'OOP 3-bets should be larger (3.5-4x) to build a bigger pot when you have the advantage preflop and to put more pressure on the opener\'s range.'},
{c:'3-Bet',q:'At 40BB you 3-bet and get called. What stack-to-pot ratio (SPR) should you expect postflop?',o:['A) About 10 — deep and difficult to get all-in','B) About 3-4 — relatively low, committed with most strong hands','C) About 1 — near-shoving on every flop','D) SPR does not matter in tournaments'],a:'B',e:'After a 3-bet pot at 40BB the SPR is typically 3-4. This means you are committed with top pair or better and the stacks go in naturally on the flop or turn.'},
{c:'3-Bet',q:'You 3-bet from HJ, CO calls. SPR is 3. Flop is KT4 rainbow. You have QQ. Action?',o:['A) Check — scared of the king','B) C-bet all-in immediately','C) C-bet for about 40% pot to build into natural all-in','D) Give up — QQ on K-high is too dangerous'],a:'C',e:'QQ on KT4 with SPR 3 is a strong hand. Bet to build pot naturally toward all-in. You beat most of CO calling range and are not far behind even against Kx.'},
{c:'3-Bet',q:'What is a light 3-bet?',o:['A) A 3-bet with a medium strength hand that does not want to be called','B) A 3-bet with a very small sizing','C) A 3-bet from the blinds only','D) A 3-bet with a suited connector'],a:'A',e:'A light 3-bet uses hands like KJo, AT that have decent equity but prefer folds. The goal is to pick up the open raise. If called, these hands play okay but not great.'},
{c:'3-Bet',q:'CO opens, BTN 3-bets, SB 4-bets. You are in BB with KK. Action?',o:['A) Call — KK plays well heads-up','B) 5-bet shove — KK is strong enough to 5-bet against a 4-bet','C) Fold — you might be up against AA','D) Call and fold to any flop bet'],a:'B',e:'KK is a 5-bet shove here. The 4-bet range is AA, KK, QQ, AK — you are crushing QQ and AK and a small dog to AA. With pot odds in a 5-bet pot, 5-bet shove is correct.'},
{c:'3-Bet',q:'At 50BB, UTG opens, CO 3-bets. You are in BB with TT. Call or fold?',o:['A) Always fold — TT vs 3-bet is too risky','B) Call — TT has great set-mining equity and you are getting odds','C) 4-bet shove — TT is strong enough','D) Fold unless CO is very loose'],a:'B',e:'TT in BB vs UTG open and CO 3-bet is a call at 50BB. You are getting good implied odds on a set, and TT has enough equity in a 3-way pot even without hitting.'},
{c:'3-Bet',q:'You 3-bet from SB, BTN calls. Flop is 964 two-tone. You have AK with backdoor nut flush. C-bet?',o:['A) Check — you missed the board completely','B) C-bet — AK with backdoor nut flush is an excellent barrel hand in a 3-bet pot','C) Check-fold','D) Always check out of position'],a:'B',e:'AK with backdoor nut flush is a strong barrel hand. You have overcards (6 outs), backdoor nut flush (2-3% extra equity per card), and good fold equity in a 3-bet pot.'},
{c:'3-Bet',q:'Opponent 3-bets you. You have AQo. At what stack depth should you 4-bet vs call?',o:['A) Always 4-bet AQo — it is too strong to flat','B) 4-bet shove at 20-30BB, flat or fold at deeper stacks','C) Always call — AQo does not want to be re-raised','D) Always fold AQo to a 3-bet'],a:'B',e:'At 20-30BB AQo 4-bet shoves for fold equity plus it is often ahead of 3-bet range. Deep (50BB+) you can flat in position or fold OOP depending on your opponent tendencies.'},
{c:'3-Bet',q:'When does a squeeze become a resteal?',o:['A) They are the same thing','B) Resteal is specifically from the blinds over a late-position open; squeeze is over an open plus one or more cold-callers','C) Resteal is a larger size than a squeeze','D) Resteals only happen with short stacks'],a:'B',e:'Resteal: blinds shoving over a late-position open. Squeeze: 3-betting over an open after one or more players have called (no need to be from the blinds).'},
{c:'3-Bet',q:'At 35BB you 3-bet and opponent calls. What hands should you c-bet with on a T83 board?',o:['A) Only your strong made hands','B) Polarized range — your premium hands and your draws/semi-bluffs, check medium hands','C) Your entire range — you are the 3-bettor','D) Only check-raise on this board'],a:'B',e:'In 3-bet pots use a polarized strategy. Bet your strongest hands and draws. Check with medium-strength hands like JJ, QQ on T-high boards to protect your checking range.'},
{c:'3-Bet',q:'A5s vs A9s for a resteal from the SB. Which is better and why?',o:['A) A9s is better — higher equity when called','B) A5s is better — blocks AK/AA while the wheel combo adds extra equity vs tight ranges','C) They are equivalent — same suit, close in rank','D) Neither is good for restealing'],a:'B',e:'A5s is the better resteal hand. The 5 does not block many calling hands, A blocks AA and AK, and the wheel possibility (A2345) adds extra equity when called by broadways.'},
{c:'3-Bet',q:'You 3-bet from BTN vs CO. Action folds to CO who shoves for 40BB. You have QQ. Call or fold?',o:['A) Always fold — QQ might be crushed','B) Call — QQ has about 55-60% equity vs CO 4-bet shove range which includes AK and some bluffs','C) Fold — you need to be ahead more than 60% to call','D) Call only if CO is aggressive'],a:'B',e:'QQ vs a 40BB shove from CO is a call. CO 4-bet range includes AA, KK, AK, and some bluffs. QQ has approximately 55-60% equity — a profitable call with the pot odds.'},
{c:'3-Bet',q:'What is the correct 3-bet size from in position?',o:['A) 3x the open','B) 2.5x — keep it small to control pot','C) 3x is standard in position — enough to pressure, not too large to scare away calls','D) Pot-sized always — maximize fold equity'],a:'C',e:'3x the open is standard IP 3-bet size. Large enough to pressure the opener\'s range and build a pot, small enough to get called by hands you dominate.'},
{c:'3-Bet',q:'Multiway pot after a squeeze. You have AK and the board is K62 rainbow. What is your bet frequency?',o:['A) 100% — top pair top kicker, always bet','B) Lower than heads-up — maybe 50-60%, multiway requires stronger hands to bet','C) 0% — never bet TPGK multiway','D) Same as heads-up — board texture drives frequency'],a:'B',e:'In multiway pots you need stronger hands to bet profitably. AK on K62 is strong but in a 3-way pot someone might have K6, K2, or 66. Bet but not at 100% frequency.'},
/* ── BLIND VS BLIND (20) ── */
{c:'BvB',q:'SB with T9o at 30BB, folded to you. Raise or complete?',o:['A) Complete — T9o is too speculative to raise OOP','B) Raise — T9o is in SB raising range at 30BB','C) Fold — T9o is dominated too often','D) Always complete suited, fold offsuit'],a:'B',e:'T9o is a standard SB raise at 30BB. Connected broadway-adjacent hands with decent equity raise for fold equity against the BB. Completing often lets BB realize equity too cheaply.'},
{c:'BvB',q:'BB with K7o, SB raises 3x. Call or fold?',o:['A) Fold — K7o is too weak to defend','B) Call — getting 2:1 odds with K7o which has decent equity and you close the action','C) 3-bet — K7o is a strong BB defense hand','D) Only call if SB is aggressive'],a:'B',e:'K7o in BB vs SB raise is a call at most depths. You are getting great pot odds, your hand has reasonable equity, and you close the action in position for the rest of the hand.'},
{c:'BvB',q:'SB completes with 65s, BB checks. Flop is J52 rainbow. Who has range advantage?',o:['A) SB — they bet preflop','B) BB — they have uncapped range and J-high boards favor BB checking range','C) Neither — pot was checked through','D) Equal range advantage'],a:'B',e:'After a BvB completion, the BB has an uncapped range and J52r is a neutral to BB-favoring board. BB should probe frequently. SB\'s range is weaker having just completed.'},
{c:'BvB',q:'At 25BB, SB shoves. You are BB with QJo. Call or fold?',o:['A) Always fold — QJo vs SB shove is dominated','B) Call — QJo has about 45-50% equity vs SB push range and you are getting 2:1','C) Fold — wait for a better hand','D) Call only if SB is very loose'],a:'B',e:'QJo vs SB 25BB shove is a call. You are getting 2:1 pot odds and need only 33% equity. QJo has approximately 42-48% equity vs a reasonable SB shoving range.'},
{c:'BvB',q:'What is the BB squeeze and when is it most effective?',o:['A) BB 3-betting after the SB calls a raise','B) BB 3-betting after BTN opens and SB cold-calls — both players are capped and you have maximum fold equity','C) BB shoving after multiple limpers','D) BB betting large on any flop'],a:'B',e:'BB squeeze is most effective when BTN opens and SB cold-calls. SB cannot have a strong hand (they would have 3-bet), BTN range is wide, and your 3-bet has huge fold equity.'},
{c:'BvB',q:'SB with A8o at 40BB, folded to you. Raise or complete?',o:['A) Complete — A8o has reverse implied odds OOP','B) Raise — A8o is a clear SB raise at 40BB','C) Fold — A8o is dominated by AJ+','D) Raise only vs tight BBs'],a:'B',e:'A8o is a standard SB raise at 40BB. Strong kicker, reasonable equity, fold equity against the BB. You should be raising about 40% of hands from SB.'},
{c:'BvB',q:'BB defends with 54s vs SB raise. Flop is A93 rainbow. Action?',o:['A) Donk bet — you have position leverage','B) Check — you missed completely, check-fold to a c-bet','C) Check and evaluate — 54s has backdoor equity and can peel once','D) Bluff-raise the flop'],a:'C',e:'54s has backdoor straight equity (3-4-5-6 possibilities) on A93r. Check and call a small to medium c-bet once. You can fold to large bets or double barrels.'},
{c:'BvB',q:'At 20BB in the BB with ATo, SB shoves. Call or fold?',o:['A) Fold — ATo is dominated by AJ+','B) Call — ATo is a clear call vs SB 20BB shove','C) It depends entirely on SB tendency','D) Only call if SB is extremely loose'],a:'B',e:'ATo is a comfortable call vs SB 20BB shove. SB shove range at 20BB is wide (40%+). ATo has excellent equity vs that range and you are getting 2:1 on your call.'},
{c:'BvB',q:'What hands should BB 3-bet vs SB raise?',o:['A) Only AA, KK, QQ, AK — premium hands only','B) Premium value hands plus suited ace bluffs A3s-A5s for balance','C) Any two cards — you are getting good odds','D) Only suited hands'],a:'B',e:'BB should 3-bet value hands (QQ+, AK) plus bluffs with blockers (A3s-A5s). The bluffs have blocker equity plus nut potential. A balanced range prevents SB from exploiting your tendencies.'},
{c:'BvB',q:'SB with KJo at 15BB, BB is unknown. Raise or shove?',o:['A) Raise to 2.5BB','B) Shove — 15BB puts KJo in shove territory from SB','C) Complete — KJo plays better postflop','D) Fold — KJo gets dominated too often'],a:'B',e:'At 15BB KJo shoves from SB. Strong broadway hand, fold equity vs BB, decent equity when called. Completing and navigating postflop OOP at 15BB is much worse.'},
{c:'BvB',q:'Flop is 752 rainbow, BB checked. SB c-bets 30% pot. BB action with K8o?',o:['A) Fold — K8o has no pair and no draws','B) Call — K8o has overcards and backdoor possibilities, small bet gives good odds','C) Raise — pressure the small c-bet','D) Always fold K-high to any c-bet'],a:'B',e:'K8o vs a small c-bet on 752r has reasonable pot odds. Two overcards (K and 8) have about 25-30% equity vs SB\'s range. The small bet makes this a viable call.'},
{c:'BvB',q:'BB with 22 vs SB raise at 50BB. What is the primary strategy?',o:['A) Fold — 22 plays poorly OOP','B) Call and set-mine — 50BB gives implied odds to flop a set and win a big pot','C) 3-bet bluff — 22 has good blocker properties','D) Only call if SB raise is small'],a:'B',e:'At 50BB 22 in BB vs SB is a call for set-mining value. You need about 10-15x implied odds and at 50BB vs a likely-to-stack-off opponent you have enough.'},
{c:'BvB',q:'SB at 35BB with Q4s. Raise or fold?',o:['A) Fold — Q4s is too speculative','B) Raise — Q4s is in SB opening range at 35BB','C) Complete only','D) Open only if BB is tight'],a:'B',e:'Q4s suited is in SB opening range at 35BB. Suited cards have extra value, you have fold equity against one player, and at 35BB you can navigate postflop.'},
{c:'BvB',q:'After SB completes, BB checks. What should BB\'s strategy be on K-high boards?',o:['A) Always check — SB will bet first','B) Probe frequently — BB has uncapped range and SB is weak for not raising','C) Give up all weak hands','D) Only bet with Kx or better'],a:'B',e:'BB should probe on K-high boards after a BvB completion. SB\'s range is weak (they did not raise), BB\'s range is uncapped. Probe bets with medium holdings and draws are effective.'},
{c:'BvB',q:'At 22BB with J9s in BB, SB shoves. Call or fold?',o:['A) Fold — J9s is too speculative vs a shove','B) Call — J9s has about 40-42% equity vs SB 22BB shove range and you are getting 2:1','C) Always fold non-pairs to shoves','D) Only call if you have a read'],a:'B',e:'J9s vs SB 22BB shove: you need 33% equity and you have about 40-42% vs a wide SB shove range. Pot odds make this a call. Suited connectors play well vs wide ranges.'},
{c:'BvB',q:'SB raises 3x at 30BB. BB has 97s. Call or fold?',o:['A) Fold — 97s OOP is too speculative','B) Call — suited connector with implied odds, getting good pot odds','C) 3-bet — 97s is a good bluff candidate','D) Call only vs wide SB ranges'],a:'B',e:'97s in BB vs SB raise is a standard call. You are getting pot odds, have implied odds for straights and flushes, and 97s has enough equity to be a profitable defend.'},
{c:'BvB',q:'What is the main mistake players make in BB defense?',o:['A) Defending too wide','B) 3-betting too often','C) Defending too tight — folding hands that have enough pot odds to call profitably','D) Never check-raising'],a:'C',e:'Most players fold too much from BB. The pot odds you receive when defending BB (2:1 or better) mean many hands are profitable defends even OOP. Study your defense frequency and widen.'},
{c:'BvB',q:'SB with A2o at 20BB, folded to you. Shove or fold?',o:['A) Fold — A2o is too weak','B) Shove — A2o has strong blockers and fold equity vs the BB at 20BB','C) Complete — A2o plays better postflop','D) Open to 2x'],a:'B',e:'At 20BB A2o shoves from SB. Blocks AA and AK (reducing calling combos), has decent equity when called, and generates fold equity. A2o is in the SB shove range here.'},
{c:'BvB',q:'Heads-up (SB vs BB) — how wide should the SB open?',o:['A) Same as 6-handed BTN — about 45-50%','B) Very wide — 75-85% of hands HU, folding 2-high type hands','C) Tight — more players fold, HU is more variance','D) Only open premium hands and steal with shoves'],a:'B',e:'Heads-up the SB should open 75-85% of hands. With only one opponent you have maximum fold equity and any reasonable hand has playable equity. Folding 52o type hands is standard.'},
{c:'BvB',q:'BB with QQ, SB shoves 25BB. Call or fold?',o:['A) Fold — QQ might be up against KK or AA','B) Call — QQ has about 70-75% equity vs SB 25BB shove range','C) It depends only on SB tendencies','D) Only call if SB is known to be loose'],a:'B',e:'QQ is a comfortable call vs SB 25BB shove. SB shoves wide (50%+) at this depth, meaning QQ has approximately 70-75% equity vs their range. Easy profitable call.'},
/* ── ICM AND TOURNAMENT PLAY (25) ── */
{c:'ICM',q:'Definition: what is ICM in tournament poker?',o:['A) A method for calculating pot odds','B) Independent Chip Model — converts chip stacks to real dollar equity using the payout structure','C) International Card Method — a card-ranking system','D) A type of bluff strategy near the bubble'],a:'B',e:'ICM converts chips into their real-money equivalent based on everyone\'s stack sizes and the remaining prize pool distribution. A chip is not worth a fixed amount — it changes with stack size.'},
{c:'ICM',q:'What is the key ICM principle about chip value?',o:['A) Chips become more valuable as you accumulate more','B) Chips are worth more when you have fewer — marginal chips are worth less the more you have','C) All chips have equal value at all times','D) Chips only have ICM value on the final table'],a:'B',e:'Chips have diminishing value as you accumulate them. Your first chip is worth the most; your last chip addition is worth the least. This is why ICM says to protect your stack near payout jumps.'},
{c:'ICM',q:'You are on the money bubble with medium stack. BB vs UTG shove. You have ATo. Pure ChipEV says call. ICM says?',o:['A) ICM says the same as ChipEV','B) ICM often says fold — the risk of busting outweighs the chip gain when a min-cash is valuable','C) ICM always says call with ATo','D) ICM only applies at the final table'],a:'B',e:'On the bubble ICM heavily penalizes elimination. A min-cash has real value. ATo vs UTG is often a fold ICM-adjusted even if ChipEV is breakeven, because the ICM cost of busting is too high.'},
{c:'ICM',q:'Final table bubble with 9 players. 8 get paid. You have average stack. Short stack is in BB. UTG shoves. You have KK. Call or fold?',o:['A) Always call — KK is too strong to fold','B) Fold — ICM says protect your stack when a payout jump is imminent','C) Call — KK equity overcomes ICM pressure','D) It depends on exact stack sizes and payout structure'],a:'D',e:'This is a genuine ICM dilemma. KK is strong but stack sizes matter — if the short stack is about to bust you might fold. Run the ICM math. KK is usually a call but the situation determines it.'},
{c:'ICM',q:'What is the "bubble factor"?',o:['A) How tight you should be on the bubble','B) The ratio of ICM value gained to ChipEV — how much ICM adjusts your decisions','C) The number of players left to bust before the money','D) The percentage of hands you should play at the bubble'],a:'B',e:'The bubble factor quantifies how much ICM adjusts decisions. A bubble factor of 2 means you need to win 2x as often as ChipEV breakeven to make a call profitable ICM-wise.'},
{c:'ICM',q:'You have a huge chip lead at the final table. How does ICM affect your strategy vs short stacks?',o:['A) Chip leader ignores ICM — they can absorb any loss','B) Chip leader should exploit ICM — shove wide vs short stacks who are protecting payout equity','C) Chip leader should play tighter to protect the lead','D) ICM does not apply to the chip leader'],a:'B',e:'As chip leader you can exploit ICM by shoving wide. Short stacks are highly ICM-constrained and must fold many profitable ChipEV calls. The leader benefits from this asymmetry.'},
{c:'ICM',q:'Two players have equal chips. One is near the bubble, one is deep in the money. Who has more ICM pressure?',o:['A) The player near the bubble — each bust-out has larger payout consequences','B) The player deep in the money','C) Equal ICM pressure at equal stack sizes','D) The player with the more experienced opponents'],a:'A',e:'ICM pressure is highest near payout jumps. Near the bubble each spot eliminated has huge value. Deep in the money (final few) the jumps between spots are smaller relative to already secured value.'},
{c:'ICM',q:'Monster Stack event, 500 players left, 300 get paid. You have 30BB. UTG shoves 20BB. You have 99. Action?',o:['A) Fold — ICM is severe near the bubble','B) Call — you are far enough from the bubble that ChipEV dominates, 99 is ahead of shove range','C) Always fold pairs under QQ near the bubble','D) The number of players remaining does not matter'],a:'B',e:'500 players with 300 paid means you are relatively far from the bubble. ICM pressure exists but is not severe. 99 is ahead of a UTG 20BB shove range — call ChipEV.'},
{c:'ICM',q:'Push/fold ICM situation: you have 12BB on the FT bubble. AJs from UTG. Action?',o:['A) Fold — ICM says protect stack on FT bubble','B) Shove — AJs is strong enough to shove despite ICM pressure','C) Open to 2.5BB','D) Depends on whether antes are running'],a:'B',e:'AJs from UTG at 12BB on FT bubble is a shove despite ICM. The hand is too strong and your stack is too short to wait. Shoving AJs generates fold equity and has excellent equity when called.'},
{c:'ICM',q:'What is the Nash equilibrium in push/fold poker?',o:['A) A strategy where both players are shoving the same hands','B) A push/fold strategy where no player can improve their EV by changing strategy given that all others play optimally','C) Playing perfectly balanced ranges','D) Always shoving with 10BB or less'],a:'B',e:'Nash equilibrium in push/fold is the unexploitable strategy. Given optimal calling ranges, these are the exact hands you should shove. In practice you adjust for actual caller tendencies.'},
{c:'ICM',q:'You have 40BB at a final table. Chip leader covers you. How does this change your strategy?',o:['A) No change — ignore the chip leader','B) Play tighter, especially against the chip leader. Being covered means busting costs you maximum ICM equity.','C) Play looser to accumulate chips quickly','D) Shove every hand the chip leader is not in'],a:'B',e:'Being covered by the chip leader is the worst ICM position. Any confrontation risks elimination vs maximum EV gain. Avoid marginal spots against the chip leader and exploit shorter stacks instead.'},
{c:'ICM',q:'Colossus tournament pays 2000 places out of 20000. You have 25BB with 3000 players left. How much ICM pressure?',o:['A) Extreme — act as if on the bubble','B) Low-moderate — still far from the money, play mostly ChipEV','C) Maximum — always fold to preserve stack','D) No ICM pressure this far from the money'],a:'B',e:'With 3000 of 20000 left and 2000 paying, you are at about 50% of the field. ICM pressure exists but is not severe. Play ChipEV-dominant strategy with mild ICM adjustments.'},
{c:'ICM',q:'What is a "deal" in tournament poker and when should you consider one?',o:['A) A side bet between players at the table','B) An agreement to distribute remaining prize money based on ICM or chip-count equity when few players remain','C) A chop of the blinds','D) A deal should never be made'],a:'B',e:'A deal redistributes remaining prize money. Consider one when the risk-adjusted value of a deal exceeds the EV of continuing. ICM value + your skill edge vs opponents determines whether to make a deal.'},
{c:'ICM',q:'With 3 players remaining, you have the short stack. Correct strategy?',o:['A) Fold everything — preserve your stack','B) Pick spots to shove from the BTN/SB where ICM pressure on opponents is highest','C) Play normal poker as if it were a cash game','D) Shove every hand to accumulate chips quickly'],a:'B',e:'With 3 remaining you exploit the ICM pressure on the medium stack. BTN and SB shoves are powerful when the medium stack cannot call wide — they risk busting to 3rd rather than 2nd.'},
{c:'ICM',q:'Payout structure: 1st $50K, 2nd $30K, 3rd $15K. Heads-up. You have 40% of chips vs opponent 60%. What is your ICM equity?',o:['A) $32K — proportional to chip count','B) Between $30K and $50K, closer to $38-40K ICM-adjusted','C) Exactly $30K since you would get second place','D) $40K exactly'],a:'B',e:'With 40% of chips HU you are likely to win 40% of the time and lose 60%. ICM: 0.4 x $50K + 0.6 x $30K = $20K + $18K = $38K ICM equity. Better than the $30K payout for 2nd.'},
{c:'ICM',q:'Freezeout event. Near the bubble. You have a dominant chip lead. Short stack is all-in vs another player. Action?',o:['A) Root for the short stack to bust — it is almost never correct to interfere','B) Try to eliminate both players yourself','C) No action required — sit out and let ICM sort itself out','D) Donate chips to medium stack to make them comfortable'],a:'A',e:'When two other players are involved in a hand that could eliminate the short stack, do nothing. Let it play out. If the short stack busts, everyone moves up in the payout structure and your ICM position improves.'},
{c:'ICM',q:'PKO (Progressive Knockout Bounty) tournament. Does ICM change vs regular MTT?',o:['A) No — ICM is the same regardless of format','B) Yes — bounties add extra EV to eliminations, shifting strategy toward calling wider vs short stacks','C) PKO tournaments have no ICM pressure','D) PKO ICM is simpler than regular MTT'],a:'B',e:'In PKO formats bounties add EV to eliminations. This shifts strategy toward calling shoves wider — you gain chips plus a bounty. ICM pressure still exists from the regular payout but bounties partially offset it.'},
{c:'ICM',q:'Final table. A deal is proposed. ICM give you $45K equity. Chip-count gives you $52K. Should you take the deal?',o:['A) Yes — guaranteed money is always better','B) Consider your edge vs remaining opponents — if you have a significant skill edge, declining might be correct','C) No — always play for the win','D) It depends only on payout structure'],a:'B',e:'ICM equity is not the only factor. If you have a skill edge vs remaining opponents, your EV might exceed ICM equity. Against tough opponents in a skill-driven format, deals often make sense.'},
{c:'ICM',q:'You are 3 spots from the money with 22BB. Under-the-gun shove or wait?',o:['A) Never shove 3 from the money — preserve stack','B) Continue to shove strong hands — tighten marginally but do not lock up','C) Fold everything until in the money','D) Shove every hand to accumulate chips for the money'],a:'B',e:'3 spots from money you tighten slightly from pure ChipEV but do not lock up. Continue shoving strong hands. Paralysis near the bubble costs more in missed steals than it saves in bust-out avoidance.'},
{c:'ICM',q:'Super Turbo format. How does ICM pressure compare to regular MTT?',o:['A) Same ICM pressure as regular MTT','B) Less ICM pressure per hand — turbo structures mean shorter play and chips matter more for survival','C) More ICM pressure — turbo formats have bigger swings','D) ICM is less relevant in turbo formats'],a:'B',e:'Super Turbo formats are more ChipEV-dominant than regular MTTs because the payout structure compresses faster. You have less time to navigate ICM spots and chip accumulation matters more.'},
{c:'ICM',q:'Final 2 tables of WSOP Freezeout. Payout jumps are about $2K per spot. How should you adjust?',o:['A) Extreme ICM adjustments — fold everything borderline','B) Mild adjustments — $2K jumps justify small tightening in marginal spots','C) No adjustments — too far from final table for ICM to matter','D) The dollar amount alone determines ICM adjustments'],a:'B',e:'$2K per spot is real money but not earth-shattering in a Freezeout context. Make mild ICM adjustments — tighten slightly in very close marginal spots, play near-ChipEV otherwise.'},
{c:'ICM',q:'With 10BB remaining at a final table, you are the short stack. Strategy?',o:['A) Play super tight and wait for aces','B) Pick your shove spot soon — waiting costs you fold equity and antes drain your stack','C) Call any shove with any two cards','D) Shove only from BTN and SB'],a:'B',e:'At 10BB you need to shove soon. Every orbit you lose antes and fold equity decreases. Pick a reasonable shove hand from position and go. Waiting for aces at 10BB is a significant mistake.'},
{c:'ICM',q:'What percentage equity do you need for a profitable bubble call with high ICM pressure?',o:['A) The same as ChipEV — >33% for 2:1 pot odds','B) Significantly more than ChipEV — sometimes 60-70% depending on ICM bubble factor','C) 50% always','D) It only depends on pot odds not ICM'],a:'B',e:'With high ICM pressure the bubble factor can require 60-70% equity to make a call profitable. The cost of elimination is so high that normally profitable ChipEV calls become folds.'},
/* ── OVERSIZED OPENS AND ADJUSTMENTS (15) ── */
{c:'Oversize',q:'Villain opens 5x in early position. What does this typically signal?',o:['A) A weak hand trying to steal','B) Often a strong but vulnerable hand or a recreational player uncomfortable with standard sizing','C) Always pocket aces or kings','D) A mis-click or error'],a:'B',e:'5x opens often indicate strength (recreational players who are excited about their hand) or vulnerability (wanting to reduce multi-way action). Widen your respect for their range.'},
{c:'Oversize',q:'Optimal response to a 4x BTN open when you are in BB with AKs?',o:['A) Fold — AKs is dominated at 4x','B) Call — implied odds are too good to fold','C) 3-bet for about 12-14x — scale your 3-bet proportionally','D) Shove immediately at any stack depth'],a:'C',e:'Versus a 4x open you scale your 3-bet proportionally. AKs is a clear 3-bet — size to about 3-3.5x the open (12-14BB) to maintain the same pot-odds pressure as a standard 3-bet.'},
{c:'Oversize',q:'Villain open-limps then raises large after you 3-bet. What does this usually mean?',o:['A) A weak hand trying a stop-and-go','B) A monster hand — limp-reraise is nearly always premium','C) A drawing hand','D) Nothing — all player types do this equally'],a:'B',e:'Limp-reraise is one of the strongest lines possible. Recreational players especially use this line with AA and KK. Treat it as premium range (AA, KK, sometimes QQ or AK suited).'},
{c:'Oversize',q:'You open to 3BB and villain 3-bets to 15BB. How does your flatting range change?',o:['A) No change — flat the same hands as you would vs any 3-bet','B) Flat a narrower range — the larger sizing shrinks implied odds and forces tighter calling','C) Flat wider — punish the large sizing','D) Always 4-bet vs large 3-bets'],a:'B',e:'A larger 3-bet sizing reduces implied odds and increases pot commitment. Flat a narrower range of hands that have strong equity (not just implied odds hands). Fold more marginal flats.'},
{c:'Oversize',q:'At a WSOP table, a recreational player opens 6x every hand. What is your adjustment?',o:['A) Play tighter — 6x opens are scary','B) Value-bet wider — recreational players opening large often call off with weak hands','C) 3-bet every hand to exploit the sizing','D) Only play premium hands in position'],a:'B',e:'Recreational players who open large are often calling stations. Widen your value 3-bet range since they will call with dominated hands. Reduce bluffs since they call too much.'},
{c:'Oversize',q:'BTN opens 3x. You 3-bet SB to 10x. BTN calls. How does the 3x open affect your postflop strategy?',o:['A) No difference — treat it as any 3-bet pot','B) The SPR is slightly lower than a standard 3-bet pot, adjust commitment thresholds accordingly','C) Always c-bet large since the pot is bigger','D) Check more often since the pot is big'],a:'B',e:'With a 3x open the pot is larger preflop, reducing SPR postflop. Commitment thresholds are reached faster — top pair plays more like a set in a standard pot. Adjust aggression accordingly.'},
{c:'Oversize',q:'Villain makes an oversized check-raise on the flop (5x your bet). What range does this represent?',o:['A) Mostly bluffs — strong hands slowplay','B) Almost always a very strong hand — sets, two pairs, combo draws at minimum','C) A balanced range of bluffs and value','D) Always a draw trying to deny equity'],a:'B',e:'Oversized check-raises (5x+) represent the strongest part of a player\'s range — sets, two pairs, nutted draws. Recreational players almost never do this as a bluff. Fold all but your strongest hands.'},
{c:'Oversize',q:'Optimal 3-bet size vs a 2.5x open, in position?',o:['A) 7.5BB — 3x the open','B) 6-7BB — slightly under 3x is fine in position','C) 10BB — larger to get more value','D) Always size to exactly 3x'],a:'A',e:'3x the open is standard in position. Vs 2.5x open that is 7.5BB. This applies correct pressure, builds a pot with your value hands, and offers you calls from dominated hands.'},
{c:'Oversize',q:'Villain min-raises (2x) every hand. What adjustment does this warrant?',o:['A) 3-bet wider — min-raises deserve less respect','B) Flat wider in position — excellent implied odds','C) Both A and B — min-raises allow you to see flops cheap and also 3-bet light','D) No adjustment needed'],a:'C',e:'Min-raises give you excellent pot odds to flat in position and 3-bets only need to be 5-6BB. Both flatting and 3-betting wider are profitable. Exploit the cheap price to enter pots.'},
{c:'Oversize',q:'You raise to 3BB, villain shoves for 45BB. Effective stack is 45BB. You have TT. Action?',o:['A) Always fold — shoves face down equity','B) Call — TT has about 55% equity vs a 45BB shove range and you are committed in the hand','C) Fold — 45BB is too deep to call off','D) Depends only on villain read'],a:'B',e:'TT vs a 45BB shove has approximately 55-60% equity vs a range that includes QQ-22, AK, AQs, and some bluffs. With the dead money in the pot this is a profitable call.'},
{c:'Oversize',q:'Opponent always bets 80-90% pot regardless of hand strength. How do you exploit?',o:['A) Fold more — large bets usually mean strong hands','B) Call or raise more freely — large sizing regardless of strength means their bluffs are expensive mistakes you can profitably call','C) Also bet large yourself','D) Move to a different table'],a:'B',e:'Players who always use large sizing have no sizing tells. However, their bluffs are very expensive. You can call more profitably because their bluffing frequency is constrained by the large size.'},
{c:'Oversize',q:'How should your 4-bet sizing change when responding to a large 3-bet (12BB vs standard 9BB)?',o:['A) Same 4-bet size — about 24-26BB always','B) Scale up proportionally — about 28-32BB vs a 12BB 3-bet','C) Always 4-bet shove regardless of 3-bet size','D) 4-bet smaller to represent a stronger hand'],a:'B',e:'Scale 4-bets proportionally to 3-bet size. Vs 12BB 3-bet, 4-bet to about 2.5-3x (28-36BB). This maintains the same fold equity and pot-odds pressure as a standard 4-bet would.'},
{c:'Oversize',q:'In a live WSOP field, recreational players often limp in early position. What is your adjustment?',o:['A) Limp behind — see cheap flops','B) Raise larger to isolate — 4-5x to price out other limpers','C) Only play premium hands in EP','D) Check raises with strong hands only'],a:'B',e:'Versus limpers in live poker, raise larger (4-5x or more) to isolate and reduce multiway action. Taking control of the pot with a wide range vs a recreational limper is profitable.'},
{c:'Oversize',q:'Your standard open is 2.5BB. You open with QQ but make it 4BB accidentally. What do you do?',o:['A) Take it back — you misclicked','B) In a live game, incorrect sizing is binding — play QQ in a 4BB raised pot','C) Announce the error and rebid','D) Fold since your hand is now readable'],a:'B',e:'In live poker your announced bet or placed chips are binding. A 4BB open with QQ is standard play. Now just play the hand normally — the sizing is not obviously polarizing.'},
{c:'Oversize',q:'Villain bets 3x pot on the river. You have a medium-strength bluff catcher (middle pair). Call or fold?',o:['A) Always call — villain is always bluffing with huge bets','B) Consider villain tendencies — 3x pot polarizes their range. If they bluff this sizing, call. If they only value-bet this sizing, fold.','C) Always fold — 3x pot is always value','D) The sizing alone determines the decision'],a:'B',e:'3x pot bets are highly polarizing. Against a player who bluffs this sizing, call profitably. Against a value-heavy player who only bets large for value, fold. Player tendencies determine the answer.'}
];

function getZone(hand,depth){
